    {f:r=>r.solo,e:'🗡',h:(nm,wr,g)=>`솔로킬 = ${nm}의 승리 신호탄`,b:(nm,wr,g)=>`솔로킬을 따낸 판 승률 ${wr}% (${g}판). 라인전에서 체급 차이가 나는 순간 게임이 기웁니다`},
    {f:r=>r.kp>=70,e:'🤝',h:(nm,wr,g)=>`팀이 ${nm}${josa(nm,'과','와')} 함께 움직이면 폭발`,b:(nm,wr,g)=>`킬관여 70%를 넘긴 판 승률 ${wr}% (${g}판). 모든 교전에 이 선수가 있어야 하는 팀입니다`},
  ];
  const nm=nameOf(pid);
  const found=[];
  tests.forEach(t=>{
    const sub=rows.filter(t.f);
    if(sub.length>=3){
      const wr=pct(sub.filter(r=>r.win).length,sub.length);
      if(wr>=70)found.push({pid,wr,g:sub.length,e:t.e,h:t.h(nm,wr,sub.length),b:t.b(nm,wr,sub.length)});
    }
  });
  // 첫 판 잡은 날의 그날 승률
  const byDate=new Map();
  rows.forEach(r=>{if(!byDate.has(r.date))byDate.set(r.date,[]);byDate.get(r.date).push(r)});
  let s1d=0,s1w=0,s1g=0;
  byDate.forEach(list=>{
    if(list.length<2)return;
    const first=[...list].sort((a,b)=>a.set-b.set)[0];
    if(first.win){s1d++;s1w+=list.filter(r=>r.win).length;s1g+=list.length}
  });
  if(s1d>=2&&s1g>=4){
    const wr=pct(s1w,s1g);
    if(wr>=65)found.push({pid,wr,g:s1g,e:'🚀',h:`첫 판 잡은 날의 ${nm}${josa(nm,'은','는')} 멈추지 않는다`,b:`1세트를 이긴 날의 그날 전체 승률 ${wr}% (${s1g}판). 오늘 첫 경기가 사실상 분수령입니다`});
  }
  return found.sort((a,b)=>b.wr-a.wr);
}
function teamRateAvg(ids,key){ // 팀 단위 분당 지표 평균
  const rates=ratesMap(); let s=0,c=0;
  ids.forEach(id=>{const r=rates.get(id);if(r&&r.games>=2){s+=RATE_GET[key](r);c++}});
  return c?s/c:null;
}
function lineupPoints(L){ // 분석 데스크
  L=L||allLineups()[0];if(!L)return[];
  const all=[...L.blue,...L.red];
  const pts=[];
  const N=id=>nameOf(id);
  const push=(e,h,b,ids)=>{
    if(pts.some(p=>p.h===h))return;
    if(window._lpUsed){if(window._lpUsed.has(h))return;window._lpUsed.add(h)} // 다회차 카드 간 멘트 중복 금지
    pts.push({e,h,b,ids:ids||[]});
  };
  // ① 더비 — 누구 vs 누구인지 명확히
  const Rv=statRivals(2);
  const derbies=[];
  L.blue.forEach(a=>L.red.forEach(b=>{
    const r=Rv.find(r=>r.ids.includes(a)&&r.ids.includes(b));
    if(r&&r.games>=3)derbies.push({a,b,r});
  }));
  derbies.sort((x,y)=>y.r.games-x.r.games).slice(0,2).forEach(({a,b,r})=>{
    const ia=r.ids.indexOf(a),wa=r.w[ia],wb=r.games-wa;
    const dn=derbyName(a,b,r);
    if(wa===wb)push('🔥',`[${dn}] ${N(a)} vs ${N(b)} — 통산 ${wa}:${wb} 완전 백중세`,
      `두 사람이 ${r.games}번 만나 정확히 반반. 오늘 이기는 쪽이 천적 등기부에 도장 찍습니다`,[a,b]);
    else{const dog=wa<wb?N(a):N(b),cat=wa<wb?N(b):N(a),lo=Math.min(wa,wb),hi=Math.max(wa,wb);
      push('🔥',`[${dn}] ${N(a)} vs ${N(b)} — 통산 ${wa}:${wb}`,
      `${cat}${josa(cat,'이','가')} 먹이사슬 위에 있습니다. ${dog}${josa(dog,'은','는')} 오늘 이기면 서사가 통째로 뒤집히는 절호의 기회`,[a,b])}
  });
  // ② 팀 단위 전문 지표: 오브젝트(용·유충·전령)/시야/CC
  const cmp=(key)=>[teamRateAvg(L.blue,key),teamRateAvg(L.red,key)];
  const[oa,ob]=cmp('objpm');
  if(oa&&ob&&Math.abs(oa/ob-1)>=.15){
    const lead=oa>ob?'알파':'베타',d=Math.round(Math.abs(oa/ob-1)*100);
    push('🐉',`용·유충 한타는 ${lead}팀이 +${d}% 우세`,
      `멤버들의 분당 오브젝트 피해량 비교 결과예요. 첫 용 둥지에서 칼부림 예약 — ${lead}가 선점하면 스노우볼, 뺏기면 대형 업셋 각`);
  }
  const[va,vb]=cmp('vspm');
  if(va&&vb&&Math.abs(va/vb-1)>=.2){
    const lead=va>vb?'알파':'베타';
    push('👁',`시야 전쟁은 ${lead}팀 우세`,
      `분당 시야 점수가 앞섭니다. 정글 동선이 훤히 보이는 쪽이 어둠 속에서 칼을 꽂는 법 — 부쉬를 조심하세요`);
  }
  const[ca,cb]=cmp('ccpm');
  if(ca&&cb&&Math.abs(ca/cb-1)>=.25){
    const lead=ca>cb?'알파':'베타';
    push('⛓',`한타 개시 버튼은 ${lead}팀 손에`,
      `CC(군중 제어) 보유량이 압도적입니다. 진형이 한 번 갈리면 그대로 끝 — 짤리는 순간 묵념`);
  }
  // ③ 조건부 캐리 분석
  const carries=[];
  all.forEach(pid=>condCarry(pid).slice(0,1).forEach(c=>carries.push(c)));
  carries.sort((a,b)=>b.wr-a.wr).slice(0,2).forEach(c=>push(c.e,c.h,c.b,[c.pid]));
  // ④ 시그니처 챔피언
  const sigs=[];
  all.forEach(pid=>{
    const c=playerChamps(pid).find(c=>c.games>=3&&c.winRate>=70);
    if(c)sigs.push({pid,c});
  });
  sigs.sort((x,y)=>y.c.winRate-x.c.winRate||y.c.games-x.c.games).slice(0,1).forEach(({pid,c})=>{
    const nm=N(pid);
    push('🎯',`${nm}의 ${c.champ} — 밴픽 1순위 안건`,
      `이 챔피언을 잡으면 승률 ${c.winRate}% (${c.games}판). 상대팀 입장에선 안 자르면 잘립니다`,[pid]);
  });
  // ⑤ 템포
  for(const pid of all){
    const{fast,slow}=playerPace(pid);const nm=N(pid);
    if(fast.g>=3&&pct(fast.w,fast.g)>=65){push('⚡',`26분 안에 끝나면 ${nm}의 세상`,
      `짧은 난타전(26분 이내) 승률 ${pct(fast.w,fast.g)}% (${fast.g}판). 초반부터 몰아치는 그림이 나오면 ${nm} 쪽으로 기웁니다`,[pid]);break}
    if(slow.g>=3&&pct(slow.w,slow.g)>=65){push('🐢',`32분을 넘기면 ${nm}${josa(nm,'이','가')} 웃는다`,
      `장기전(32분 이상) 승률 ${pct(slow.w,slow.g)}% (${slow.g}판). 경기가 길어질수록 강해지는 타입 — 시계를 주목하세요`,[pid]);break}
  }
  // ⑥ 모멘텀
  for(const pid of all){
    const{wl}=formSeries(pid);const r3=wl.slice(-3);const nm=N(pid);
    if(r3.length===3&&r3.every(Boolean)){push('📈',`${nm}, 3연승 폭주 기관차로 출전`,
      `최근 3판 전승. 이 기세를 끊을 정비공이 상대팀에 있을까요?`,[pid]);break}
  }
  for(const pid of all){
    const{wl}=formSeries(pid);const r3=wl.slice(-3);const nm=N(pid);
    if(r3.length===3&&r3.every(x=>!x)){push('🔄',`${nm}의 연패 탈출 미션`,
      `최근 3판 전패 — 바닥을 3번 찍었으면 이제 지하실은 없습니다. 반등 서사의 주인공이 될 수 있을까`,[pid]);break}
  }
  // ⑦ 진영 특화
  for(const x of statPlayerSides(3)){
    if(!all.includes(x.id))continue;
    if(x.bG>=3&&x.rG>=3&&Math.abs(x.bRate-x.rRate)>=25){
      const side=x.bRate>x.rRate?'블루':'레드';
      push('🎲',`${x.name}${josa(x.name,'은','는')} ${side}에서만 ${Math.max(x.bRate,x.rRate)}%`,
        `진영에 따라 승률이 ${Math.abs(x.bRate-x.rRate)}%p나 갈립니다. 오늘은 경기 전 가위바위보가 사실상 1차전`,[x.id]);break}
  }
  // ⑧ 이별 더비
  statDuos(3).filter(d=>d.winRate>=70).forEach(d=>{
    const[x,y]=d.ids;
    if((L.blue.includes(x)&&L.red.includes(y))||(L.blue.includes(y)&&L.red.includes(x)))
      push('💔',`국밥 듀오 해체 매치: ${d.names}`,
        `함께하면 승률 ${d.winRate}%였던 두 사람이 오늘은 적입니다. 서로의 습관을 제일 잘 아는 자들의 심리전`,d.ids);
  });
  // ⑨ 채우기: 출전자 중 MVP 머신 / KDA 1위 / 와드 머신
  if(pts.length<6){
    const S=statPlayers().filter(s=>all.includes(s.id));
    const mvp=[...S].sort((a,b)=>b.mvp-a.mvp)[0];
    if(mvp&&mvp.mvp>=2)push('👑',`MVP 수집가 ${mvp.name} 출전 (통산 ${mvp.mvp}회)`,
      `투표함이 이 선수를 기억합니다. 오늘도 하이라이트 장면을 만들 확률이 가장 높은 사람`,[mvp.id]);
  }
  if(pts.length<6){
    const S=statPlayers().filter(s=>all.includes(s.id)&&s.games>=3);
    const kda=[...S].sort((a,b)=>b.kda-a.kda)[0];
    if(kda&&kda.kda>=3.5)push('💎',`출전자 중 KDA 1위: ${kda.name} (${kda.kda})`,
      `죽지 않는 자가 이깁니다. 이 선수를 잡는 횟수가 곧 상대팀의 승리 지표`,[kda.id]);
  }
  if(pts.length<6){
    const rates=ratesMap();
    const ward=[...all].map(id=>({id,v:rates.get(id)?.vspm||0,g:rates.get(id)?.games||0})).filter(x=>x.g>=3).sort((a,b)=>b.v-a.v)[0];
    if(ward&&ward.v>=1.2)push('🕯',`와드 머신 ${N(ward.id)} — 맵이 밝다`,
      `분당 시야 점수 ${Math.round(ward.v*10)/10}. 이 선수가 있는 쪽 정글은 CCTV 설치 완료입니다`,[ward.id]);
  }
  if(!pts.length&&window._lpUsed&&allLineups().length>1){ // 리매치: 멘트 소진 시 회차 전용 멘트
    const prev=allLineups().find(x=>x.date===L.date&&x.id!==L.id);
    pts.push({e:'🔁',h:`${L.round} — 같은 얼굴, 다른 결말`,
      b:prev?`직전 회차의 승부가 그대로 이어질지, 통째로 뒤집힐지. 한 번 진 팀의 수정 밴픽이 최대 변수입니다`:`연속 매치업 — 서로의 패를 다 본 상태에서의 진검승부입니다`,ids:[]});
  }
  return pts.slice(0,7);
}

/* ───── 중복 의심 검사 (같은 날짜·같은 멤버 구성) ───── */
function suspectDups(){ // 같은 날·같은 멤버라도 게임ID가 서로 다르면 정상 (여러 세트). 의심 = ID 없는 판이 섞였거나 ID가 겹칠 때만
  const g=new Map();
  state.matches.forEach(m=>{
    const who=m.participants.map(p=>p.playerId||norm(p.rawName||'')).sort().join(',');
    const key=m.playedAt+'|'+who;
    if(!g.has(key))g.set(key,[]);
    g.get(key).push(m);
  });
  return[...g.values()].filter(a=>{
    if(a.length<2)return false;
    const ids=a.map(m=>m.gameId).filter(Boolean);
    const allHaveId=ids.length===a.length;
    const allUnique=new Set(ids).size===ids.length;
    return!(allHaveId&&allUnique); // 전부 고유 게임ID면 그냥 여러 판 한 것
  });
}

}

/* ───── 당일 밴픽 라이브 보드 (날짜별, 경기 기록과 독립) ───── */
function liveBoardOf(date){
  state.liveBoards=state.liveBoards&&typeof state.liveBoards==='object'?state.liveBoards:{};
  if(!Array.isArray(state.liveBoards[date]))state.liveBoards[date]=[];
  return state.liveBoards[date];
}
function fearlessState(date,round){ // 하드 피어리스 + 중복 밴 금지 계산
  const ri=ROUNDS.indexOf(round);
  const pickBanned=[]; // 이전 세트 픽 전부 — 이후 영구 금지
  let banBlocked=[];   // 직전 세트 밴 — 이번 세트만 밴 금지
  for(let i=0;i<ri;i++){
    const slug=ROUND_SLUG[ROUNDS[i]]||'';
    const b=(state.liveBoards&&state.liveBoards[date+(slug?'#'+slug:'')])||[];
    b.filter(x=>x.type==='pick').forEach(x=>pickBanned.push({champ:x.champ,round:ROUNDS[i]}));
    if(i===ri-1)banBlocked=b.filter(x=>x.type==='ban').map(x=>x.champ);
  }
  return{pickBanned,banBlocked};
}
function liveAdd(type){
  if(needAdmin())return;
  const c=canonChamp($('lvChamp')?.value||'');
  if(!c||!CHAMPIONS.includes(c))return toast('챔피언 목록에 없는 이름이에요. 자동완성에서 골라주세요.',true);
  const round=window._todayRound||'1차';
  const slug=ROUND_SLUG[round]||'';
  const date=(window._todayDate||todayStr())+(slug?'#'+slug:'');
  const b=liveBoardOf(date);
  if(b.some(x=>x.champ===c))return toast(`${c}는 이미 보드에 있어요.`,true);
  // 🛡 규칙 검증: 하드 피어리스 + 중복 밴 금지
  const FS=fearlessState(window._todayDate||todayStr(),round);
  const fz=FS.pickBanned.find(x=>x.champ===c);
  if(fz)return toast(`🚫 피어리스 위반! ${c}${josa(c,'은','는')} ${fz.round}에서 픽돼서 오늘 다시 못 써요.`,true);
  if(type==='ban'&&FS.banBlocked.includes(c))return toast(`⛔ 중복 밴 금지! ${c}${josa(c,'은','는')} 직전 세트에 밴됐어요 — 이번 세트엔 밴 불가 (픽은 가능).`,true);
  b.push({id:uid('lv'),champ:c,type:type==='ban'?'ban':'pick'});
  if($('lvChamp')){$('lvChamp').value=''}
  save();render();
  setTimeout(()=>{const el=$('lvChamp');if(el)el.focus()});
}
function liveDel(date,id){
  if(needAdmin())return;
  const b=liveBoardOf(date);
  state.liveBoards[date]=b.filter(x=>x.id!==id);
  save();render();
}
function liveClear(date){
  if(needAdmin())return;
  if(!confirm(`${date} 보드를 비울까요?`))return;
  delete state.liveBoards[date];
  save();render();
}


/* ───── 데이터 게시: 깃허브 원클릭 + data.json 직다운 ───── */
const GH_KEY='apodan_gh_v1';
function ghCfg(){try{return JSON.parse(lsGet(GH_KEY)||'{}')}catch(e){return{}}}
function ghSave(){
  if(needAdmin())return;
  const repo=($('ghRepo')?.value||'').trim(),token=($('ghToken')?.value||'').trim();
  if(!/^[\w.-]+\/[\w.-]+$/.test(repo))return toast('저장소는 "아이디/저장소이름" 형식이에요. 예: gildong/apodan-riot-proxy',true);
  if(!token)return toast('토큰을 입력해주세요.',true);
  lsSet(GH_KEY,JSON.stringify({repo,token}));
  toast('연결 완료! 토큰은 이 브라우저에만 저장되고, 백업·공유 파일에는 절대 포함되지 않아요.');render();
}
async function publishData(silent){
  if(needAdmin())return;
  window._publishing=true;
  const cfg=ghCfg();
  if(!cfg.repo||!cfg.token)return toast('먼저 아래 "깃허브 연결"에 저장소와 토큰을 저장해주세요.',true);
  const btn=$('pubBtn');if(btn){btn.disabled=true;btn.textContent='게시 중...'}
  try{
    const api=`https://api.github.com/repos/${cfg.repo}/contents/data.json`;
    const H={Authorization:'Bearer '+cfg.token,Accept:'application/vnd.github+json'};
    let sha=null;
    const g=await fetch(api,{headers:H});
    if(g.status===200)sha=(await g.json()).sha;
    else if(g.status!==404)throw new Error('저장소 확인 실패('+g.status+') — 저장소 이름과 토큰 권한(Contents 읽기/쓰기)을 확인해주세요.');
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(state,null,1))));
    const body={message:'아포단 데이터 갱신 '+new Date().toISOString().slice(0,16).replace('T',' '),content};
    if(sha)body.sha=sha;
    const r=await fetch(api,{method:'PUT',headers:H,body:JSON.stringify(body)});
    if(!r.ok)throw new Error('업로드 실패('+r.status+')');
    state.settings.lastBackupAt=new Date().toISOString();save();lsSet('apodan_dirty','0');
    lsSet('apodan_pubfail','');window._unsynced=false;
    toast(silent?'🔄 자동 게시 완료 — 사이트에 반영됐어요.':'🚀 게시 완료! 1분 안에 멤버들 화면에 반영돼요.');
  }catch(e){
    const msg=String(e&&e.message||e);
    lsSet('apodan_pubfail',msg);
    toast('게시 실패: '+msg,true);
  }

}

/* ───── 전문가 전망: 최근 흐름으로 다음 3판 주가 예측 ───── */
function formForecast(arr){
  if(!arr||arr.length<4)return null;
  const last=arr[arr.length-1];
  const d=(last-arr[Math.max(0,arr.length-4)])/3; // 최근 3판 평균 변화량
  const proj=[1,2,3].map(i=>Math.max(60,Math.min(160,Math.round(last+d*i))));
  const dir=d>1.5?'up':d<-1.5?'down':'flat';
  return{proj,dir,slope:Math.round(d*10)/10};
}

/* ───── 라인 티어표: 라인별 점수·티어·변동 ───── */
const LANE_LIST=['탑','정글','미드','원딜','서폿'];
const LANE_TIERS=['챌린저','그랜드마스터','마스터','다이아몬드','플래티넘'];
function laneScoreRows(excludeDate){ // 점수 = 보정승률 70% + KDA 30% (같은 공식으로 과거 시점도 계산 → 변동 산출)
  const acc=new Map();LANE_LIST.forEach(l=>acc.set(l,new Map()));
  state.matches.forEach(m=>{
    if(excludeDate&&m.playedAt===excludeDate)return;
    m.participants.forEach(p=>{
      const lk=LANE_KO[p.lane];if(!lk||!p.playerId)return;
      const mm=acc.get(lk);
      if(!mm.has(p.playerId))mm.set(p.playerId,{games:0,wins:0,k:0,d:0,a:0});
      const e=mm.get(p.playerId);
      e.games++;if(p.team===m.winnerTeam)e.wins++;
      e.k+=num(p.kills);e.d+=num(p.deaths);e.a+=num(p.assists);
    });
  });
  const out={};
  LANE_LIST.forEach(lane=>{
    out[lane]=[...acc.get(lane).entries()].map(([pid,e])=>{
      const bayes=(e.wins+4)/(e.games+8); // 표본 보정: 판수 적은 100% 승률 과대평가 방지
      const kda=(e.k+e.a)/Math.max(1,e.d);
      return{pid,games:e.games,wins:e.wins,winRate:pct(e.wins,e.games),kda:Math.round(kda*10)/10,
        score:Math.round((bayes*.7+Math.min(1,kda/5)*.3)*1000)/10};
    }).sort((a,b)=>b.score-a.score||b.games-a.games);
  });
  return out;
}
function laneTierBoard(excludeDate){
  const rows=laneScoreRows(excludeDate); const out={};
  LANE_LIST.forEach(lane=>{
    const eligible=rows[lane].filter(r=>r.games>=3);   // 3판부터 티어 부여
    const placing=rows[lane].filter(r=>r.games<3);     // 미만은 배치고사
    eligible.forEach((r,i)=>{
      const p=(i+0.5)/eligible.length;
      r.tier=p<.12?0:p<.32?1:p<.55?2:p<.8?3:4;
      if(r.tier===0&&i>0)r.tier=1; // 챌린저는 1위 단 1명
    });
    if(eligible[0])eligible[0].tier=eligible[0].games>=5?0:Math.max(1,eligible[0].tier); // 최강자 자격은 5판 이상
    placing.forEach(r=>r.tier=null);
    out[lane]={list:[...eligible,...placing],king:eligible[0]&&eligible[0].games>=5?eligible[0]:null};
  });
  return out;
}
function laneTierDelta(){ // 가장 최근 내전일 경기들로 인한 티어 변동 (그 날을 뺀 보드와 비교)
  const dates=[...new Set(state.matches.map(m=>m.playedAt))].sort();
  const lastDate=dates[dates.length-1];
  const board=laneTierBoard(null);
  if(!lastDate)return{board,delta:{},lastDate:null};
  const prev=laneTierBoard(lastDate);
  const delta={};
  const rankDelta={};
  LANE_LIST.forEach(lane=>{
    const pv=new Map(prev[lane].list.map((r,i)=>[r.pid,{tier:r.tier,rank:i}]));
    board[lane].list.forEach((r,i)=>{
      const before=pv.get(r.pid);
      delta[lane+'|'+r.pid]=
        r.tier==null?0
        :(!before||before.tier===null||before.tier===undefined)?'NEW'
        :before.tier-r.tier; // 양수 = 티어 상승
      rankDelta[lane+'|'+r.pid]=before?before.rank-i:null; // 양수 = 순위 상승
    });
  });
  return{board,delta,rankDelta,lastDate};
}
function laneTip(lane,pid,tier,games){ // 비하 금지: 위에는 칭찬, 아래에는 보완점과 방향
  if(tier==null)return`배치고사 진행 중 (${games}/3판) — 3판부터 티어가 떠요`;
  const hex=playerHex(pid,lane);
  if(!hex)return'';
  let hi=0,lo=0;
  hex.vals.forEach((v,i)=>{if(v>hex.vals[hi])hi=i;if(v<hex.vals[lo])lo=i});
  const S=hex.labels[hi],W=hex.labels[lo];
  if(tier===0)return`${lane}의 살아있는 교과서. 특히 ${S}은(는) 따라올 사람이 없어요 👑`;
  if(tier===1)return`${S} 하나는 이 라인 최정상급 — 왕좌까지 정말 한 끗 차이예요`;
  if(tier===2)return`${S}이(가) 확실한 무기. ${W}만 다듬으면 윗 티어가 바로 보입니다`;
  if(tier===3)return`${S}은(는) 이미 충분히 좋아요. 다음 내전에서 ${W}에 집중하면 점프 각`;
  return`기본기는 갖춰져 있어요. ${W}을(를) 의식하며 플레이하면 분명히 올라갑니다 — 티어는 움직이라고 있는 거니까요`;
}

function playerChamps(pid){

/* ───── 라인업 라인별 맞대결 프리뷰 ───── */
function headToHead(a,b){ // a 기준 상대전적
  let meet=0,aw=0;
  state.matches.forEach(m=>{
    const pa=m.participants.find(p=>p.playerId===a),pb=m.participants.find(p=>p.playerId===b);
    if(!pa||!pb||pa.team===pb.team)return;
    meet++;if(pa.team===m.winnerTeam)aw++;
  });
  return{meet,aw,bw:meet-aw};
}
function lineupMatchups(L){
  L=L||allLineups()[0];
  if(!L||L.blue.length!==5||L.red.length!==5)return null;
  const lanes=['탑','정글','미드','원딜','서폿'];
  const tiers=laneTierBoard(null);
  const tierShort=['챌린저','그마','마스터','다이아','플래티넘'];
  const info=(pid,lane)=>{
    const r=(tiers[lane]?.list||[]).find(x=>x.pid===pid);
    return{tier:r&&r.tier!=null?tierShort[r.tier]:null,king:tiers[lane]?.king?.pid===pid,
      price:formSeries(pid).arr.at(-1)||100};
  };
  const rows=lanes.map((lane,i)=>{
    const a=L.blue[i],b=L.red[i];
    const h=headToHead(a,b);
    return{lane,a,b,ai:info(a,lane),bi:info(b,lane),...h,
      heat:h.meet*2+(h.meet>=2&&Math.abs(h.aw-h.bw)<=1?3:0)};
  });
  const big=[...rows].sort((x,y)=>y.heat-x.heat)[0];
  return{rows,big:big&&big.heat>=4?big:null};
}


/* ───── 서브 포인트: 출전자 전원 최소 1회 언급 보장 ───── */
function subMentList(pid,lane){ // 우선순위 후보 목록 — 다회차 카드에서 차순위 멘트 폴백용
  const nm=nameOf(pid);
  const out=[];
  const S=statPlayers().find(s=>s.id===pid);
  const g=S?S.games:0;
  if(!g)return[`데뷔전 — 아포단 전적 첫 페이지를 오늘 씁니다`,`기록 0판의 완전한 변수 — 스카우터들도 노트만 들고 있습니다`];
  if(g<3)out.push(`표본 ${g}판의 미지수 카드 — 오늘 베일을 벗습니다`);
  const tiers=laneTierBoard(null);
  if(lane){
    const row=(tiers[lane]?.list||[]).find(x=>x.pid===pid);
    if(tiers[lane]?.king?.pid===pid)out.push(`${lane} 왕좌 보유자의 방어전 — 도전자를 받습니다`);
    else if(row&&row.tier!=null&&row.tier<=1)out.push(`${lane} 상위 티어(${['챌린저','그랜드마스터'][row.tier]}) — 라인전부터 체급을 증명할 차례`);
  }
  const mcs=playerChamps(pid).filter(c=>c.games>=2&&c.winRate>=60);
  mcs.slice(0,2).forEach(mc=>out.push(`${mc.champ} ${mc.games}판 ${mc.winRate}% — 시그니처 카드 장전 완료`));
  const{wl}=formSeries(pid);const r3=wl.slice(-3);
  if(r3.length>=2&&r3.every(Boolean))out.push(`최근 ${r3.length}연승 — 조용히 뜨거운 손`);
  if(S){
    if(S.winRate>=55)out.push(`통산 승률 ${S.winRate}% (${g}판) — 팀의 안정 자산`);
    if(S.winRate<=45)out.push(`통산 ${S.wins}승 ${S.losses}패 — 오늘부터 반등 시작이라는 각오`);
    if(S.mvp>=1)out.push(`MVP ${S.mvp}회 보유 — 하이라이트 제조 가능성 보유자`);
    if(S.kda>=3)out.push(`통산 KDA ${S.kda} — 쉽게 죽어주지 않는 타입`);
    out.push(`통산 ${S.wins}승 ${S.losses}패의 균형추 — 오늘이 커리어 분기점`);
  }
  out.push(`${nm}, 오늘의 변수 후보 — 조용한 날이 없는 멤버`);
  return out;
}
function subMent(pid,lane){return subMentList(pid,lane)[0]}
function lineupSubPoints(L){
  L=L||allLineups()[0];if(!L)return[];
  const mentioned=new Set();
  lineupPoints(L).forEach(p=>(p.ids||[]).forEach(id=>mentioned.add(id)));

}

function myFanVote(key){return lsGet('apodan_myvote_'+key)||null}
async function castFanVote(team,luId){ // team: 'alpha'|'beta'

  }else{
    toast(`🗳 ${team==='alpha'?'알파':'베타'}팀에 투표 완료! (집계 서버 미연결 — 내 픽만 기록돼요)`);
  }
  render();

async function fetchFanTally(force){
  const api=voteApiBase();if(!api)return;
  const Ls=allLineups();if(!Ls.length)return;
  const now=Date.now();
  if(window._fanBusy)return; // 동시 호출 차단
  if(!force&&window._fanLast&&now-window._fanLast<15000)return; // 렌더→fetch→렌더 폭주(깜빡임) 방지: 15초 쿨다운
  window._fanBusy=true;window._fanLast=now;
  window._fanTallies=window._fanTallies||{};
  for(const L of Ls){
    const key=voteKey(L);
    if(!force&&window._fanTallies[key])continue;
    try{
      const r=await fetch(api+'/api/vote?date='+encodeURIComponent(key));
      const t=await r.json().catch(()=>({}));
      if(!r.ok){window._fanErr=t.error||('HTTP '+r.status);continue}
      window._fanErr=null;
      window._fanTallies[key]={alpha:num(t.alpha),beta:num(t.beta)};
    }catch(e){window._fanErr='연결 실패'}
  }
  window._fanBusy=false;
  // 화면은 "내용이 실제로 바뀌었을 때만" 다시 그림 — 입력 중 끊김 방지
  const snap=JSON.stringify([window._fanTallies,window._fanErr||'']);
  if(snap!==window._fanSnap){window._fanSnap=snap;try{render()}catch(e){}}
  if(window.__noFanPoll)return;
  clearTimeout(window._fanPoll);
  window._fanPoll=setTimeout(()=>fetchFanTally(true),30000);
}
function fanOdds(luId){
  const L=lineupOf(luId);if(!L)return null;
  const t=(window._fanTallies||{})[voteKey(L)]||window._fanTally;
  if(!t)return null;
  const total=num(t.alpha)+num(t.beta);
  if(!total)return{total:0};
  const pa=Math.round(t.alpha/total*100);
  const margin=.97;
  return{total,alpha:t.alpha,beta:t.beta,probAlpha:pa,
    oddsAlpha:Math.max(1.05,Math.round(1/Math.max(.05,t.alpha/total)/margin*100)/100),
    oddsBeta:Math.max(1.05,Math.round(1/Math.max(.05,t.beta/total)/margin*100)/100)};
}
function cleanVoteApi(v){ // 테스트 URL 전체를 붙여넣어도 베이스 주소만 추출
  v=String(v||'').trim().replace(/^["']+|["']+$/g,'');
  if(!v)return'';
  if(!/^https?:\/\//.test(v))v='https://'+v;
  const m=v.match(/^https?:\/\/[^\/\s?#]+/);
  return m?m[0]:'';
}
function voteApiBase(){return cleanVoteApi(state.settings.voteApiUrl)}
function saveVoteApi(){

  const v=cleanVoteApi(raw);

}

/* ═══════════ 아포단 거래소(APEX) Phase 1 — 지갑·계정 ═══════════ */
const BANK_TOKEN_KEY='apodan_bank_token';
function bankToken(){return lsGet(BANK_TOKEN_KEY)||''}
function bankSession(){ // 새로고침 직후에도 캐시로 즉시 로그인 상태 유지
  if(window._bank)return window._bank;
  if(!bankToken())return null;
  try{const c=JSON.parse(lsGet('apodan_bank_me')||'null');
    if(c&&c.name!==undefined)return Object.assign({bal:null,ledger:[],holdings:{},prices:{},cached:true},c);
  }catch(e){}
  return null;
}
async function bankCall(action,body,method){
  if(state.settings&&state.settings.maintenance&&lsGet(ADMIN_FLAG)!=='1')throw new Error('🛠 서버 업데이트 중 — 잠시 후 다시 시도해주세요!');
  const api=voteApiBase();
  if(!api)throw new Error('서버 미연결 — 설정에서 투표 서버(같은 주소)를 먼저 연결해주세요');
  const url=api+'/api/bank?action='+encodeURIComponent(action)+(method==='GET'&&bankToken()?'&token='+encodeURIComponent(bankToken()):'');
  const opt=method==='GET'?{}:{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({token:bankToken()},body||{}))};
  const r=await fetch(url,opt);
  const j=await r.json().catch(()=>({}));
  if(!r.ok){const e=new Error(j.error||('HTTP '+r.status));e.status=r.status;throw e}
  return j;
}
async function bankRegister(){
  const name=($('bkName')?.value||'').trim(),pin=($('bkPin')?.value||'').trim();
  if(!name)return toast('명단에서 본인 이름을 골라주세요.',true);

    await bankCall('register',{name,pin});

  }catch(e){toast('신청 실패: '+e.message,true)}
}
async function bankLogin(){
  const name=($('bkName')?.value||'').trim(),pin=($('bkPin')?.value||'').trim();
  if(!pin)return toast('비밀번호를 입력해주세요.',true);
  try{
    const j=await bankCall('login',{name,pin});

    if(j.role==='admin'||j.role==='dev'){ // 로그인으로 퉁: 운영진·개발자는 기록 수정 권한 자동 ON

function bankLogout(){
  lsSet(BANK_TOKEN_KEY,'');lsSet('apodan_bank_me','');window._bank=null;window._bankRoster=null;
  if(lsGet('apodan_admin_via_bank')==='1'){lsSet('apodan_admin_via_bank','');lsSet(ADMIN_FLAG,'');} // 계정으로 받은 편집 권한 회수
  render();toast('로그아웃했어요.');
}
async function bankRefresh(force){
  if(!bankToken()||!voteApiBase())return;
  if(window._bankBusy&&!force)return;
  if(!force&&window._bankLast&&Date.now()-window._bankLast<20000)return;
  const tk=bankToken(); // stale 가드: 도중에 로그인/아웃되면 이 결과는 폐기
  window._bankBusy=true;window._bankLast=Date.now();
  try{
    const me=await bankCall('me',null,'GET');
    if(bankToken()!==tk){window._bankBusy=false;return}
    window._bank=me;
    lsSet('apodan_bank_me',JSON.stringify({name:me.name,role:me.role}));
    if(me.role==='admin'||me.role==='dev'){
      try{window._bankPending=(await bankCall('pending',null,'GET')).pending}catch(e){}
      pushPrices(); // 시세 자동 갱신 (10분 쿨다운)
    }
  }catch(e){
    if(bankToken()===tk&&(e.status===401||e.status===403)){ // 진짜 인증 실패만 로그아웃 — 네트워크 끊김은 세션 유지
      window._bank=null;lsSet(BANK_TOKEN_KEY,'');lsSet('apodan_bank_me','');
      if(lsGet('apodan_admin_via_bank')==='1'){lsSet('apodan_admin_via_bank','');lsSet(ADMIN_FLAG,'');}
      toast('세션이 만료됐어요 — 다시 로그인해주세요.',true);
    }
  }
  try{window._bankRoster=(await bankCall('roster',null,'GET')).roster}catch(e){}
  try{window._srvPx=(await bankCall('prices',null,'GET')).prices||{}}catch(e){} // 모두가 같은 서버 시세를 본다
  window._bankBusy=false;
  const snap=JSON.stringify([window._bank,window._bankRoster,window._bankPending]);
  if(snap!==window._bankSnap){window._bankSnap=snap;try{render()}catch(e){}}
}
async function bankLoadRoster(){ // 비로그인도 랭킹 열람
  if(!voteApiBase()||window._bankBusy)return;
  if(window._bankRoster&&window._bankLast&&Date.now()-window._bankLast<20000)return;
  window._bankBusy=true;window._bankLast=Date.now();

}

/* ═══════════ APEX Phase 2 — 승부 예측 베팅 (클라이언트) ═══════════ */
function myTeamIn(L){ // 본인 출전 경기면 자기 팀만 베팅 가능 (승부조작 차단)
  const B=bankSession(); if(!B||!B.name)return null;
  const p=state.players.find(x=>x.displayName===B.name);
  if(!p)return null;
  if((L.blue||[]).includes(p.id))return'alpha';
  if((L.red||[]).includes(p.id))return'beta';
  return null;
}
function mktOdds(a,b){ // 변동 배당 (수수료 3% 반영)
  const total=(a+b)*0.97;
  return{
    alpha:a>0?Math.max(1.01,Math.round(total/a*100)/100):null,
    beta:b>0?Math.max(1.01,Math.round(total/b*100)/100):null};
}
async function fetchMarkets(force){
  const api=voteApiBase();if(!api)return;
  const Ls=allLineups();if(!Ls.length)return;
  if(window._mktBusy)return;
  if(!force&&window._mktLast&&Date.now()-window._mktLast<15000)return;
  window._mktBusy=true;window._mktLast=Date.now();
  window._mkts=window._mkts||{};
  for(const L of Ls){
    const key=voteKey(L);
    try{
      const r=await fetch(api+'/api/bank?action=market&market='+encodeURIComponent(key)+(bankToken()?'&token='+encodeURIComponent(bankToken()):''));
      const j=await r.json().catch(()=>({}));
      if(r.ok)window._mkts[key]=j;
    }catch(e){}
  }
  window._mktBusy=false;
  const snap=JSON.stringify(window._mkts);
  if(snap!==window._mktSnap){window._mktSnap=snap;try{render()}catch(e){}}
  if(window.__noFanPoll)return;
  clearTimeout(window._mktPoll);
  window._mktPoll=setTimeout(()=>fetchMarkets(true),30000);
}
async function bankBet(team,luId){
  const L=lineupOf(luId);if(!L)return;
  const B=bankSession();
  if(B&&B.role==='dev'&&!B.name)return toast('🛠 개발자 유령 세션은 지갑이 없어요 — 베팅은 본인 멤버 계정으로!',true);
  if(!B||!B.name)return toast('💰 거래소 탭에서 먼저 로그인해주세요!',true);
  const only=myTeamIn(L);
  if(only&&team!==only)return toast('본인 출전 경기예요 — 자기 팀 승리에만 베팅할 수 있어요 (승부조작 방지 🙅)',true);
  const amt=Math.round(Number($('betAmt_'+luId)?.value)||0);
  if(amt<100)return toast('최소 베팅은 100 APO예요.',true);
  const allin=B.bal!==null&&amt>=B.bal;
  if(allin&&!confirm(`🚨 전 재산 ${fmtAPO(amt)} APO 올인입니다.\n빗나가면 파산 → 새출발 지원금 1,000 APO + 파산 횟수 박제 💀\n정말 가시나요?`))return;
  try{
    const j=await bankCall('bet',{market:voteKey(L),team,amount:amt});
    window._bank&&(window._bank.bal=j.bal);
    toast(j.allin?`🚨 올인 접수!! ${team==='alpha'?'알파':'베타'}에 전부 걸었습니다. 행운을 빕니다`:`🎰 ${fmtAPO(amt)} APO → ${team==='alpha'?'알파':'베타'} 베팅 완료!`);
    await fetchMarkets(true);await bankRefresh(true);
  }catch(e){toast('베팅 실패: '+e.message,true)}

async function bankLock(luId,open){
  const L=lineupOf(luId);if(!L)return;
  try{await bankCall('lock',{market:voteKey(L),open:!!open});toast(open?'베팅 재개':'⛔ 베팅 마감!');await fetchMarkets(true)}

async function bankSettle(luId,winner){

/* ═══════════ APEX Phase 3 — 멤버 주식·참여 수당·파산 속보 (클라) ═══════════ */

async function pricesAfterMatch(){ // 🆕 경기 등록 → 거래소·차트 즉각 반영
  if(!voteApiBase())return;
  try{
    await pushPrices(true); // 폼 변동을 기준가에 즉시
    try{window._srvPx=(await bankCall('prices',null,'GET')).prices||{}}catch(e){}
    if(window._stockSel)loadPxHist(window._stockSel);
    render();
  }catch(e){}
}
async function pushPrices(force){ // 폼 주가 → 거래소 시세 송출. force=경기 등록 직후 즉시!
  const B=bankSession();
  if(!B||(B.role!=='admin'&&B.role!=='dev')||!voteApiBase())return;
  if(!force&&window._pxLast&&Date.now()-window._pxLast<120000)return;
  window._pxLast=Date.now();
  const prices={};
  state.players.filter(p=>p.active).forEach(p=>{prices[p.displayName]=marketPrice(p)});
  try{await bankCall('setPrices',{prices})}catch(e){}
}
function stockPx(name){ // 화면 시세 = 체결 시세. 미상장은 폼 주가(=상장될 가격)
  const sv=window._srvPx||{};
  if(sv[name])return sv[name];
  const me=bankSession();
  if(me&&me.prices&&me.prices[name])return me.prices[name];
  return null;
}
function displayPx(name){ // 전광판용: 상장가까지 포함
  const srv=stockPx(name);
  if(srv)return{px:srv,listed:true};
  const p=state.players.find(x=>x.displayName===name);
  return{px:p?marketPrice(p):100,listed:false};
}
function resolveStock(raw){ // 종목 엄격 해석 — 유령 종목("ㅁㄹ" 등) 원천 차단
  raw=String(raw||'').trim();
  if(!raw)return{err:'종목(멤버)을 골라주세요.'};
  const act=state.players.filter(p=>p.active);
  const exact=act.find(p=>p.displayName===raw);
  if(exact)return{p:exact};
  const cands=act.filter(p=>searchHit(p,raw));
  if(cands.length===1)return{p:cands[0]};
  if(cands.length>1)return{err:`"${raw}" 후보가 ${cands.length}명: ${cands.slice(0,4).map(c=>c.displayName).join(', ')} — 시세판에서 클릭해 정확히 골라주세요.`};
  return{err:`"${raw}"는 명단에 없는 이름이에요 — 시세판에서 종목을 클릭해주세요.`};
}
async function stockTrade(side){
  const B=bankSession();
  if(B&&B.role==='dev'&&!B.name)return toast('🛠 개발자 유령 세션은 지갑이 없어요 — 거래는 본인 멤버 계정으로 로그인해서 해주세요!',true);
  if(!B||!B.name)return toast('💰 먼저 로그인해주세요!',true);
  const R=resolveStock($('stTarget')?.value);
  if(R.err)return toast(R.err,true);
  const tgt=R.p.displayName;
  const qty=Math.round(Number($('stQty')?.value)||0);
  if(qty<1||qty>999)return toast('수량은 1~999주로 입력해주세요.',true);
  // 🧾 주문 확인: 누구를, 몇 주, 얼마에, 총액까지 또박또박
  const D=displayPx(tgt);
  const base=D.px*qty;
  const isSelf=tgt===B.name;
  const fee=Math.ceil(base*0.01);
  const roy=side==='buy'&&!isSelf?Math.floor(base*0.02):0;
  const total=side==='buy'?base+fee+roy:Math.floor(base*0.99);
  const held=(B.holdings&&B.holdings[tgt]&&B.holdings[tgt].q)||0;
  if(side==='sell'&&held<qty)return toast(`보유 ${held}주뿐이에요 — 수량을 확인해주세요.`,true);
  const msg=side==='buy'
    ?`🧾 매수 주문 확인\n\n종목: ${tgt}${D.listed?'':' (첫 거래 — 폼 주가로 상장)'}\n수량: ${qty}주 × @${D.px}\n──────────\n주식 대금 ${fmtAPO(base)}\n+ 수수료 1% ${fmtAPO(fee)}\n+ 초상권료 2% ${fmtAPO(roy)}${isSelf?' (본인 — 면제)':''}\n= 총 ${fmtAPO(total)} APO 지불\n\n이대로 체결할까요?`
    :`🧾 매도 주문 확인\n\n종목: ${tgt} (보유 ${held}주)\n수량: ${qty}주 × @${D.px}\n──────────\n수수료 1% 차감 후 약 ${fmtAPO(total)} APO 입금\n\n이대로 체결할까요?`;
  if(!confirm(msg))return;
  window._stTgt=tgt;if($('stTarget'))$('stTarget').value=tgt; // 확정 이름으로 교정 (상태 보존)
  try{

/* ───── 초성 검색 + 시장 시세 엔진 ───── */
const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function choseong(s){ // "미르" → "ㅁㄹ"
  return String(s||'').split('').map(ch=>{
    const c=ch.charCodeAt(0);
    return(c>=0xAC00&&c<=0xD7A3)?CHO[Math.floor((c-0xAC00)/588)]:ch;
  }).join('');
}
function matchKo(label,q){ // 한글 만능 매칭: 글자는 글자대로, 자음은 초성으로 ("미ㄹ"→미르, "ㅇㅁ"→유메)
  const L=String(label||'').replace(/\s+/g,'').toLowerCase();
  const Q=String(q||'').replace(/\s+/g,'').toLowerCase();
  if(!Q)return true;
  if(!L)return false;
  const cho=ch=>{const c=ch.charCodeAt(0);return(c>=0xAC00&&c<=0xD7A3)?CHO[Math.floor((c-0xAC00)/588)]:ch};
  for(let s=0;s<=L.length-Q.length;s++){
    let ok=true;
    for(let i=0;i<Q.length;i++){
      const lc=L[s+i],qc=Q[i];
      if(qc!==lc&&qc!==cho(lc)){ok=false;break}
    }
    if(ok)return true;
  }
  return false;
}
function searchHit(p,q){ // 이름·별명 광범위 매칭
  q=String(q||'').trim();if(!q)return true;
  return labelsOf(p).some(l=>matchKo(l,q));
}
function dailyJitter(name){ // 날짜+이름 시드 → -1~1 (모두에게 동일한 "오늘의 시장 분위기")
  const seed=(new Date(Date.now()+9*3600*1000).toISOString().slice(0,10))+'|'+name;
  let h=0;for(let i=0;i<seed.length;i++){h=(h*31+seed.charCodeAt(i))>>>0}
  return((h%2001)/1000)-1;
}
function marketPrice(p){ // 거래소 기준가 = 폼 주식 페이지 가격과 완전히 동일 (1:1 연동)
  const base=formSeries(p.id).arr.at(-1)||100;
  return Math.max(10,Math.min(999,Math.round(base)));
}

/* ───── 🔥 확실한 라이벌 & 💙 최고의 친구 ───── */
function rivalOf(id){ // 많이 만났고 전적이 팽팽한 상대
  const opp={};
  state.matches.forEach(m=>{
    const me=m.participants.find(p=>p.playerId===id);if(!me)return;
    const iWon=me.team===m.winnerTeam;
    m.participants.filter(p=>p.playerId&&p.team!==me.team).forEach(p=>{
      opp[p.playerId]=opp[p.playerId]||{g:0,w:0};
      opp[p.playerId].g++;if(iWon)opp[p.playerId].w++;
    });
  });
  let best=null;
  Object.entries(opp).forEach(([pid,o])=>{
    if(o.g<3)return;
    const score=o.g*2-Math.abs(o.w*2-o.g)*3; // 다전 + 팽팽함
    if(!best||score>best.score)best={pid,g:o.g,w:o.w,l:o.g-o.w,score};
  });
  return best?{id:best.pid,name:nameOf(best.pid),g:best.g,w:best.w,l:best.l}:null;
}
function bestieOf(id){ // 같은 팀일 때 가장 잘 풀리는 단짝
  const tm={};
  state.matches.forEach(m=>{
    const me=m.participants.find(p=>p.playerId===id);if(!me)return;
    const iWon=me.team===m.winnerTeam;
    m.participants.filter(p=>p.playerId&&p.playerId!==id&&p.team===me.team).forEach(p=>{
      tm[p.playerId]=tm[p.playerId]||{g:0,w:0};
      tm[p.playerId].g++;if(iWon)tm[p.playerId].w++;
    });
  });
  let best=null;
  Object.entries(tm).forEach(([pid,o])=>{
    if(o.g<3)return;
    const wr=o.w/o.g;
    const score=wr*100+o.g*2;
    if(!best||score>best.score)best={pid,g:o.g,w:o.w,wr:Math.round(wr*100),score};
  });
  return best?{id:best.pid,name:nameOf(best.pid),g:best.g,w:best.w,wr:best.wr}:null;
}
function rivalPressure(myId,rivalId){ // 라이벌 상승세 감지 → 긴장 멘트
  const d=id=>{const a=formSeries(id).arr;return(a.at(-1)||100)-(a[Math.max(0,a.length-6)]||100)};
  const mine=d(myId),his=d(rivalId);
  if(his-mine>=8)return{level:'danger',txt:`🚨 라이벌이 상승세(${his>=0?'+':''}${his})인데 나는 ${mine>=0?'+':''}${mine} — 격차 벌어지는 중, 긴장하세요!`};
  if(mine-his>=8)return{level:'good',txt:`😎 지금은 내가 우위 — 내 폼 ${mine>=0?'+':''}${mine} vs 라이벌 ${his>=0?'+':''}${his}`};
  return{level:'even',txt:`⚖ 둘 다 비슷한 흐름 (나 ${mine>=0?'+':''}${mine} · 라이벌 ${his>=0?'+':''}${his}) — 다음 맞대결이 분수령`};
}

    items.push(`☠️ <b>오늘 내전 진행 중</b> — 픽 ${pk}챔프 잠김 · 밴 ${bn}챔프 (당일 밴픽 탭)`);
  }
  // 3) 가장 최근 내전 결과 한 줄 요약
  const dates=[...new Set(state.matches.map(m=>m.playedAt))].sort();
  const last=dates[dates.length-1];
  if(last){
    const dm=state.matches.filter(m=>m.playedAt===last);
    const bw=dm.filter(m=>m.winnerTeam==='BLUE').length;
    items.push(`최근 내전 <b>${esc(last)}</b> — ${dm.length}세트 진행 (블루 ${bw} : 레드 ${dm.length-bw})`);
    const mvps=dm.filter(m=>m.mvpId).map(m=>nameOf(m.mvpId));
    if(mvps.length)items.push(`그날의 MVP: <b>${esc([...new Set(mvps)].join(', '))}</b>`);
  }
  // 3.4) 📈 주식 급등락 + 🎰 베팅 풀 속보
  (()=>{
    const px=window._srvPx||{};
    const movers=Object.keys(px).map(n=>{
      const p=state.players.find(x=>x.displayName===n);
      return p?{n,d:px[n]-marketPrice(p),px:px[n]}:null;
    }).filter(x=>x&&Math.abs(x.d)>=2).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
    movers.slice(0,2).forEach(m=>items.push(`${m.d>0?'📈':'📉'} <b>${esc(m.n)}</b> 주가 ${m.px} APO (${m.d>0?'▲':'▼'}${Math.abs(m.d)} 수급 ${m.d>0?'프리미엄':'할인'})`));
    (window._trades||[]).slice(0,2).forEach(tr=>{
      items.push(`⚡ <b>속보:</b> <b>${esc(tr.n)}</b>${josa(tr.n,'이','가')} <b>${esc(tr.t)}</b> ${tr.q}주 ${tr.s==='b'?'📈 매수':'📉 매도'} @${tr.p} — ${agoKo(tr.ts)}`);
    });
    Object.entries(window._mkts||{}).forEach(([k,M])=>{
      const tot=(M.alpha||0)+(M.beta||0);
      if(tot>=500&&M.status==='open')items.push(`🎰 <b>${esc(k)}</b> 베팅 풀 ${fmtAPO(tot)} APO — 민심 ${Math.round(M.alpha/tot*100)}:${Math.round(M.beta/tot*100)}`);
    });
  })();
  // 3.5) 💀 파산 속보 (최근 48시간)
  recentBusts(48).slice(0,2).forEach(r=>{
    items.push(`💀 <b>속보:</b> ${esc(r.name)}, 통산 ${r.bust}호 파산 선언 — 새출발을 응원합니다`);
  });
  // 4) 라인 최강자 (왕좌 현황)
  try{
    const{board}=laneTierDelta();
    const kings=LANE_LIST.filter(l=>board[l]&&board[l].king).map(l=>`${l} <b>${esc(nameOf(board[l].king.pid))}</b>`);
    if(kings.length)items.push(`👑 현재 라인 최강자 — ${kings.join(' · ')}`);
  }catch(e){}
  if(!items.length)items.push('아직 기록된 내전이 없습니다 — 기록하기 탭에서 첫 경기를 등록해보세요');
  const html=items.map(t=>`<span>${t}</span>`).join('');
  $('ticker').innerHTML=html+html; // 무한 루프용 2배
}

function afterRecord(){
  const drop=$('drop'),input=$('shotFile');
  input.onchange=e=>addShots([...e.target.files]);
  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over')}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over')}));
  drop.addEventListener('drop',e=>addShots([...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'))));
  renderThumbs();
}
document.addEventListener('paste',e=>{ // 캡처 후 Ctrl+V
  if(tab!=='record')return;
  const files=[...(e.clipboardData?.files||[])].filter(f=>f.type.startsWith('image/'));
  if(files.length){addShots(files);toast('클립보드 이미지를 추가했어요.')}
});
function addShots(files){
  files.forEach(f=>shots.push({file:f,url:URL.createObjectURL(f)}));
  renderThumbs();
}
function delShot(i){URL.revokeObjectURL(shots[i].url);shots.splice(i,1);renderThumbs()}
function renderThumbs(){
  const el=$('thumbs'); if(!el)return;
  el.innerHTML=shots.map((s,i)=>`<div class="thumb"><img src="${s.url}" alt=""><button onclick="delShot(${i})" title="제거">✕</button></div>`).join('');
}

function savePlayerForm(){

  const{riotName,riotTag}=parseRiot($('fpRiot').value.trim());
  const aliases=$('fpAlias').value.split(',').map(x=>x.trim()).filter(Boolean);
  const memo=$('fpMemo').value.trim();

    if(findPlayer(name))return toast('이미 비슷한 이름이 있어요. 필요하면 병합 기능을 쓰세요.',true);

function delPlayer(id){

  if(used)return toast('경기 기록이 있는 사람은 삭제 대신 휴면 처리하거나 병합해주세요.',true);
  if(!confirm('완전히 삭제할까요?'))return;
  state.players=state.players.filter(p=>p.id!==id);

  if(!t.riotName&&f.riotName){t.riotName=f.riotName;t.riotTag=f.riotTag}
  state.matches.forEach(m=>{
    m.participants.forEach(p=>{if(p.playerId===from)p.playerId=to});
    if(m.mvpId===from)m.mvpId=to;
  });
  state.voteRooms.forEach(v=>(v.votes||[]).forEach(x=>{if(x.playerId===from)x.playerId=to}));
  state.players=state.players.filter(p=>p.id!==from);
  save();render();toast(`${f.displayName} 기록을 ${t.displayName}(으)로 합쳤어요.`);
}
function syncRoster(){
  if(needAdmin())return;
  let added=0,filled=0;
  ROSTER.forEach(e=>{
    const hit=findPlayer(e.n)||(e.r?findPlayer(e.r):null);
    if(!hit){state.players.push(rosterToPlayer(e));added++}
    else if(!hit.riotName&&e.r){const{riotName,riotTag}=parseRiot(e.r);hit.riotName=riotName;hit.riotTag=riotTag;filled++}
  });
  save();render();toast(`누락 ${added}명 추가, 롤 닉네임 ${filled}건 보강했어요.`);
}

/* ───── 1:1 비교 ───── */
function pgCompare(){
  const rates=ratesMap();
  const P=statPlayers().filter(s=>rates.get(s.id)?.games>=1);
  if(P.length<2)return head('1:1 비교','두 명 이상 경기 기록이 있어야 비교할 수 있어요.')+'<div class="empty">경기를 더 기록해주세요.</div>';
  if(!window._cmpA||!P.some(s=>s.id===window._cmpA))window._cmpA=P[0].id;
  if(!window._cmpB||!P.some(s=>s.id===window._cmpB)||window._cmpB===window._cmpA)window._cmpB=(P.find(s=>s.id!==window._cmpA)||P[1]).id;
  const A=P.find(s=>s.id===window._cmpA),B=P.find(s=>s.id===window._cmpB);
  const rA=rates.get(A.id),rB=rates.get(B.id);
  const lanesA=playerLanes(A.id),lanesB=playerLanes(B.id);
  const laneA=(window._cmpLA&&lanesA.some(l=>l.lane===window._cmpLA))?window._cmpLA:(lanesA[0]?.lane||null);
  const laneB=(window._cmpLB&&lanesB.some(l=>l.lane===window._cmpLB))?window._cmpLB:(lanesB[0]?.lane||null);
  const hA=playerHex(A.id,laneA),hB=playerHex(B.id,laneB);
  const sel=(id,val)=>`<select onchange="window._cmp${id}=this.value;window._cmpL${id}=null;render()" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:9px;min-width:0;width:100%">${P.map(s=>`<option value="${s.id}"${s.id===val?' selected':''}>${esc(s.name)}</option>`).join('')}</select>`;
  const laneSel=(id,lanes,val)=>lanes.length>1?`<select onchange="window._cmpL${id}=this.value;render()" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:9px;min-width:0;width:100%;margin-top:6px">${lanes.map(l=>`<option value="${l.lane}"${l.lane===val?' selected':''}>${esc(l.lane)} (${l.games}판)</option>`).join('')}</select>`:(lanes[0]?`<p class="mini dim" style="margin:6px 0 0">${esc(lanes[0].lane)} ${lanes[0].games}판</p>`:'');
  const f1=v=>Math.round(v*10)/10;
  const rows=[
    ['승률',A.winRate,B.winRate,'%','높을수록'],
    ['전적',null,null,'',''],
    ['KDA',A.kda,B.kda,'','높을수록'],
    ['분당 딜 (DPM)',Math.round(rA.dpm),Math.round(rB.dpm),'','높을수록'],
    ['분당 CS (CSPM)',f1(rA.cspm),f1(rB.cspm),'','높을수록'],
    ['분당 시야',f1(rA.vspm),f1(rB.vspm),'','높을수록'],
    ['킬관여율',rA.kp,rB.kp,'%','높을수록'],
    ['골드 효율 (1천골드당 딜)',Math.round(rA.dpg),Math.round(rB.dpg),'','높을수록'],
    ['경기당 데스',f1(rA.deathsPg),f1(rB.deathsPg),'','낮을수록'],
    ['평균 딜량',rA.avgDmg,rB.avgDmg,'','높을수록'],
    ['솔로킬 누적',rA.solo,rB.solo,'','높을수록'],
    ['MVP',A.mvp,B.mvp,'','높을수록']
  ];
  const tr=rows.map(([l,a,b,unit,dir])=>{
    if(l==='전적')return`<tr><td>전적</td><td class="num">${A.wins}승 ${A.losses}패</td><td class="num">${B.wins}승 ${B.losses}패</td></tr>`;
    if(l==='솔로킬 누적'&&!a&&!b)return'';
    const aw=dir==='낮을수록'?a<b:a>b, bw=dir==='낮을수록'?b<a:b>a;
    return`<tr><td>${l}</td>
      <td class="num ${aw?'up':''}" style="${aw?'font-weight:800':''}">${fmt(a)}${unit}</td>
      <td class="num ${bw?'up':''}" style="${bw?'font-weight:800':''}">${fmt(b)}${unit}</td></tr>`;
  }).join('');
  const laneNote=x=>x.laneScoped?`${x.lane} 포지션 내 상대평가`:'전체 멤버 기준 상대평가';
  // 더비 데이터: 맞대결 + 한 팀 동행 기록
  let meet=0,awin=0,recent=[];let dgames=0,dwins=0;
  [...state.matches].sort((x,y)=>sortKey(x).localeCompare(sortKey(y))).forEach(m=>{
    const pa=m.participants.find(p=>p.playerId===A.id),pb=m.participants.find(p=>p.playerId===B.id);
    if(!pa||!pb)return;
    if(pa.team!==pb.team){meet++;const w=pa.team===m.winnerTeam;if(w)awin++;recent.push(w)}
    else{dgames++;if(pa.team===m.winnerTeam)dwins++}
  });
  const derbyTitle=meet>=4&&Math.abs(awin-(meet-awin))<=1?'⚡ 아포단 엘 클라시코'
    :meet>=3&&(awin/meet>=.75||awin/meet<=.25)?'🦁 천적 매치':meet>=1?'🤜🤛 맞대결':'';
  const derby=meet?`<div class="derby">
    <div class="mini" style="letter-spacing:.2em;color:var(--gold);font-weight:800">${derbyTitle}</div>
    <div style="font-size:22px;font-weight:900;margin:4px 0"><span style="color:var(--gold)">${esc(A.name)}</span> <span class="dim" style="font-size:15px">${meet}전</span> <span style="color:var(--win)">${esc(B.name)}</span></div>
    <div style="font-size:17px;font-weight:800">${awin} <span class="dim mini">vs</span> ${meet-awin}</div>
    <div class="row" style="justify-content:center;gap:5px;margin-top:7px">${recent.slice(-5).map(w=>`<span class="pill" style="background:${w?'rgba(242,184,75,.25)':'rgba(63,217,197,.25)'};font-weight:800">${w?esc(A.name).slice(0,4):esc(B.name).slice(0,4)} 승`).map(x=>x+'</span>').join('')}</div>
    ${dgames?`<p class="mini dim" style="margin:8px 0 0">같은 팀이었을 땐 ${dgames}판 ${pct(dwins,dgames)}% — ${pct(dwins,dgames)>=60?'적보다 아군일 때 무서운 조합':'한 팀이어도 화학반응은 미지수'}</p>`:''}
  </div>`:'';
  return head('1:1 비교','LCK 맞대결 그래픽처럼. 육각형은 각자 "자기 포지션 안에서의 위치", 표는 실제 수치예요.')+`
  <div class="card">
    ${derby}
    <div class="grid c2" style="margin:14px 0">
      <div class="f"><label style="color:var(--gold)">🟡 선수 A</label>${sel('A',A.id)}${laneSel('A',lanesA,laneA)}</div>
      <div class="f"><label style="color:var(--win)">🟢 선수 B</label>${sel('B',B.id)}${laneSel('B',lanesB,laneB)}</div>
    </div>
    <div class="grid c2" style="align-items:center">
      <div style="text-align:center">${hA.labels.join()===hB.labels.join()
        ?radarSvg2(hA.vals,hB.vals,hA.labels)
        :`<div class="grid c2">
            <div>${radarSvg(hA.vals,hA.labels,250)}<p class="mini" style="margin:2px 0 0;color:var(--gold)">${esc(A.name)}</p></div>
            <div>${radarSvg(hB.vals,hB.labels,250)}<p class="mini" style="margin:2px 0 0;color:var(--win)">${esc(B.name)}</p></div>
          </div><p class="mini dim" style="margin:8px 0 0">두 선수의 포지션이 달라 측정 축이 달라요. 각자 자기 라인 기준 차트입니다.</p>`}
        <p class="mini" style="margin:6px 0 0"><b style="color:var(--gold)">${esc(A.name)}</b> (${laneNote(hA)}) vs <b style="color:var(--win)">${esc(B.name)}</b> (${laneNote(hB)})</p></div>
      <div class="scrollx"><table class="tbl"><thead><tr><th>지표</th><th class="num" style="color:var(--gold)">${esc(A.name)}</th><th class="num" style="color:var(--win)">${esc(B.name)}</th></tr></thead><tbody>${tr}</tbody></table>
      <p class="mini dim" style="margin-top:8px">굵은 초록 = 우세. 분당 지표는 경기 시간이 기록된 판 기준이고, 시간이 없는 옛 기록은 28분으로 가정해 계산해요.</p></div>
    </div>
  </div>`;
}

    return`<tr><td><b>${esc(r.p.displayName)}</b></td><td>${sparkSvg(r.arr,300,62,fc?fc.proj:null)}${fc?'<div class="mini dim" style="margin-top:2px">초록 점선 = 예측 구간</div>':''}</td>

  </details>
  </div>`;

function pgMvp(){

  return head('MVP 투표','로컬 베타: 같은 브라우저에서 모여서 투표할 때 사용. 카톡 링크 공유형 투표는 온라인화 후 완성됩니다.')+`
  <div class="grid c2">
    <div class="card"><h3>투표 열기</h3>
      ${ms.length?`<div class="f"><label>경기 선택</label><select id="vmMatch">${ms.map(m=>`<option value="${m.id}">${esc(m.playedAt)} ${m.setNumber}세트 · ${m.winnerTeam==='BLUE'?'블루':'레드'} 승</option>`).join('')}</select></div>
      <div class="f" style="margin-top:10px"><label>제한 시간 (분)</label><input id="vmMin" type="number" min="1" value="${state.settings.mvpMinutes||10}"></div>
      <button class="btn gold" style="margin-top:12px" onclick="openVote()">투표 열기</button>`:'<div class="empty">먼저 경기를 기록해주세요.</div>'}
    </div>
    <div class="card"><h3>진행 중인 투표</h3>${voteList()}</div>
  </div>`;
}
function voteList(){
  if(!state.voteRooms.length)return'<div class="empty">열린 투표가 없어요.</div>';
  return state.voteRooms.map(v=>{
    const m=state.matches.find(x=>x.id===v.matchId); if(!m)return'';
    const left=Math.max(0,v.endsAt-Date.now()),closed=left<=0;
    const cnt={};(v.votes||[]).forEach(x=>cnt[x.playerId]=(cnt[x.playerId]||0)+1);
    return`<div style="border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px;background:var(--panel2)">
      <div class="row"><b>${esc(m.playedAt)} ${m.setNumber}세트</b><span class="pill ${closed?'lose':'win'}">${closed?'마감':'진행 중 · '+Math.ceil(left/60000)+'분'}</span></div>
      <div class="f" style="margin:10px 0"><label>투표자 이름 (중복 방지)</label><input id="voter_${v.id}" placeholder="예: 잭슨"></div>
      <div class="row">${m.participants.filter(p=>p.playerId).map(p=>`<button class="btn sm" onclick="castVote('${v.id}','${p.playerId}')">${esc(nameOf(p.playerId))} (${cnt[p.playerId]||0})</button>`).join('')}</div>
      <div class="row" style="margin-top:10px"><button class="btn sm win" onclick="closeVote('${v.id}')">마감하고 MVP 반영</button><button class="btn sm lose" onclick="delVote('${v.id}')">삭제</button></div>
    </div>`;
  }).join('');
}
function openVote(){
  if(needAdmin())return;
  const matchId=$('vmMatch').value; if(!matchId)return;
  const min=num($('vmMin').value)||10;
  state.settings.mvpMinutes=min;
  state.voteRooms=state.voteRooms.filter(v=>v.matchId!==matchId);
  state.voteRooms.push({id:uid('v'),matchId,endsAt:Date.now()+min*60000,votes:[]});
  save();render();toast('투표를 열었어요.');
}
function castVote(vid,pid){
  if(needAdmin())return;
  const v=state.voteRooms.find(x=>x.id===vid); if(!v)return;
  if(Date.now()>v.endsAt)return toast('투표 시간이 끝났어요.',true);
  const voter=$(`voter_${vid}`).value.trim();
  if(!voter)return toast('투표자 이름을 먼저 입력해주세요.',true);
  const key=norm(voter);
  v.votes=v.votes.filter(x=>x.voterKey!==key);
  v.votes.push({voter,voterKey:key,playerId:pid,at:Date.now()});
  save();render();toast('투표 완료. 같은 이름은 마지막 표로 갱신돼요.');
}
function closeVote(vid){
  if(needAdmin())return;
  const v=state.voteRooms.find(x=>x.id===vid);
  const m=state.matches.find(x=>x.id===v?.matchId); if(!v||!m)return;
  const cnt={};(v.votes||[]).forEach(x=>cnt[x.playerId]=(cnt[x.playerId]||0)+1);
  const win=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
  if(!win)return toast('아직 표가 없어요.',true);
  m.mvpId=win[0];
  state.voteRooms=state.voteRooms.filter(x=>x.id!==vid);
  save();render();toast(`MVP를 ${nameOf(win[0])}(으)로 반영했어요.`);
}
function delVote(vid){
  if(needAdmin())return;state.voteRooms=state.voteRooms.filter(v=>v.id!==vid);save();render()}

      <button class="btn ghost sm" onclick="loadShared(true)">사이트 데이터 다시 받기</button>
    </div>
    <label class="row" style="gap:8px;margin-bottom:10px;cursor:pointer;align-items:center">
      <input type="checkbox" ${state.settings.autoPublish?'checked':''} onchange="toggleAutoPublish()" style="width:18px;height:18px">
      <span class="mini"><b>🔄 자동 게시</b> — 켜두면 PIN 변경·경기 수정·라인업 등 <b>뭐든 저장하면 몇 초 뒤 알아서 사이트에 반영</b>돼요 (게시 버튼 누를 필요 없음)</span>
    <label class="row" style="gap:8px;margin-top:8px;align-items:center;cursor:pointer">
      <input type="checkbox" ${state.settings.maintenance?'checked':''} onchange="state.settings.maintenance=this.checked;save();render();toast(this.checked?'🛠 점검 모드 ON — 멤버들에게 업데이트 안내 화면이 떠요 (게시되면 적용)':'점검 모드 해제 — 사이트 정상 오픈!')">
      <span class="mini"><b>🛠 점검 모드</b> — 켜면 멤버 전원에게 "서버 업데이트 중" 화면만 보여요 (파일 교체할 때 켜두세요. 운영진은 정상 이용 가능)</span>
    </label>
    </label>
    <details class="fold"><summary>🔗 깃허브 연결 설정 — 최초 1회만 (현재: ${ghCfg().repo?`<b>${esc(ghCfg().repo)}</b> 연결됨`:'미연결'})</summary>
      <div class="grid c3" style="margin-top:10px">
        <div class="f"><label>저장소 (아이디/이름)</label><input id="ghRepo" value="${esc(ghCfg().repo||'')}" placeholder="예: gildong/apodan-riot-proxy"></div>
        <div class="f"><label>토큰 (Fine-grained)</label><input id="ghToken" type="password" value="${esc(ghCfg().token||'')}" placeholder="github_pat_..."></div>
        <div class="f" style="align-self:end"><button class="btn" onclick="ghSave()">연결 저장</button></div>
      </div>
      <p class="mini" style="margin-top:8px"><b>토큰 만드는 법 (2분)</b>: 깃허브 → 우상단 프로필 → Settings → 맨 아래 <b>Developer settings</b> → <b>Fine-grained tokens</b> → Generate new token → 이름 아무거나, 만료 1년 → <b>Repository access: Only select repositories</b>에서 우리 저장소만 선택 → <b>Permissions → Contents: Read and write</b> → Generate → 복사해서 위에 붙여넣기. 토큰은 <b>이 브라우저에만</b> 저장되고 백업·공유 파일엔 절대 안 들어가요.</p>
    </details>
  </div>
  <div class="card" style="margin-top:14px"><details class="fold"><summary>🗳 유저 배당 투표 서버 연결 (선택) — 현재: ${state.settings.voteApiUrl?'<b>연결됨</b>':'미연결 (각자 기기에 내 픽만 기록)'}</summary>
    <p class="mini" style="margin-top:8px">연결하면 멤버들의 승부 예측 표가 <b>실시간 합산</b>되어 매치데이 카드에 "유저 배당"으로 떠요. 기존 Vercel 프로젝트에 <code>api/vote.js</code> 파일 하나 + 무료 Upstash Redis 연결이면 끝 (가이드는 채팅 참고). 미연결이어도 투표 버튼은 작동하고 각자 기기에 내 픽이 기록됩니다.</p>
    <div class="grid c2" style="margin-top:8px">
      <div class="f"><label>투표 서버 주소 (Vercel)</label><input id="voteApiUrl" value="${esc(state.settings.voteApiUrl||'')}" placeholder="https://apodan-riot-proxy.vercel.app"></div>
      <div class="f" style="align-self:end"><div class="row" style="gap:6px"><button class="btn" onclick="saveVoteApi()">연결 저장</button><button class="btn ghost" onclick="voteDiag()">🔬 서버 점검</button></div></div>
    </div>
  </details></div>
  ${(()=>{const un=unmatchedNames();if(!un.length)return'';
    window._unm=un.map(([r])=>r);
    const opts='<option value="">멤버 선택…</option><option value="__new__">➕ 나간 사람·외부 인원 — 새 인물로 등록 (기록 보존)</option>'+state.players.map(p=>`<option value="${p.id}">${esc(p.displayName)}${p.active?'':' (휴면)'}</option>`).join('');
    return`<div class="card" style="margin-top:14px;border-color:rgba(242,184,75,.4)"><h3>🔗 미확인 닉네임 연결 <span class="tag">${un.length}명 — 닉변·신규 인원 정리</span></h3>
    <p class="mini">경기 기록엔 있는데 명단과 못 맞춘 닉네임이에요. 멤버를 골라 <b>연결</b>하면 ① 이 닉으로 기록된 <b>모든 판</b>이 그 멤버 전적으로 합쳐지고 ② <b>별명으로 자동 등록</b>돼 다음 가져오기부터는 알아서 인식돼요. 닉변이면 본인에게, 새 멤버라면 플레이어 탭에서 등록 후 연결!</p>
    ${un.map(([raw,cnt],idx)=>`<div class="row" style="justify-content:space-between;gap:8px;padding:7px 0;border-top:1px dashed var(--line);flex-wrap:wrap">
      <span><b>${esc(raw)}</b> <span class="mini dim">${cnt}판 기록</span></span>
      <span class="row" style="gap:6px">
        <select id="lnkSel${idx}" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:7px">${opts}</select>
        <button class="btn sm gold" onclick="linkNick(${idx})">연결</button>
      </span></div>`).join('')}
    </div>`})()}
  ${(()=>{const owners=nameOwners();if(!owners.length||!isAdmin())return'';
    return`<div class="card" style="margin-top:14px"><details class="fold"><summary>🩹 닉네임 재배정 — 잘못 연결된 기록 바로잡기 · 탈퇴자 기록 보존</summary>
    <p class="mini" style="margin-top:8px">닉이 비슷해서 엉뚱한 멤버에게 붙은 기록을 통째로 옮겨요. 톡방을 나간 사람의 기록은 <b>"➕ 새 인물로 등록"</b>을 고르면 휴면 멤버로 만들어져, 남의 통계를 오염시키지 않고 보존됩니다. 재배정하면 잘못 등록된 별명도 자동 정리돼 다음 가져오기부터 올바르게 인식돼요.</p>
    <div class="grid c3" style="margin-top:8px">
      <div class="f"><label>경기 속 닉네임</label><select id="raRaw" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:8px;width:100%">
        <option value="">선택…</option>${owners.map(o=>`<option value="${esc(o.raw)}">${esc(o.raw)} — 현재: ${esc(o.owners.join(', '))} (${o.count}판)</option>`).join('')}</select></div>
      <div class="f"><label>진짜 주인</label><select id="raTo" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:8px;width:100%">
        <option value="">선택…</option>
        <option value="__new__">➕ 새 인물로 등록 (탈퇴·외부 인원 기록 보존)</option>
        ${state.players.map(p=>`<option value="${p.id}">${esc(p.displayName)}${p.active?'':' (휴면)'}</option>`).join('')}</select></div>
      <div class="f" style="align-self:end"><button class="btn gold" onclick="reassignNick()">재배정</button></div>
    </div></details></div>`})()}
  ${(()=>{const sus=suspectDups();if(!sus.length)return'';
    return`<div class="card" style="margin-top:14px"><details class="fold"><summary>⚠ 중복 의심 경기 ${sus.reduce((a,g)=>a+g.length,0)}건 — 펼쳐서 확인</summary>
    <p class="mini" style="margin-top:8px">게임ID가 없는 판이 섞여 있거나 ID가 겹치는 그룹만 보여줘요. (게임ID가 전부 다른 같은 날 경기는 정상이라 안 나옵니다)</p>
    ${sus.map(g=>`<div style="border:1px dashed var(--line);border-radius:10px;padding:10px;margin-bottom:8px">
      ${g.map(m=>{const tk=m.participants.reduce((a,p)=>a+num(p.kills),0);
        return`<div class="row" style="justify-content:space-between;padding:4px 0">
        <span class="mini">${esc(m.playedAt)} ${m.setNumber}세트 · ${m.winnerTeam==='BLUE'?'<span class=tBlue>블루 승</span>':'<span class=tRed>레드 승</span>'} · ${m.durationMin?m.durationMin+'분 · ':''}총 ${tk}킬${m.gameId?' · ID '+esc(m.gameId):' · <b style=color:var(--gold)>ID 없음</b>'}${m.memo?' · '+esc(m.memo):''}</span>
        <button class="btn sm lose" onclick="delMatch('${m.id}')">이 판 삭제</button></div>`}).join('')}
    </div>`).join('')}</details></div>`})()}
  <div class="card" style="margin-top:14px"><h3>정리 · 초기화</h3>
    <div class="row">
      <button class="btn win" onclick="dedupeMatches()">🧹 중복 경기 정리 (딸깍 — 그룹당 1판 보존)</button>
      <button class="btn win" onclick="cleanGhosts()">무효 게임 정리 (다시하기 등)</button>
      <button class="btn" onclick="if(needAdmin())return;if(confirm('경기 기록만 모두 삭제할까요?')){state.matches=[];state.voteRooms=[];save();render()}">경기 기록만 삭제</button>
      <button class="btn" onclick="if(needAdmin())return;if(confirm('확정 명단만 남기고 전부 초기화할까요?')){state=freshState();save();render()}">확정 명단으로 초기화</button>
      <button class="btn lose" onclick="if(needAdmin())return;if(confirm('명단과 경기를 전부 삭제할까요?')){state=fixState({});save();render()}">완전 초기화</button>
    </div></div>
  <div class="card" style="margin-top:14px"><h3>온라인화 로드맵</h3>
    <p class="mini">토너먼트 API 승인 대기 중 (Pending Review). 승인되면: 사이트에서 내전 방 코드 발급 → 멤버는 코드 입력으로 입장 → 경기 결과 자동 기록. 그다음 단계는 Supabase 실시간 DB + 카톡 링크 MVP 투표 + 디스코드 연동입니다.</p></div>`;
}
function backup(){
  state.settings.lastBackupAt=new Date().toISOString();save();render();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`apodan-backup-${todayStr()}.json`;a.click();
}
function restore(){
  if(needAdmin())return;
  const f=$('restoreFile').files[0];
  if(!f)return toast('백업 파일을 선택해주세요.',true);
  const r=new FileReader();
  r.onload=()=>{try{state=fixState(JSON.parse(r.result));save();render();toast('복원 완료!')}catch(e){toast('복원 실패: JSON 파일을 확인해주세요.',true)}};
  r.readAsText(f);
}
function copySummary(){
  const P=statPlayers(),D=statDuos(),C=statChamps();
  const lines=['🏆 아포단 내전실록 요약',`누적 내전 ${state.matches.length}판 · 명단 ${state.players.filter(p=>p.active).length}명`];
  if(P[0])lines.push(`승률 1위: ${P[0].name} ${P[0].winRate}% (${P[0].wins}승 ${P[0].losses}패)`);
  if(D[0])lines.push(`국밥 듀오: ${D[0].names} ${D[0].winRate}%`);
  if(C[0])lines.push(`메타픽: ${C[0].champion} [${C[0].tier}]`);
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('요약을 복사했어요.'));
  else toast('이 환경에서는 복사가 안 돼요.',true);
}

/* ───── 부트 ───── */
render();
loadShared(false); // 호스팅된 링크에서 열렸으면 공유 data.json 자동 확인
setInterval(()=>{ // 투표 남은 시간 갱신 (입력 중엔 건너뜀)
  const ae=document.activeElement;
  const typing=ae&&['INPUT','TEXTAREA','SELECT'].includes(ae.tagName);
  if(tab==='mvp'&&!typing)render();
},30000);

</script>
</body>
</html>
