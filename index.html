function premTail(name,pm){
  const pool=pm>0?PREM_TAILS.up:pm<0?PREM_TAILS.dn:PREM_TAILS.zero;
  const seed=Math.abs((name||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)+pm*7+Number(sessionDay().replace(/-/g,'')));
  return pool[seed%pool.length];
}


/* ───── 챔프 상대전적 & 매치업 디테일 ───── */
function champOf(p){return canonChamp(p.championId||p.champ||'')}
function champVsChamp(pid){ // 이 선수가 챔프로 상대 챔프를 만났을 때 승률
  const out={}; // key: "내챔프 vs 상대챔프"
  state.matches.forEach(m=>{
    const me=m.participants.find(x=>x.playerId===pid&&champOf(x));
    if(!me)return;
    const win=me.team===m.winnerTeam;
    // 같은 라인 상대 우선, 없으면 전체 상대
    const foes=m.participants.filter(x=>x.team!==me.team&&champOf(x));
    const laneFoe=foes.find(x=>x.lane===me.lane)||null;
    const targets=laneFoe?[laneFoe]:foes;
    targets.forEach(f=>{
      const k=champOf(me)+' vs '+champOf(f);
      out[k]=out[k]||{my:champOf(me),foe:champOf(f),g:0,w:0,lane:me.lane};
      out[k].g++;if(win)out[k].w++;
    });
  });
  return Object.values(out).filter(x=>x.g>=1).sort((a,b)=>b.g-a.g||b.w/b.g-a.w/a.g);
}
function champMatchups(pid){ // 이 선수가 자주 쓴 챔프별 전적 + 그 챔프로 누구를 상대로 이겼나
  const byChamp={};
  state.matches.forEach(m=>{
    const me=m.participants.find(x=>x.playerId===pid&&champOf(x));
    if(!me)return;
    const win=me.team===m.winnerTeam;
    byChamp[champOf(me)]=byChamp[champOf(me)]||{champ:champOf(me),g:0,w:0,foes:[]};
    byChamp[champOf(me)].g++;if(win)byChamp[champOf(me)].w++;
    const laneFoe=m.participants.find(x=>x.team!==me.team&&x.lane===me.lane&&champOf(x));
    if(laneFoe)byChamp[champOf(me)].foes.push({foe:champOf(laneFoe),by:nameOf(laneFoe.playerId),win});
  });
  return Object.values(byChamp).sort((a,b)=>b.g-a.g);
}


/* ───── 📊 GD@15 — 라이엇 타임라인 파서 ───── */
function parseTimelineGd15(m,json){
  // 매핑 규칙: participantId 1~5 = 블루(가져온 순서), 6~10 = 레드 — 추출기 순서 보존 전제
  let tl;try{tl=typeof json==='string'?JSON.parse(json):json}catch(e){throw new Error('JSON 형식이 아니에요')}
  const frames=tl?.info?.frames||tl?.frames;
  if(!Array.isArray(frames)||!frames.length)throw new Error('타임라인 frames를 못 찾았어요');
  const fi=Math.min(15,frames.length-1);
  const pf=frames[fi].participantFrames;
  if(!pf)throw new Error('participantFrames 없음');
  const blue=m.participants.filter(p=>p.team==='BLUE');
  const red=m.participants.filter(p=>p.team==='RED');
  if(blue.length!==5||red.length!==5)throw new Error('5대5 경기만 지원해요 (블루 '+blue.length+'/레드 '+red.length+')');
  const gold=i=>{const f=pf[String(i)]||pf[i];return f?Number(f.totalGold)||0:null};
  for(let i=1;i<=10;i++)if(gold(i)==null)throw new Error('참가자 '+i+' 골드 누락');
  // 라인 상대 매칭 (사이트 lane 기준, 없으면 같은 인덱스)
  const apply=(arr,base,foeArr,foeBase)=>arr.forEach((p,idx)=>{
    const myG=gold(base+idx);
    let foeIdx=foeArr.findIndex(f=>f.lane&&p.lane&&f.lane===p.lane);
    if(foeIdx<0)foeIdx=idx;
    p.gd15=Math.round(myG-gold(foeBase+foeIdx));
  });
  apply(blue,1,red,6);apply(red,6,blue,1);
  return{applied:10,minute:fi};
}
function gd15StatsOf(pid){ // 평균 GD@15 + 리드율 (데이터 있는 판만)
  const rows=[];
  state.matches.forEach(m=>{const p=m.participants.find(x=>x.playerId===pid&&x.gd15!=null);if(p)rows.push(p.gd15)});
  if(!rows.length)return null;
  const avg=Math.round(rows.reduce((a,b)=>a+b,0)/rows.length);
  const lead=Math.round(rows.filter(v=>v>0).length/rows.length*100);
  return{n:rows.length,avg,lead};
}

function formCasterLine(name,arr,wl,games){
  name=String(name||'').trim()||'이 선수'; // 방어: 이름 누락 시에도 undefined 금지
  const last=arr[arr.length-1]||100;
  const prev=arr.length>1?arr[arr.length-2]:100;
  let streak=0;for(let i=wl.length-1;i>=0;i--){if(wl[i]===wl[wl.length-1])streak++;else break}
  const win=wl.length?wl[wl.length-1]:true;
  // 변동성: 최근 6점 표준편차
  const tail=arr.slice(-6);const mean=tail.reduce((a,b)=>a+b,0)/tail.length;
  const sd=Math.sqrt(tail.reduce((a,b)=>a+(b-mean)*(b-mean),0)/tail.length);
  let pool;
  if(games<3)pool=FORM_CASTER.rookie;
  else if(win&&streak>=3||last-prev>=10)pool=FORM_CASTER.hot;
  else if(!win&&streak>=3||prev-last>=10)pool=FORM_CASTER.cold;
  else if(sd>=12)pool=FORM_CASTER.spike;
  else pool=FORM_CASTER.steady;
  const seed=Math.abs((name||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)*7+Number(sessionDay().replace(/-/g,'')));
  return pool[seed%pool.length]
    .replace(/\{n_i\}/g,josa(name,'을','를'))
    .replace(/\{n\}/g,name)
    .replace(/\{px\}/g,String(last));
}

async function bankGift(){
  const name=($('gfName')?.value||'').trim();
  const amt=Math.round(Number($('gfAmt')?.value)||0);
  const memo=($('gfMemo')?.value||'').trim();
  if(!name)return toast('받는 멤버를 골라주세요.',true);
  if(amt<50||amt>5000)return toast('상품권은 50~5,000 APO',true);
  if(!confirm(`🎁 ${name}에게 ${fmtAPO(amt)} APO 상품권${memo?` (${memo})`:''} 지급할까요?`))return;
  try{
    const j=await bankCall('gift',{name,amount:amt,memo});
    toast(`🎁 ${j.name}에게 ${fmtAPO(j.amount)} APO 지급 완료!`);
    await bankRefresh(true);
  }catch(e){toast('실패: '+e.message,true)}
}

const TIER_LADDER=[[0,'아마추어 아이언','#8f9aa8','🪨'],[3000,'동네고수 브론즈','#c08d5e','🥉'],[8000,'성실한 실버','#b9c8d8','🥈'],[15000,'유망주 골드','#f2b84b','🥇'],[30000,'각성한 플래티넘','#3fd9c5','💠'],[60000,'정예 에메랄드','#37c978','💚'],[120000,'칼챔 다이아몬드','#5ea0ff','💎'],[250000,'초인 마스터','#b58cff','🔮'],[500000,'괴물 그랜드마스터','#ff5c7a','🩸'],[750000,'신계 챌린저','#ffd24a','👑'],[1000000,'프로선수','#ffd86b','🏆']];
function pointTier(bal){ // 포인트 등급 사다리 — 100만 = 프로선수
  bal=Number(bal)||0;
  const L=TIER_LADDER;
  let cur=L[0];for(const e of L)if(bal>=e[0])cur=e;
  const next=L[L.indexOf(cur)+1]||null;
  return{name:cur[1],c:cur[2],e:cur[3],pro:cur[0]>=1000000,next:next?{name:next[1],need:next[0]-bal}:null};
}
function tierIcon(c,sz){ // 🛡 등급 방패 아이콘 (등급 색, 내장 SVG — 외부 이미지 불필요)
  sz=sz||11;
  return`<svg width="${sz}" height="${Math.round(sz*1.1)}" viewBox="0 0 11 12" style="vertical-align:-1px;margin-right:3px;flex:none"><path d="M5.5 0 11 2v4c0 3.2-2.4 5.2-5.5 6C2.4 11.2 0 9.2 0 6V2Z" fill="${c}" opacity=".92"/><path d="M5.5 1.4 9.7 2.9v3c0 2.4-1.8 4-4.2 4.7C3.2 9.9 1.3 8.3 1.3 5.9v-3Z" fill="rgba(255,255,255,.22)"/></svg>`;
}
function tierChip(name){ // 어디서든 이름 옆 등급 — 계좌 있는 멤버는 등급이 따라다녀요
  const r=(window._bankRoster||[]).find(x=>x.name===String(name));
  if(!r)return'';
  const T=pointTier(r.bal);
  return` <span class="pill ${T.pro?'tierPro':''}" style="font-size:9.5px;padding:1px 6px 1px 4px;color:${T.c};border-color:${T.c}55;font-weight:800;white-space:nowrap;vertical-align:1px;display:inline-flex;align-items:center;gap:3px">${T.e} ${T.pro?'🏆 ':''}${T.name}</span>`;
}
function apdRole(name){ // 운영자 직함
  const b=String(name||'').replace(/^\d+\s*/,'').trim();

const COS_CATS=[['lol','🎮 롤'],['ghibli','🌿 지브리'],['disney','🏰 디즈니'],['anime','⚔️ 애니메이션'],['daily','👕 일상']];
const COS_RE=/^([mf])-(lol|ghibli|disney|anime|daily)-([1-9]|[1-5][0-9]|6[0-4])$/;
const COS_PICK=50000,COS_RAND=10000;
function cosCatName(c){return(COS_CATS.find(x=>x[0]===c)||['','?'])[1]}
function cosThumb(id,size,extra){
  const m=COS_RE.exec(id||'');if(!m)return'';
  const n=(+m[3])-1,col=n%8,row=Math.floor(n/8),sc=size/128;
  return`<div style="width:${size}px;height:${size}px;border-radius:12px;overflow:hidden;flex:none;background-color:#fcfaf6;background-image:url('img/cos-${m[1]}-${m[2]}.webp');background-size:${Math.round(1024*sc)}px ${Math.round(1024*sc)}px;background-position:-${Math.round(col*128*sc)}px -${Math.round(row*128*sc)}px;${extra||''}"></div>`;
}
function cosAvatar(eq,size){
  eq=eq||{};
  if(eq.cos&&COS_RE.test(eq.cos))return cosThumb(eq.cos,size);
  if(eq.avG==='m')return`<img src="${COS_BASE_M}" style="height:${size}px" alt="기본 남캐">`;
  if(eq.avG==='f')return`<img src="${COS_BASE_F}" style="height:${size}px" alt="기본 여캐">`;
  return'';
}
function avatarEqOf(name){
  const r=(window._bankRoster||[]).find(x=>bareName(x.name)===bareName(name||''));
  return r?(r.equip||{}):null;
}
async function cosGender(g){
  try{await bankCall('equipItem',{cat:'avG',item:g});if(window._bank){window._bank.equip=window._bank.equip||{};window._bank.equip.avG=g}
  toast(g==='m'?'👦 남캐 생성 완료! 기본 외모는 좀 밋밋해요 — 코스튬으로 변신하세요':'👧 여캐 생성 완료! 기본 외모는 좀 밋밋해요 — 코스튬으로 변신하세요');render()}
  catch(e){toast(e.message,true)}
}
async function cosBuy(rand){
  const B=bankSession();if(!B||!B.name)return toast('로그인이 필요해요.',true);
  const g=(B.equip||{}).avG;if(!g)return toast('먼저 캐릭터를 생성해주세요 (🙋 내 정보).',true);
  const catg=window._cosCat||'lol';
  let pick=null;
  if(!rand){
    pick=Math.round(Number($('cosNum')?.value)||0);
    if(pick<1||pick>64)return toast('번호는 1~64',true);
  }
  const price=rand?COS_RAND:COS_PICK;
  if(!confirm(`🎲 ${cosCatName(catg)} 코스튬 ${rand?'랜덤 깡':'선택 뽑기 #'+pick}\n${fmtAPO(price)} APO — 진행할까요?`))return;
  if(window._cosBusy)return;window._cosBusy=true;
  try{
    const j=await bankCall('cosBuy',{catg,pick});
    if(window._bank){window._bank.bal=j.bal;window._bank.items=window._bank.items||{};window._bank.items['cos:'+j.item]=1;window._bank.equip=window._bank.equip||{};window._bank.equip.cos=j.item}
    toast(`🎉 ${cosCatName(catg)} ${j.item.split('-')[2]}번 코스튬 당첨! 바로 입혀드렸어요`);
    render();
  }catch(e){toast(e.message,true)}
  finally{window._cosBusy=false}
}
function cosPrevUpd(){
  const B=bankSession();const g=B&&B.equip&&B.equip.avG;if(!g)return;
  const n=Math.min(64,Math.max(1,Math.round(Number($('cosNum')?.value)||1)));
  const el=$('cosPrev');if(el)el.innerHTML=cosThumb(`${g}-${window._cosCat||'lol'}-${n}`,96,'border:1px solid var(--line)');
}
function cosGachaHtml(B){
  const eq=(B&&B.equip)||{};const g=eq.avG;
  const catg=window._cosCat||'lol';
  return`<div class="card" style="margin-top:14px;border:1px solid rgba(242,184,75,.35)">
    <h3 style="margin:0 0 4px">🎲 캐릭터 코스튬 뽑기 <span class="tag">세계관별 64종 — 선택 ${fmtAPO(COS_PICK)} · 랜덤 깡 ${fmtAPO(COS_RAND)}</span></h3>
    ${!g?`<p class="mini dim" style="margin:0 0 8px">먼저 캐릭터를 만들어야 코스튬을 입힐 수 있어요!</p>
      <div class="row" style="gap:8px"><button class="btn gold" onclick="cosGender('m')">👦 남캐로 생성</button><button class="btn gold" onclick="cosGender('f')">👧 여캐로 생성</button></div>`
    :`<div class="row" style="gap:6px;flex-wrap:wrap;margin:4px 0 8px">${COS_CATS.map(([c,nm])=>`<button class="btn sm ${catg===c?'gold':'ghost'}" onclick="window._cosCat='${c}';render()">${nm}</button>`).join('')}</div>
      <div class="row" style="gap:14px;align-items:flex-start;flex-wrap:wrap">
        <div>
          <p class="mini" style="margin:0 0 4px;font-weight:800">🎯 번호 선택 뽑기 — ${fmtAPO(COS_PICK)} APO</p>
          <div class="row" style="gap:8px;align-items:center">
            <input id="cosNum" type="number" min="1" max="64" value="1" style="width:78px;background:var(--inset);color:var(--ink);border:1px solid var(--gold);border-radius:10px;padding:8px;font-weight:900;font-size:16px;text-align:center" oninput="cosPrevUpd()">
            <span id="cosPrev">${cosThumb(`${g}-${catg}-1`,96,'border:1px solid var(--line)')}</span>

          </div>
          <p class="mini dim" style="margin:4px 0 0">카탈로그 번호(1~64) 그대로 — 미리보기 확인 후 구매!</p>
        </div>
        <div style="border-left:1px dashed var(--line);padding-left:14px">
          <p class="mini" style="margin:0 0 4px;font-weight:800">🎰 랜덤 깡 — ${fmtAPO(COS_RAND)} APO</p>
          <button class="btn" style="border-color:var(--gold);color:var(--gold);font-weight:900" onclick="cosBuy(true)">🎰 ${cosCatName(catg)}에서 운명의 한 장!</button>
          <p class="mini dim" style="margin:4px 0 0">아직 없는 코스튬 중에서만 뽑혀요 (중복 없음).</p>
        </div>
      </div>`}
  </div>`;
}

const BASE_ART=Object.assign({},SHOP_C.art); // 코드 내장 기본 그림
function syncArtCatalog(){ // 운영자가 사이트에서 등록한 그림(state.settings.artShop)을 상점 카탈로그에 합치기
  try{SHOP_C.art=Object.assign({},BASE_ART,(state&&state.settings&&state.settings.artShop)||{})}catch(e){}
}
async function artRegister(){
  if(needAdmin())return;
  const f=$('artFile')?.files?.[0];
  const name=($('artName')?.value||'').trim();
  const price=Math.round(Number($('artPrice')?.value)||0);
  const px=!!$('artPx')?.checked;
  if(!f)return toast('그림 파일을 골라주세요.',true);
  if(!name)return toast('이름을 입력해주세요 (12자 이내).',true);
  if(price<100||price>1000000)return toast('가격은 100~1,000,000 APO',true);
  try{
    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=URL.createObjectURL(f)});
    const cv=document.createElement('canvas');cv.width=96;cv.height=96;
    const ctx=cv.getContext('2d');
    if(px)ctx.imageSmoothingEnabled=false;
    const sc=Math.min(96/img.width,96/img.height); // 비율 유지 + 가운데
    const w=img.width*sc,h=img.height*sc;
    ctx.drawImage(img,(96-w)/2,(96-h)/2,w,h);
    let uri=cv.toDataURL('image/webp',.86);
    if(!uri.startsWith('data:image/webp'))uri=cv.toDataURL('image/png');
    if(uri.length>120000)return toast('그림이 너무 복잡해요 — 더 단순한 그림으로 부탁!',true);
    const id='u'+Date.now().toString(36);
    await bankCall('artAdd',{id,name,price}); // 서버에 가격 등록 (구매 검증용) — 실패 시 여기서 중단
    state.settings.artShop=state.settings.artShop||{};
    state.settings.artShop[id]={img:uri,n:name,p:price,...(px?{px:1}:{})};
    syncArtCatalog();save();render();
    toast(`🎨 「${name}」 입점 완료! ${state.settings.autoPublish?'곧 전 멤버 상점에 떠요.':'⚠ 설정에서 게시해야 전 멤버에게 보여요.'}`);
  }catch(e){toast('등록 실패: '+e.message,true)}
}
async function artRemove(id){
  if(needAdmin())return;
  if(!confirm('이 그림을 상점에서 내릴까요? (이미 구매한 멤버의 장착은 풀려요)'))return;
  try{await bankCall('artDel',{id})}catch(e){return toast(e.message,true)}
  if(state.settings.artShop)delete state.settings.artShop[id];
  syncArtCatalog();save();render();toast('내렸어요.');
}

function renderTicker(){
  const items=[];

  const LU0=allLineups()[0];

    const pts=lineupPoints(LU0);

  }
  // 1.5) 🎰 잭팟·대박 속보 (오락실 — 모두에게 송출!)
  (window._bankFeed||[]).slice(0,3).forEach(f=>{
    const big=Number(f.v)>=10000;
    const kind=f.t==='jp'?'🎫 복권 잭팟':f.t==='scr'?'🎫 복권 1등':'🎰 룰렛 잭팟';
    items.push(`<b class="${big?'tk-jack':'tk-up'}">${kind}${big?' 💥':''}</b> <b>${esc(f.n)}</b>${josa(f.n,'이','가')} +${fmtAPO(f.v)} APO 획득!${big?' 축하합니다!!':''}`);
  });
  // 2) 당일 밴픽 보드 진행 중
  const todayKey=todayStr();
  const tb=(state.liveBoards&&state.liveBoards[todayKey])||[];
  if(tb.length){
    const pk=tb.filter(x=>x.type==='pick').length,bn=tb.length-pk;
    items.push(`☠️ <b>오늘 내전 진행 중</b> — 픽 ${pk}챔프 잠김 · 밴 ${bn}챔프 (당일 밴픽 탭)`);
  }
  // 3) 가장 최근 내전 결과 한 줄 요약
  const dates=[...new Set(state.matches.map(m=>m.playedAt))].sort();
  const last=dates[dates.length-1];
  if(last){
    const dm=state.matches.filter(m=>m.playedAt===last);
    const bw=dm.filter(m=>m.winnerTeam==='BLUE').length;
    items.push(`최근 내전 <b>${esc(last)}</b> — ${dm.length}세트 진행 (블루 ${bw} : 레드 ${dm.length-bw})`);
    const mvps=dm.filter(m=>m.mvpId).map(m=>nameOf(m.mvpId));
    if(mvps.length)items.push(`그날의 MVP: <b>${esc([...new Set(mvps)].join(', '))}</b>`);
  }
  // 3.4) 📈 주식 급등락 + 🎰 베팅 풀 속보
  (()=>{
    const px=window._srvPx||{};
    const movers=Object.keys(px).map(n=>{
      const d=Number((window._srvPrem||{})[n])||0; // 진짜 수급만 속보
      return{n,d,px:px[n]};
    }).filter(x=>Math.abs(x.d)>=2).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
    movers.slice(0,2).forEach(m=>items.push(`${m.d>0?'📈':'📉'} <b>${esc(m.n)}</b> 주가 ${m.px} APO (${m.d>0?'▲':'▼'}${Math.abs(m.d)} 수급 ${m.d>0?'프리미엄':'할인'})`));
    (window._trades||[]).slice(0,2).forEach(tr=>{
      if(tr.ai){items.push(`${tr.np>tr.p?'🏦':'🌍'} <b>${esc(tr.n)}</b> — <b>${esc(tr.t)}</b> ${tr.p}→${tr.np} ${tr.np>tr.p?'📈 매집':'📉 매도'} (AI 수급)`);return}
      items.push(`⚡ <b>속보:</b> <b>${esc(tr.n)}</b>${josa(tr.n,'이','가')} <b>${esc(tr.t)}</b> ${tr.q}주 ${tr.s==='b'?'📈 매수':'📉 매도'} @${tr.p} — ${agoKo(tr.ts)}`);
    });
    Object.entries(window._mkts||{}).forEach(([k,M])=>{
      const tot=(M.alpha||0)+(M.beta||0);
      if(tot>=500&&M.status==='open')items.push(`🎰 <b>${esc(k)}</b> 베팅 풀 ${fmtAPO(tot)} APO — 민심 ${Math.round(M.alpha/tot*100)}:${Math.round(M.beta/tot*100)}`);
    });
  })();
  // 3.5) 💀 파산 속보 (최근 48시간) — 운영진 토글
  if(state.settings.bustNews!==false){
  recentBusts(48).slice(0,2).forEach(r=>{
    items.push(`💀 <b>속보:</b> ${esc(r.name)}, 통산 ${r.bust}호 파산 선언 — 새출발을 응원합니다`);
  });
  }
  // 4) 라인 최강자 (왕좌 현황)
  try{
    const{board}=laneTierDelta();
    const kings=LANE_LIST.filter(l=>board[l]&&board[l].king).map(l=>`${l} <b>${esc(nameOf(board[l].king.pid))}</b>`);
    if(kings.length)items.push(`👑 현재 라인 최강자 — ${kings.join(' · ')}`);
  }catch(e){}
  if(!items.length)items.push('아직 기록된 내전이 없습니다 — 기록하기 탭에서 첫 경기를 등록해보세요');
  const html=items.map(t=>`<span>${t}</span>`).join('');
  $('ticker').innerHTML=html+html; // 무한 루프용 2배
}

/* ───── 🌪 아수라장 팀 랜덤 (무수라장 내전) ───── */
function playerPowerOf(id){ // 폼 주가 60% + 통산 승률 40% (teamPower와 동일 공식)
  const s=statPlayers().find(x=>x.id===id);
  const price=formSeries(id).arr.at(-1)||100;
  const wr=(s&&s.games?s.winRate:50)*2;
  return price*.6+wr*.4;
}
function mrPick(pid,on){
  window._mrSel=window._mrSel||{};
  if(on)window._mrSel[pid]=1;else delete window._mrSel[pid];
  const c=$('mrCount');if(c)c.textContent=Object.keys(window._mrSel).length;
}
function mrListHtml(q){
  const sel=window._mrSel||{};
  const lbl=on=>'cursor:pointer;display:inline-flex;gap:5px;align-items:center;'+(on?'border-color:var(--gold);color:var(--gold);font-weight:800':'');
  return state.players.filter(p=>p.active).filter(p=>searchHit(p,q))

    ||'<span class="mini dim">검색 결과가 없어요.</span>';
}
function mrFilter(){const box=$('mrList');if(box)box.innerHTML=mrListHtml($('mrQ')?.value||'')}
function mrShuffle(mode){
  const ids=Object.keys(window._mrSel||{});
  if(ids.length<2)return toast('참가자를 2명 이상 체크해주세요.',true);
  if(ids.length>10)return toast(`한 판은 최대 10명이에요 — 현재 ${ids.length}명, 체크를 줄여주세요.`,true);
  const shuf=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
  let order=shuf([...ids]),blue=[],red=[];
  if(mode==='balance'){ // 폼 스네이크 드래프트: 강한 순 A B B A A B B A…
    order.sort((a,b)=>playerPowerOf(b)-playerPowerOf(a));
    order.forEach((id,i)=>{(i%4===0||i%4===3)?blue.push(id):red.push(id)});
    shuf(blue);shuf(red); // 팀 내부 순서(=라인)는 랜덤
  }else{
    blue=order.slice(0,Math.ceil(order.length/2));red=order.slice(Math.ceil(order.length/2));
  }
  let champs=null;
  if($('mrChamp')?.checked){ // 진짜 아수라장: 랜덤 챔피언 (오늘 피어리스 픽 금지 챔프 제외)
    const FS=fearlessState(window._todayDate||todayStr(),window._todayRound||'1차');
    const banned=new Set(FS.pickBanned.map(x=>x.champ));
    const pool=shuf(CHAMPIONS.filter(c=>!banned.has(c)));
    champs={};[...blue,...red].forEach((id,i)=>champs[id]=pool[i]||'-');
  }
  const avg=t=>t.length?Math.round(t.reduce((a,id)=>a+playerPowerOf(id),0)/t.length):0;
  window._mrRes={blue,red,champs,pb:avg(blue),pr:avg(red),mode};
  const out=$('mrOut');if(out)out.innerHTML=mrResultHtml();
}
function mrResultHtml(){
  const R=window._mrRes;if(!R)return'';
  const lanes=['탑','정글','미드','원딜','서폿'];
  const side=(ids,tag,col,pw)=>`<div><p class="mini" style="margin:0 0 6px;font-weight:800;color:${col}">${tag} <span class="dim" style="font-weight:600">팀파워 ${pw}</span></p>

  const gap=Math.abs(R.pb-R.pr);

  <p class="mini dim" style="margin:8px 0 0">${R.mode==='balance'?`⚖ 폼 주가 스네이크 밸런스 — 팀파워 격차 ${gap} (라인 배치는 랜덤)`:'🌪 완전 랜덤 — 결과에 대한 항의는 주사위에게 부탁드립니다'}${R.champs?' · 챔피언은 오늘 피어리스 픽 금지 챔프를 빼고 뽑았어요':''}</p>
  <div class="row" style="margin-top:10px;gap:6px;flex-wrap:wrap">
    <button class="btn sm gold" onclick="mrToLineup()">🏟 이 결과를 아래 라인업 공지 칸에 채우기</button>
    <button class="btn sm ghost" onclick="mrShuffle(window._mrRes.mode)">🎲 다시 돌리기</button>
  </div>`;
}

function savePlayerForm(){
  if(needAdmin())return;
  const name=$('fpName').value.trim();
  if(!name)return toast('표시 이름은 필수예요.',true);
  const{riotName,riotTag}=parseRiot($('fpRiot').value.trim());
  const aliases=$('fpAlias').value.split(',').map(x=>x.trim()).filter(Boolean);
  const memo=$('fpMemo').value.trim();
  if(editingPlayer==='__new__'){
    if(findPlayer(name))return toast('이미 비슷한 이름이 있어요. 필요하면 병합 기능을 쓰세요.',true);
    const p=makePlayer(name);
    Object.assign(p,{riotName,riotTag,memo,aliases:aliases.length?aliases:p.aliases});
    state.players.push(p);selPlayer=p.id;toast('플레이어를 등록했어요.');
  }else{
    const p=byId(editingPlayer); if(!p)return;
    Object.assign(p,{displayName:name,kakaoName:name,riotName,riotTag,memo,aliases:aliases.length?aliases:aliasGuess(name)});
    toast('플레이어를 수정했어요.');
  }
  editingPlayer=null;save();render();
}
function togglePlayer(id){
  if(needAdmin())return;const p=byId(id);p.active=!p.active;save();render()}
function delPlayer(id){
  if(needAdmin())return;
  const used=state.matches.some(m=>m.participants.some(p=>p.playerId===id));
  if(used)return toast('경기 기록이 있는 사람은 삭제 대신 휴면 처리하거나 병합해주세요.',true);
  if(!confirm('완전히 삭제할까요?'))return;
  state.players=state.players.filter(p=>p.id!==id);
  if(selPlayer===id)selPlayer=null;
  save();render();
}
function mergePlayers(){
  if(needAdmin())return;
  const from=$('mgFrom').value,to=$('mgTo').value;
  if(!from||!to||from===to)return toast('서로 다른 두 명을 선택해주세요.',true);
  const f=byId(from),t=byId(to);
  t.aliases=[...new Set([...(t.aliases||[]),f.displayName,f.kakaoName,f.riotName,...(f.aliases||[])].filter(Boolean))];
  if(!t.riotName&&f.riotName){t.riotName=f.riotName;t.riotTag=f.riotTag}
  state.matches.forEach(m=>{
    m.participants.forEach(p=>{if(p.playerId===from)p.playerId=to});
    if(m.mvpId===from)m.mvpId=to;
  });
  state.voteRooms.forEach(v=>(v.votes||[]).forEach(x=>{if(x.playerId===from)x.playerId=to}));
  state.players=state.players.filter(p=>p.id!==from);
  save();render();toast(`${f.displayName} 기록을 ${t.displayName}(으)로 합쳤어요.`);
}
function syncRoster(){
  if(needAdmin())return;
  let added=0,filled=0;
  ROSTER.forEach(e=>{
    const hit=findPlayer(e.n)||(e.r?findPlayer(e.r):null);
    if(!hit){state.players.push(rosterToPlayer(e));added++}
    else if(!hit.riotName&&e.r){const{riotName,riotTag}=parseRiot(e.r);hit.riotName=riotName;hit.riotTag=riotTag;filled++}
  });
  save();render();toast(`누락 ${added}명 추가, 롤 닉네임 ${filled}건 보강했어요.`);
}

  const rates=ratesMap();
  const P=statPlayers().filter(s=>rates.get(s.id)?.games>=1);
  if(P.length<2)return head('1:1 비교','두 명 이상 경기 기록이 있어야 비교할 수 있어요.')+'<div class="empty">경기를 더 기록해주세요.</div>';
  if(!window._cmpA||!P.some(s=>s.id===window._cmpA))window._cmpA=P[0].id;
  if(!window._cmpB||!P.some(s=>s.id===window._cmpB)||window._cmpB===window._cmpA)window._cmpB=(P.find(s=>s.id!==window._cmpA)||P[1]).id;
  const A=P.find(s=>s.id===window._cmpA),B=P.find(s=>s.id===window._cmpB);
  const rA=rates.get(A.id),rB=rates.get(B.id);
  const lanesA=playerLanes(A.id),lanesB=playerLanes(B.id);
  const laneA=(window._cmpLA&&lanesA.some(l=>l.lane===window._cmpLA))?window._cmpLA:(lanesA[0]?.lane||null);
  const laneB=(window._cmpLB&&lanesB.some(l=>l.lane===window._cmpLB))?window._cmpLB:(lanesB[0]?.lane||null);
  const hA=playerHex(A.id,laneA),hB=playerHex(B.id,laneB);
  const sel=(id,val)=>`<select onchange="window._cmp${id}=this.value;window._cmpL${id}=null;render()" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:9px;min-width:0;width:100%">${P.map(s=>`<option value="${s.id}"${s.id===val?' selected':''}>${esc(s.name)}</option>`).join('')}</select>`;
  const laneSel=(id,lanes,val)=>lanes.length>1?`<select onchange="window._cmpL${id}=this.value;render()" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:9px;min-width:0;width:100%;margin-top:6px">${lanes.map(l=>`<option value="${l.lane}"${l.lane===val?' selected':''}>${esc(l.lane)} (${l.games}판)</option>`).join('')}</select>`:(lanes[0]?`<p class="mini dim" style="margin:6px 0 0">${esc(lanes[0].lane)} ${lanes[0].games}판</p>`:'');
  const f1=v=>Math.round(v*10)/10;
  const rows=[
    ['승률',A.winRate,B.winRate,'%','높을수록'],
    ['전적',null,null,'',''],
    ['KDA',A.kda,B.kda,'','높을수록'],
    ['분당 딜 (DPM)',Math.round(rA.dpm),Math.round(rB.dpm),'','높을수록'],
    ['분당 CS (CSPM)',f1(rA.cspm),f1(rB.cspm),'','높을수록'],
    ['분당 시야',f1(rA.vspm),f1(rB.vspm),'','높을수록'],
    ['킬관여율',rA.kp,rB.kp,'%','높을수록'],
    ['골드 효율 (1천골드당 딜)',Math.round(rA.dpg),Math.round(rB.dpg),'','높을수록'],
    ['경기당 데스',f1(rA.deathsPg),f1(rB.deathsPg),'','낮을수록'],
    ['평균 딜량',rA.avgDmg,rB.avgDmg,'','높을수록'],
    ['솔로킬 누적',rA.solo,rB.solo,'','높을수록'],
    ['MVP',A.mvp,B.mvp,'','높을수록']
  ];
  const tr=rows.map(([l,a,b,unit,dir])=>{
    if(l==='전적')return`<tr><td>전적</td><td class="num">${A.wins}승 ${A.losses}패</td><td class="num">${B.wins}승 ${B.losses}패</td></tr>`;
    if(l==='솔로킬 누적'&&!a&&!b)return'';
    const aw=dir==='낮을수록'?a<b:a>b, bw=dir==='낮을수록'?b<a:b>a;
    return`<tr><td>${l}</td>
      <td class="num ${aw?'up':''}" style="${aw?'font-weight:800':''}">${fmt(a)}${unit}</td>

    ${dgames?`<p class="mini dim" style="margin:8px 0 0">같은 팀이었을 땐 ${dgames}판 ${pct(dwins,dgames)}% — ${pct(dwins,dgames)>=60?'적보다 아군일 때 무서운 조합':'한 팀이어도 화학반응은 미지수'}</p>`:''}
  </div>`:'';
  return head('1:1 비교','LCK 맞대결 그래픽처럼. 육각형은 각자 "자기 포지션 안에서의 위치", 표는 실제 수치예요.')+`
  <div class="card">
    ${derby}
    <div class="grid c2" style="margin:14px 0">
      <div class="f"><label style="color:var(--gold)">🟡 선수 A</label>${sel('A',A.id)}${laneSel('A',lanesA,laneA)}</div>
      <div class="f"><label style="color:var(--win)">🟢 선수 B</label>${sel('B',B.id)}${laneSel('B',lanesB,laneB)}</div>
    </div>
    <div class="grid c2" style="align-items:center">
      <div style="text-align:center">${hA.labels.join()===hB.labels.join()
        ?radarSvg2(hA.vals,hB.vals,hA.labels)
        :`<div class="grid c2">
            <div>${radarSvg(hA.vals,hA.labels,250)}<p class="mini" style="margin:2px 0 0;color:var(--gold)">${esc(A.name)}</p></div>
            <div>${radarSvg(hB.vals,hB.labels,250)}<p class="mini" style="margin:2px 0 0;color:var(--win)">${esc(B.name)}</p></div>
          </div><p class="mini dim" style="margin:8px 0 0">두 선수의 포지션이 달라 측정 축이 달라요. 각자 자기 라인 기준 차트입니다.</p>`}
        <p class="mini" style="margin:6px 0 0"><b style="color:var(--gold)">${esc(A.name)}</b> (${laneNote(hA)}) vs <b style="color:var(--win)">${esc(B.name)}</b> (${laneNote(hB)})</p></div>
      <div class="scrollx"><table class="tbl"><thead><tr><th>지표</th><th class="num" style="color:var(--gold)">${esc(A.name)}</th><th class="num" style="color:var(--win)">${esc(B.name)}</th></tr></thead><tbody>${tr}</tbody></table>
      <p class="mini dim" style="margin-top:8px">굵은 초록 = 우세. 분당 지표는 경기 시간이 기록된 판 기준이고, 시간이 없는 옛 기록은 28분으로 가정해 계산해요.</p></div>
    </div>
  </div>`;
}

/* ───── ⚖️ 빅데이터 팀 짜주기 (운영진 전용) ───── */
function balRating(pid,lane){ // 선수×라인 점수: 폼 + 라인 숙련(표본 보정)
  const key=pid+'|'+lane;
  if(!window._balCache)window._balCache={};
  if(window._balCache[key]!==undefined)return window._balCache[key];
  let g=0,w=0,tg=0,tw=0;
  state.matches.forEach(m=>m.participants.forEach(p2=>{
    if(p2.playerId!==pid)return;
    tg++;if(p2.team===m.winnerTeam)tw++;
    if(p2.lane===lane){g++;if(p2.team===m.winnerTeam)w++}
  }));
  const conf=Math.min(1,g/6);
  const laneFit=g?((w/g*100-50)*0.5*conf+conf*8):0;
  const overall=tg?((tw/tg*100-50)*0.3*Math.min(1,tg/10)):0;
  const{arr}=formSeries(pid);
  const form=arr.length?(arr[arr.length-1]-100)*0.15:0;
  const r=50+laneFit+overall+form;
  window._balCache[key]=r;
  return r;
}
function balPerms(a){ // 5개 순열
  if(a.length<=1)return[a];
  const out=[];
  a.forEach((x,i)=>balPerms(a.slice(0,i).concat(a.slice(i+1))).forEach(r=>out.push([x,...r])));
  return out;
}
const BAL_LANES=['TOP','JUNGLE','MID','ADC','SUPPORT'];
function balAssign(ids,prefs){ // 팀 5명 → 라인 배정 (희망 라인 최우선)
  let best=null;
  balPerms(ids).forEach(perm=>{
    let score=0,pen=0;
    perm.forEach((pid,i)=>{
      const lane=BAL_LANES[i];
      score+=balRating(pid,lane);
      const pf=prefs[pid];
      if(pf&&pf!=='ANY'&&pf!==lane)pen+=30; // 희망 라인 위반 페널티
    });
    const total=score-pen;
    if(!best||total>best.total)best={perm,score,pen,total};
  });
  return best;
}
function balCompute(sel,prefs){ // 10명 → 252개 분할 전수 탐색
  window._balCache={};
  const ids=sel.slice(0,10);
  const opts=[];
  const idx=[0,1,2,3,4].map(()=>0);
  // 5명 조합 생성
  const combos=[];
  (function rec(start,cur){
    if(cur.length===5){combos.push(cur.slice());return}
    for(let i=start;i<ids.length;i++){cur.push(ids[i]);rec(i+1,cur);cur.pop()}
  })(0,[]);
  combos.forEach(A=>{
    if(A[0]!==ids[0])return; // 대칭 제거 (첫 선수는 항상 A팀)
    const B=ids.filter(x=>!A.includes(x));
    const a=balAssign(A,prefs),b=balAssign(B,prefs);
    if(!a||!b)return;
    const diff=Math.abs(a.total-b.total);
    opts.push({A:a,B:b,diff,pen:a.pen+b.pen});
  });
  opts.sort((x,y)=>(x.pen-y.pen)||(x.diff-y.diff));
  return opts.slice(0,3);
}
function balToggle(pid){
  window._balSel=window._balSel||{};
  if(window._balSel[pid]!==undefined)delete window._balSel[pid];
  else{
    if(Object.keys(window._balSel).length>=10)return toast('10명까지만!',true);
    window._balSel[pid]='ANY';
  }
  window._balRes=null;render();
}
function balLane(pid,lane){window._balSel[pid]=lane;window._balRes=null;render()}
function balRun(){
  const sel=Object.keys(window._balSel||{});
  if(sel.length!==10)return toast(`딱 10명을 골라주세요 (현재 ${sel.length}명)`,true);
  window._balRes=balCompute(sel,window._balSel);
  render();
  toast('⚖️ 빅데이터가 팀을 짰어요!');
}
function balCopy(i){

  const txt=`⚖️ 아포단 빅데이터 추천 팀 (${i+1}안)\n${line('🅰 알파',o.A)}\n${line('🅱 베타',o.B)}`;
  navigator.clipboard?.writeText(txt).then(()=>toast('📋 복사 완료 — 카톡에 붙여넣으세요!')).catch(()=>toast(txt));
}

}

/* ───── 챔피언 ───── */
function tierCls(t){return{OP:'tOP',S:'tS',A:'tA',B:'tB',C:'tC','봉인 검토':'tSEAL','표본 부족':'tNA'}[t]||'tC'}
function champVsData(champ){ // 챔피언 종합: 전적·장인·맞라인 상대전적 (선수용 champMatchups와 별개)
  const vs={},by={};let g=0,w=0,K=0,D=0,A=0;
  state.matches.forEach(m=>m.participants.forEach(p2=>{
    if(canonChamp(p2.championId)!==champ)return;
    const win=p2.team===m.winnerTeam;g++;if(win)w++;
    K+=num(p2.kills);D+=num(p2.deaths);A+=num(p2.assists);
    if(p2.playerId){by[p2.playerId]=by[p2.playerId]||{g:0,w:0};by[p2.playerId].g++;if(win)by[p2.playerId].w++}
    const opp=m.participants.find(x=>x.team!==p2.team&&x.lane===p2.lane);
    const oc=opp?canonChamp(opp.championId):'';
    if(oc&&oc!==champ){vs[oc]=vs[oc]||{g:0,w:0};vs[oc].g++;if(win)vs[oc].w++}
  }));
  return{g,w,kda:D?((K+A)/D).toFixed(2):'PERFECT',vs,by};
}
function champVsAllMap(){ // 전 챔피언 맞라인 집계 — 한 번에 (카운터 컬럼용)
  const map={};
  state.matches.forEach(m=>m.participants.forEach(p2=>{
    const c=canonChamp(p2.championId);if(!c)return;
    const opp=m.participants.find(x=>x.team!==p2.team&&x.lane===p2.lane);
    const oc=opp?canonChamp(opp.championId):'';
    if(!oc||oc===c)return;
    const v=(map[c]=map[c]||{});const e=(v[oc]=v[oc]||{g:0,w:0});
    e.g++;if(p2.team===m.winnerTeam)e.w++;
  }));
  return map;
}
function counterFaces(name,VS){ // 그 챔프가 맞라인에서 자주 진 상대 3개 — 동그란 초상화 스택
  const list=Object.entries(VS[name]||{}).map(([c,v])=>({c,...v}))
    .filter(x=>x.w/x.g<.5).sort((a,b)=>(a.w/a.g)-(b.w/b.g)||b.g-a.g).slice(0,3);
  if(!list.length)return'<span class="dim">—</span>';
  if(!window._champImg||!window._champImg.map)return list.map(x=>esc(x.c)).join(', ');
  return`<span class="counterFaces">${list.map(x=>`<span title="${esc(x.c)} 상대 ${x.w}승 ${x.g-x.w}패">${champFace(x.c,26)}</span>`).join('')}</span>`;
}
function champSel(name){window._champSel=window._champSel===name?null:name;render()}
function champDetailCard(champ){
  const M=champVsData(champ);
  if(!M.g)return`<div class="card" style="margin-bottom:14px"><p class="mini dim" style="margin:0">「${esc(champ)}」 — 내전 픽 기록이 아직 없어요. <button class="btn sm ghost" onclick="champSel(null)">닫기</button></p></div>`;
  const wr=Math.round(M.w/M.g*100);
  const masters=Object.entries(M.by).map(([pid,v])=>({name:nameOf(pid),...v,wr:Math.round(v.w/v.g*100)})).sort((a,b)=>b.g-a.g||b.wr-a.wr).slice(0,3);
  const ms=Object.entries(M.vs).map(([c,v])=>({c,...v,wr:Math.round(v.w/v.g*100)}));
  const counter=ms.filter(x=>x.g>=1&&x.w/x.g<.5).sort((a,b)=>a.wr-b.wr||b.g-a.g).slice(0,5); // 우리가 자주 진 상대 = 카운터
  const prey=ms.filter(x=>x.g>=1&&x.w/x.g>.5).sort((a,b)=>b.wr-a.wr||b.g-a.g).slice(0,5);

      <h3 style="margin:0;display:inline-flex;align-items:center;gap:8px">${champFace(champ,34)}${esc(champ)} <span class="tag">내전 데이터</span></h3>

      <span class="pill">평균 KDA <b>${M.kda}</b></span>
    </div>
    ${masters.length?`<p class="mini" style="margin:10px 0 4px;font-weight:800">🎯 장인 — 이 챔프를 가장 많이 잡은 멤버</p>
    <div class="row" style="gap:6px;flex-wrap:wrap">${masters.map((x,i)=>`<span class="pill ${i===0?'gold':''}" style="font-weight:800">${['🥇','🥈','🥉'][i]} ${esc(x.name)} <span class="dim" style="font-weight:600">${x.g}판 · ${x.wr}%</span></span>`).join('')}</div>`:''}
    <p class="mini" style="margin:10px 0 4px;font-weight:800;color:var(--lose)">🚨 카운터 — 맞라인에서 만나면 자주 진 상대</p>
    <div class="row" style="gap:6px;flex-wrap:wrap">${counter.length?counter.map(x=>chip(x,true)).join(''):'<span class="mini dim">진 적이 거의 없어요 — 천적 없음 😎</span>'}</div>
    <p class="mini" style="margin:10px 0 4px;font-weight:800;color:var(--win)">🍖 먹잇감 — 맞라인에서 만나면 자주 이긴 상대</p>
    <div class="row" style="gap:6px;flex-wrap:wrap">${prey.length?prey.map(x=>chip(x,false)).join(''):'<span class="mini dim">아직 표본이 부족해요.</span>'}</div>
    <p class="mini dim" style="margin:10px 0 0">맞라인 기준(같은 라인 반대 팀)이라 표본이 적을 수 있어요 — 판수가 쌓일수록 정확해집니다.</p>
  </div>`;

function formBoardHtml(fq){

    .filter(p=>searchHit(p,fq)).map(p=>{

        <div class="f" style="align-self:end"><button class="btn" onclick="ghSave()">연결 저장</button></div>

      <p class="mini" style="margin-top:8px"><b>토큰 만드는 법 (2분)</b>: 깃허브 → 우상단 프로필 → Settings → 맨 아래 <b>Developer settings</b> → <b>Fine-grained tokens</b> → Generate new token → 이름 아무거나, 만료 1년 → <b>Repository access: Only select repositories</b>에서 우리 저장소만 선택 → <b>Permissions → Contents: Read and write</b> → Generate → 복사해서 위에 붙여넣기. 토큰은 <b>이 브라우저에만</b> 저장되고 백업·공유 파일엔 절대 안 들어가요.</p>
    </details>
  </div>
  <div class="card" style="margin-top:14px"><details class="fold"><summary>🗳 유저 배당 투표 서버 연결 (선택) — 현재: ${state.settings.voteApiUrl?'<b>연결됨</b>':'미연결 (각자 기기에 내 픽만 기록)'}</summary>
    <p class="mini" style="margin-top:8px">연결하면 멤버들의 승부 예측 표가 <b>실시간 합산</b>되어 매치데이 카드에 "유저 배당"으로 떠요. 기존 Vercel 프로젝트에 <code>api/vote.js</code> 파일 하나 + 무료 Upstash Redis 연결이면 끝 (가이드는 채팅 참고). 미연결이어도 투표 버튼은 작동하고 각자 기기에 내 픽이 기록됩니다.</p>
    <div class="grid c2" style="margin-top:8px">
      <div class="f"><label>투표 서버 주소 (Vercel)</label><input id="voteApiUrl" value="${esc(state.settings.voteApiUrl||'')}" placeholder="https://apodan-riot-proxy.vercel.app"></div>
      <div class="f" style="align-self:end"><div class="row" style="gap:6px"><button class="btn" onclick="saveVoteApi()">연결 저장</button><button class="btn ghost" onclick="voteDiag()">🔬 서버 점검</button></div></div>
    </div>
  </details></div>
  ${(()=>{const un=unmatchedNames();if(!un.length)return'';
    window._unm=un.map(([r])=>r);
    const opts='<option value="">멤버 선택…</option><option value="__new__">➕ 나간 사람·외부 인원 — 새 인물로 등록 (기록 보존)</option>'+state.players.map(p=>`<option value="${p.id}">${esc(p.displayName)}${p.active?'':' (휴면)'}</option>`).join('');
    return`<div class="card" style="margin-top:14px;border-color:rgba(242,184,75,.4)"><h3>🔗 미확인 닉네임 연결 <span class="tag">${un.length}명 — 닉변·신규 인원 정리</span></h3>
    <p class="mini">경기 기록엔 있는데 명단과 못 맞춘 닉네임이에요. 멤버를 골라 <b>연결</b>하면 ① 이 닉으로 기록된 <b>모든 판</b>이 그 멤버 전적으로 합쳐지고 ② <b>별명으로 자동 등록</b>돼 다음 가져오기부터는 알아서 인식돼요. 닉변이면 본인에게, 새 멤버라면 플레이어 탭에서 등록 후 연결!</p>
    ${un.map(([raw,cnt],idx)=>`<div class="row" style="justify-content:space-between;gap:8px;padding:7px 0;border-top:1px dashed var(--line);flex-wrap:wrap">
      <span><b>${esc(raw)}</b> <span class="mini dim">${cnt}판 기록</span></span>
      <span class="row" style="gap:6px">
        <select id="lnkSel${idx}" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:7px">${opts}</select>
        <button class="btn sm gold" onclick="linkNick(${idx})">연결</button>
      </span></div>`).join('')}
    </div>`})()}
  ${(()=>{const owners=nameOwners();if(!owners.length||!isAdmin())return'';
    return`<div class="card" style="margin-top:14px"><details class="fold"><summary>🩹 닉네임 재배정 — 잘못 연결된 기록 바로잡기 · 탈퇴자 기록 보존</summary>
    <p class="mini" style="margin-top:8px">닉이 비슷해서 엉뚱한 멤버에게 붙은 기록을 통째로 옮겨요. 톡방을 나간 사람의 기록은 <b>"➕ 새 인물로 등록"</b>을 고르면 휴면 멤버로 만들어져, 남의 통계를 오염시키지 않고 보존됩니다. 재배정하면 잘못 등록된 별명도 자동 정리돼 다음 가져오기부터 올바르게 인식돼요.</p>
    <div class="grid c3" style="margin-top:8px">
      <div class="f"><label>경기 속 닉네임</label><select id="raRaw" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:8px;width:100%">
        <option value="">선택…</option>${owners.map(o=>`<option value="${esc(o.raw)}">${esc(o.raw)} — 현재: ${esc(o.owners.join(', '))} (${o.count}판)</option>`).join('')}</select></div>
      <div class="f"><label>진짜 주인</label><select id="raTo" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:8px;width:100%">
        <option value="">선택…</option>
        <option value="__new__">➕ 새 인물로 등록 (탈퇴·외부 인원 기록 보존)</option>
        ${state.players.map(p=>`<option value="${p.id}">${esc(p.displayName)}${p.active?'':' (휴면)'}</option>`).join('')}</select></div>
      <div class="f" style="align-self:end"><button class="btn gold" onclick="reassignNick()">재배정</button></div>
    </div></details></div>`})()}
  ${(()=>{const sus=suspectDups();if(!sus.length)return'';
    return`<div class="card" style="margin-top:14px"><details class="fold"><summary>⚠ 중복 의심 경기 ${sus.reduce((a,g)=>a+g.length,0)}건 — 펼쳐서 확인</summary>
    <p class="mini" style="margin-top:8px">게임ID가 없는 판이 섞여 있거나 ID가 겹치는 그룹만 보여줘요. (게임ID가 전부 다른 같은 날 경기는 정상이라 안 나옵니다)</p>
    ${sus.map(g=>`<div style="border:1px dashed var(--line);border-radius:10px;padding:10px;margin-bottom:8px">
      ${g.map(m=>{const tk=m.participants.reduce((a,p)=>a+num(p.kills),0);
        return`<div class="row" style="justify-content:space-between;padding:4px 0">
        <span class="mini">${esc(m.playedAt)} ${m.setNumber}세트 · ${m.winnerTeam==='BLUE'?'<span class=tBlue>블루 승</span>':'<span class=tRed>레드 승</span>'} · ${m.durationMin?m.durationMin+'분 · ':''}총 ${tk}킬${m.gameId?' · ID '+esc(m.gameId):' · <b style=color:var(--gold)>ID 없음</b>'}${m.memo?' · '+esc(m.memo):''}</span>
        <button class="btn sm lose" onclick="delMatch('${m.id}')">이 판 삭제</button></div>`}).join('')}
    </div>`).join('')}</details></div>`})()}
  <div class="card" style="margin-top:14px"><h3>정리 · 초기화</h3>
    <div class="row">
      <button class="btn win" onclick="dedupeMatches()">🧹 중복 경기 정리 (딸깍 — 그룹당 1판 보존)</button>
      <button class="btn win" onclick="cleanGhosts()">무효 게임 정리 (다시하기 등)</button>
      <button class="btn" onclick="if(needAdmin())return;if(confirm('경기 기록만 모두 삭제할까요?')){state.matches=[];state.voteRooms=[];save();render()}">경기 기록만 삭제</button>
      <button class="btn" onclick="if(needAdmin())return;if(confirm('확정 명단만 남기고 전부 초기화할까요?')){state=freshState();save();render()}">확정 명단으로 초기화</button>
      <button class="btn lose" onclick="if(needAdmin())return;if(confirm('명단과 경기를 전부 삭제할까요?')){state=fixState({});save();render()}">완전 초기화</button>
    </div></div>
  <div class="card" style="margin-top:14px"><h3>온라인화 로드맵</h3>
    <p class="mini">토너먼트 API 승인 대기 중 (Pending Review). 승인되면: 사이트에서 내전 방 코드 발급 → 멤버는 코드 입력으로 입장 → 경기 결과 자동 기록. 그다음 단계는 Supabase 실시간 DB + 카톡 링크 MVP 투표 + 디스코드 연동입니다.</p></div>`;
}
function backup(){
  state.settings.lastBackupAt=new Date().toISOString();save();render();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`apodan-backup-${todayStr()}.json`;a.click();
}
function restore(){
  if(needAdmin())return;
  const f=$('restoreFile').files[0];
  if(!f)return toast('백업 파일을 선택해주세요.',true);
  const r=new FileReader();
  r.onload=()=>{try{state=fixState(JSON.parse(r.result));save();render();toast('복원 완료!')}catch(e){toast('복원 실패: JSON 파일을 확인해주세요.',true)}};
  r.readAsText(f);
}
function copySummary(){
  const P=statPlayers(),D=statDuos(),C=statChamps();
  const lines=['🏆 아포단 내전실록 요약',`누적 내전 ${state.matches.length}판 · 명단 ${state.players.filter(p=>p.active).length}명`];
  if(P[0])lines.push(`승률 1위: ${P[0].name} ${P[0].winRate}% (${P[0].wins}승 ${P[0].losses}패)`);
  if(D[0])lines.push(`국밥 듀오: ${D[0].names} ${D[0].winRate}%`);
  if(C[0])lines.push(`메타픽: ${C[0].champion} [${C[0].tier}]`);
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('요약을 복사했어요.'));
  else toast('이 환경에서는 복사가 안 돼요.',true);
}

/* ───── 부트 ───── */
render();
loadShared(false); // 호스팅된 링크에서 열렸으면 공유 data.json 자동 확인
bankSync(true); // 등급칩·온라인·잭팟 속보
champImgInit(); // 챔피언 초상화 매핑
setInterval(()=>bankSync(),240000); // 💾 Upstash 절약: 4분 주기 + 백그라운드 탭 정지
document.addEventListener('visibilitychange',()=>{if(!document.hidden)bankSync(true)}); // 탭으로 돌아오면 즉시 새로고침
setInterval(()=>{ // 투표 남은 시간 갱신 (입력 중엔 건너뜀)
  const ae=document.activeElement;
  const typing=ae&&['INPUT','TEXTAREA','SELECT'].includes(ae.tagName);
},30000);

</script>
