<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아포단 내전실록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
/* ─────────────────────────────────────────────
   아포단 내전실록 · 디자인 토큰
   먹지 같은 잉크 블랙 + 우승 트로피 골드 + 승/패 틸·로즈
────────────────────────────────────────────── */
:root{
  --bg:#101319; --bg2:#0B0E13;
  --panel:#171C26; --panel2:#121722; --inset:#0E1320;
  --line:#27303F; --line2:#323D50;
  --text:#EAEFF7; --mut:#9AA6B9; --dim:#6B7689;
  --gold:#F2B84B; --gold-dim:rgba(242,184,75,.14);
  --win:#3FD9C5;  --win-dim:rgba(63,217,197,.12);
  --lose:#FF5C7A; --lose-dim:rgba(255,92,122,.12);
  --blue:#6AA6FF; --blue-dim:rgba(106,166,255,.13);
  --violet:#B58CFF;
  --r:14px; --r-sm:10px;
  --shadow:0 14px 44px rgba(0,0,0,.38);
}
*{box-sizing:border-box}
html{font-size:15px}
body{
  margin:0; background:var(--bg) radial-gradient(1100px 480px at 80% -10%, rgba(242,184,75,.05), transparent 60%);
  color:var(--text); line-height:1.55;
  font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--blue)} button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
::selection{background:rgba(242,184,75,.3)}

/* ── 헤더 + 결과 티커 ── */
.top{position:sticky;top:0;z-index:30;background:rgba(11,14,19,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topIn{max-width:1480px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.mark{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:21px;
  background:linear-gradient(150deg,#3a2e12,#16120a);border:1px solid rgba(242,184,75,.45);box-shadow:0 0 24px rgba(242,184,75,.12)}
.brand h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
.brand p{margin:1px 0 0;font-size:11.5px;color:var(--mut);letter-spacing:.14em;font-weight:600}
.brand p b{color:var(--gold);font-weight:700}
nav.tabs{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
nav.tabs button{border:1px solid transparent;background:transparent;color:var(--mut);padding:8px 13px;border-radius:999px;font-weight:600;font-size:13.5px;transition:.15s}
nav.tabs button:hover{color:var(--text);background:var(--panel)}
nav.tabs button.on{color:#1a1408;background:var(--gold);border-color:var(--gold);font-weight:800}
/* 시그니처: 최근 경기 주식 티커 */
.ticker{border-top:1px solid var(--line);overflow:hidden;height:32px;display:flex;align-items:center;background:var(--bg2)}
.ticker .lbl{flex:none;padding:0 14px;font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--gold);border-right:1px solid var(--line);height:100%;display:flex;align-items:center;background:var(--gold-dim)}
.tickerTrack{display:flex;gap:34px;white-space:nowrap;animation:tick 38s linear infinite;padding-left:20px;font-size:12.5px;color:var(--mut)}
.tickerTrack b{color:var(--text);font-weight:700}
.tk-up{color:var(--win);font-weight:700}.tk-dn{color:var(--lose);font-weight:700}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media (prefers-reduced-motion:reduce){.tickerTrack{animation:none}}

/* ── 레이아웃 ── */
.wrap{max-width:1480px;margin:0 auto;padding:26px 20px 70px}
.pageHead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.pageHead h2{margin:0;font-size:26px;font-weight:800;letter-spacing:-.02em}
.pageHead .sub{margin:5px 0 0;color:var(--mut);font-size:13.5px;max-width:760px}
.meta{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:var(--panel);border:1px solid var(--line);font-size:12px;color:var(--mut);font-weight:600}
.grid{display:grid;gap:14px}
.c2{grid-template-columns:repeat(2,minmax(0,1fr))}
.c3{grid-template-columns:repeat(3,minmax(0,1fr))}
.c4{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.card>h3{margin:0 0 12px;font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.card>h3 .tag{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(242,184,75,.3);padding:2px 8px;border-radius:999px}
.mini{font-size:12.5px;color:var(--mut)} .dim{color:var(--dim)} .hide{display:none!important}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap} .grow{flex:1} .right{margin-left:auto}
.hr{height:1px;background:var(--line);margin:14px 0}

/* ── 통계 숫자 카드 ── */
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.kpi .n{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.kpi .l{font-size:12px;color:var(--mut);margin-top:3px;font-weight:600}
.kpi.gold .n{color:var(--gold)}

/* ── 폼 요소 ── */
.f{display:grid;gap:6px}
.f label{font-size:12px;color:var(--mut);font-weight:700}
.f input,.f select,.f textarea,
table input,table select{
  width:100%;background:var(--inset);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:9px 11px;color:var(--text);outline:none;min-width:0}
.f textarea{min-height:96px;resize:vertical}
.f input:focus,.f select:focus,.f textarea:focus,table input:focus,table select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(242,184,75,.13)}
.btn{border:1px solid var(--line2);border-radius:var(--r-sm);padding:9px 14px;background:var(--panel2);color:var(--text);font-weight:700;font-size:13.5px;transition:.13s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#1a1408}
.btn.gold:hover{filter:brightness(1.08);color:#1a1408}
.btn.gold:disabled{opacity:.55;cursor:wait}
.btn.win{background:rgba(63,217,197,.12);border-color:rgba(63,217,197,.45);color:var(--win)}
.btn.lose{background:rgba(255,92,122,.1);border-color:rgba(255,92,122,.4);color:var(--lose)}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn.ghost{background:transparent}

/* ── 테이블 ── */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{font-size:11.5px;text-align:left;color:var(--dim);font-weight:700;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--line2);white-space:nowrap}
.tbl td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.022)}
.scrollx{overflow-x:auto} .scrolly{overflow-y:auto}
.num{text-align:right}
.tbl th.num{text-align:right}
.tbl td.num{text-align:right}

/* ── 색 의미 ── */
.tBlue{color:var(--blue)} .tRed{color:var(--lose)}
.up{color:var(--win);font-weight:700} .dn{color:var(--lose);font-weight:700} .even{color:var(--mut)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;border:1px solid var(--line);background:var(--inset);color:var(--mut)}
.pill.win{border-color:rgba(63,217,197,.45);color:var(--win);background:var(--win-dim)}
.pill.lose{border-color:rgba(255,92,122,.45);color:var(--lose);background:var(--lose-dim)}
.pill.blue{border-color:rgba(106,166,255,.45);color:var(--blue);background:var(--blue-dim)}
.pill.gold{border-color:rgba(242,184,75,.5);color:var(--gold);background:var(--gold-dim)}
.pill.violet{border-color:rgba(181,140,255,.45);color:var(--violet);background:rgba(181,140,255,.1)}
.bar{height:7px;border-radius:99px;background:var(--inset);overflow:hidden;min-width:70px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--win),var(--blue));border-radius:99px}

/* ── 빈 상태 / 토스트 / 모달 ── */
.empty{padding:30px;border:1px dashed var(--line2);border-radius:var(--r);color:var(--dim);text-align:center;background:var(--panel2);font-size:13.5px}
#toast{position:fixed;right:22px;bottom:22px;z-index:60;display:grid;gap:8px}
.toastMsg{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--gold);border-radius:12px;padding:11px 15px;box-shadow:var(--shadow);max-width:380px;font-size:13.5px;animation:pop .18s ease-out}
.toastMsg.bad{border-left-color:var(--lose)}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.modal{position:fixed;inset:0;z-index:50;background:rgba(5,7,10,.66);display:none;align-items:flex-start;justify-content:center;padding:34px 16px;overflow:auto}
.modal.open{display:flex}
.modalBox{width:min(1060px,100%);background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:20px;box-shadow:var(--shadow)}

/* ── 스크린샷 분석기 ── */
.drop{border:2px dashed var(--line2);border-radius:var(--r);background:var(--panel2);padding:26px;text-align:center;transition:.15s;cursor:pointer}
.drop:hover,.drop.over{border-color:var(--gold);background:rgba(242,184,75,.05)}
.drop b{font-size:15px} .drop .mini{margin-top:5px}
.thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.thumb{position:relative;width:120px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--line2);background:#000}
.thumb img{width:100%;height:100%;object-fit:cover;opacity:.9}
.thumb button{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:6px;border:none;background:rgba(0,0,0,.65);color:#fff;font-size:11px;line-height:1;display:grid;place-items:center}
.prog{height:8px;border-radius:99px;background:var(--inset);overflow:hidden;margin-top:10px}
.prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--win));transition:width .25s}
.ocrNote{margin-top:12px;padding:12px 14px;border-radius:var(--r-sm);background:var(--lose-dim);border:1px solid rgba(255,92,122,.35);font-size:13px;display:none}

/* ── 검수 화면 ── */
.review .tbl td{padding:6px}
.review input,.review select{padding:7px 9px;font-size:13px}
.conf{font-size:11px;font-weight:800;white-space:nowrap}
.conf.ok{color:var(--win)} .conf.mid{color:var(--gold)} .conf.bad{color:var(--lose)}
details.fold{border:1px solid var(--line);border-radius:var(--r);background:var(--panel2);padding:0 14px;margin:14px 0}
details.fold summary{cursor:pointer;font-weight:800;padding:12px 0;font-size:14px}
details.fold[open]{padding-bottom:14px}

/* ── 챔피언 티어 보드 ── */
.tierBoard{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
.tierCol{background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tierHead{text-align:center;font-weight:900;padding:8px 4px;font-size:12.5px;letter-spacing:.06em;border-bottom:1px solid var(--line);background:var(--inset)}
.tOP{color:#FF8AD4}.tS{color:var(--gold)}.tA{color:var(--blue)}.tB{color:var(--win)}.tC{color:#C7CFDC}.tSEAL{color:var(--lose)}.tNA{color:var(--dim)}
.tierItem{display:flex;justify-content:space-between;gap:6px;padding:7px 10px;font-size:12.5px;border-bottom:1px solid rgba(39,48,63,.5)}
.tierItem:last-child{border-bottom:none}

/* ── 폼 주식 ── */
.spark{width:170px;height:42px;display:block}
.priceUp{color:var(--win)} .priceDn{color:var(--lose)}

/* ── 칭호 ── */
.awards{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:12px}
.award{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.award::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--gold)}
.award b{display:block;font-size:14px;color:var(--gold)}
.award .who{font-weight:800;margin:3px 0 1px;font-size:15px}
.award .mini{line-height:1.45}

/* ── 칭호 명예의 전당 ── */
.owners{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.ownerCard{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
.ownerCard .oname{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:17px;font-weight:800;margin-bottom:6px}
.ownerCard .arow{padding:8px 0;border-top:1px dashed var(--line)}
.ownerCard .arow b{color:var(--gold);font-size:13.5px;display:block}
.ownerCard .arow .mini{display:block;margin-top:2px;line-height:1.4}

/* ── 플레이어 리스트 ── */
.pList{max-height:560px;overflow:auto;display:grid;gap:6px;padding-right:4px}
.pItem{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--r-sm);border:1px solid transparent;cursor:pointer;color:var(--mut)}
.pItem:hover{background:var(--panel2);color:var(--text)}
.pItem.on{background:var(--panel2);border-color:var(--line2);color:var(--text)}
.pItem .ign{font-size:11px;color:var(--dim);margin-top:1px}
.pItem.off{opacity:.45}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

@media (max-width:1080px){.c4{grid-template-columns:repeat(2,minmax(0,1fr))}.c3{grid-template-columns:repeat(2,minmax(0,1fr))}.tierBoard{grid-template-columns:repeat(4,minmax(0,1fr))}}
@media (max-width:720px){
  html{font-size:14px}
  .c2,.c3,.c4{grid-template-columns:1fr}
  .tierBoard{grid-template-columns:repeat(2,minmax(0,1fr))}
  .pageHead h2{font-size:22px}
  nav.tabs{width:100%;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px}
  nav.tabs button{flex:none}
}
</style>
</head>
<body>

<header class="top">
  <div class="topIn">
    <div class="mark">🏆</div>
    <div class="brand">
      <h1>아포단 내전실록</h1>
      <p>APODAN CIVIL WAR ARCHIVE · <b>v3.1</b></p>
    </div>
    <nav class="tabs" id="nav"></nav>
  </div>
  <div class="ticker"><div class="lbl">LIVE</div><div class="tickerTrack" id="ticker"></div></div>
</header>

<main class="wrap"><div id="view"></div></main>

<div id="toast"></div>
<div class="modal" id="modal"><div class="modalBox" id="modalBox"></div></div>
<datalist id="dlPlayers"></datalist>
<datalist id="dlChamps"></datalist>

<script>
'use strict';
/* ============================================================
   아포단 내전실록 v3.1 — 단일 파일 로컬 앱
   데이터는 이 브라우저 localStorage에 저장됩니다.
   ============================================================ */

/* ───── 상수 ───── */
const DB_KEY='apodan_v3';
const LEGACY_KEYS=['apodan_records_v2','apodan_records_v1'];
const TEAMS=['BLUE','RED'];
const LANES=['TOP','JUNGLE','MID','ADC','SUPPORT'];
const LANE_KO={TOP:'탑',JUNGLE:'정글',MID:'미드',ADC:'원딜',SUPPORT:'서폿'};

/* 2026-06-10 기준 전체 챔피언 173종 (신챔 로크 포함: 26.13 패치 합류) */

function lev(a,b){ // 편집 거리 (퍼지 매칭용)
  a=norm(a);b=norm(b);
  if(!a.length)return b.length; if(!b.length)return a.length;
  let prev=Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){
    const cur=[i];
    for(let j=1;j<=b.length;j++)
      cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev=cur;
  }
  return prev[b.length];
}

function parseRiot(s){const i=String(s||'').indexOf('#');return i<0?{riotName:String(s||'').trim(),riotTag:''}:{riotName:s.slice(0,i).trim(),riotTag:s.slice(i+1).trim()}}
function aliasGuess(name){
  const out=new Set();
  const bare=String(name||'').replace(/^\d{2}\s*/,'').trim();
  if(bare&&bare!==name)out.add(bare);
  out.add(String(name||'').replace(/\s+/g,''));
  if(bare)out.add(bare.replace(/\s+/g,''));
  return [...out].filter(Boolean);
}
function makePlayer(name){return{id:uid('p'),displayName:name,kakaoName:name,riotName:'',riotTag:'',aliases:aliasGuess(name),active:true,memo:''}}
function rosterToPlayer(e){
  const p=makePlayer(e.n);
  const {riotName,riotTag}=parseRiot(e.r);
  p.riotName=riotName;p.riotTag=riotTag;
  if(riotName)p.aliases=[...new Set([...p.aliases,riotName.replace(/\s+/g,'')])];
  return p;
}
function freshState(){return fixState({version:3,players:ROSTER.map(rosterToPlayer),matches:[],voteRooms:[],settings:{mvpMinutes:10}})}
function fixState(s){
  s=s&&typeof s==='object'?s:{};
  s.version=3;
  s.players=(Array.isArray(s.players)?s.players:[]).map(p=>({
    id:p.id||uid('p'),
    displayName:p.displayName||p.name||p.kakaoName||'이름없음',
    kakaoName:p.kakaoName||p.displayName||p.name||'',
    riotName:p.riotName||'',riotTag:p.riotTag||'',
    aliases:Array.isArray(p.aliases)?p.aliases.filter(Boolean):aliasGuess(p.displayName||p.name||''),
    active:p.active!==false, memo:p.memo||''
  }));
  s.matches=(Array.isArray(s.matches)?s.matches:[]).map(m=>({
    id:m.id||uid('m'),
    playedAt:m.playedAt||m.date||todayStr(),
    setNumber:num(m.setNumber||m.set||1)||1,
    winnerTeam:String(m.winnerTeam||m.winner||'BLUE').toUpperCase().includes('RED')?'RED':'BLUE',
    memo:m.memo||'', mvpId:m.mvpId||null, gameId:m.gameId!=null?String(m.gameId):null, durationMin:m.durationMin!=null?num(m.durationMin):null,
    createdAt:m.createdAt||new Date().toISOString(),
    participants:(Array.isArray(m.participants)?m.participants:[]).map(p=>({
      team:String(p.team||'BLUE').toUpperCase().includes('RED')?'RED':'BLUE',
      lane:LANES.includes(p.lane)?p.lane:'',
      playerId:p.playerId||'', rawName:p.rawName||'',
      championId:p.championId||p.champ||'', kills:num(p.kills),deaths:num(p.deaths),assists:num(p.assists),
      stats:Object.fromEntries(Object.entries(p.stats||{}).map(([k,v])=>[k,num(v)]))
    })),
    bans:Array.isArray(m.bans)?m.bans:[]
  }));
  s.voteRooms=Array.isArray(s.voteRooms)?s.voteRooms:[];
  s.settings=Object.assign({mvpMinutes:10},s.settings||{});
  return s;
}

const byId=id=>state.players.find(p=>p.id===id);
const nameOf=id=>byId(id)?.displayName||'미확인';
function labelsOf(p){return[p.displayName,p.kakaoName,p.riotName,p.riotName&&p.riotTag?p.riotName+'#'+p.riotTag:'',...(p.aliases||[])].filter(Boolean)}
function findPlayer(text){
  const k=norm(text); if(!k)return null;
  let hit=state.players.find(p=>labelsOf(p).some(x=>norm(x)===k));
  if(hit)return hit;
  if(k.length<2)return null;
  return state.players.find(p=>labelsOf(p).some(x=>{const n=norm(x);return n.length>=2&&(n.includes(k)||k.includes(n))}))||null;
}
function fuzzyPlayer(text){ // OCR 결과용: 오타 허용 매칭
  const exact=findPlayer(text); if(exact)return{player:exact,score:0};
  const k=norm(text); if(k.length<2)return{player:null,score:99};
  let best=null,bestD=99;
  for(const p of state.players){
    for(const lb of labelsOf(p)){
      const n=norm(lb); if(n.length<2)continue;
      const d=lev(k,n);
      const tol=Math.max(1,Math.floor(Math.max(k.length,n.length)*0.34));
      if(d<=tol&&d<bestD){best=p;bestD=d}
    }
  }
  return{player:best,score:bestD};
}
function canonChamp(text){
  if(!text)return'';
  const raw=String(text).trim(),k=norm(raw);
  if(CHAMP_ALIAS[k])return CHAMP_ALIAS[k];
  const exact=CHAMPIONS.find(c=>norm(c)===k); if(exact)return exact;
  const part=k.length>=2?CHAMPIONS.find(c=>{const n=norm(c);return n.length>=2&&(n.includes(k)||k.includes(n))}):null; if(part)return part;
  if(k.length>=2){ // 퍼지
    let best='',bd=99;
    for(const c of CHAMPIONS){const d=lev(k,norm(c));const tol=Math.max(1,Math.floor(norm(c).length*0.3));if(d<=tol&&d<bd){best=c;bd=d}}
    if(best)return best;
  }
  return raw;
}

function statPlayers(){
  const map=new Map();
  state.players.forEach(p=>map.set(p.id,{id:p.id,name:p.displayName,games:0,wins:0,kills:0,deaths:0,assists:0,mvp:0,
    ...Object.fromEntries(STAT_FIELDS.map(([k])=>[k,0]))}));
  state.matches.forEach(m=>m.participants.forEach(p=>{
    const s=map.get(p.playerId); if(!s)return;
    s.games++; if(p.team===m.winnerTeam)s.wins++;
    s.kills+=p.kills;s.deaths+=p.deaths;s.assists+=p.assists;
    if(m.mvpId===p.playerId)s.mvp++;
    STAT_FIELDS.forEach(([k])=>s[k]+=num(p.stats?.[k]));
  }));
  return [...map.values()].filter(s=>s.games>0).map(s=>({...s,
    losses:s.games-s.wins, winRate:pct(s.wins,s.games),
    kda:s.deaths?Math.round((s.kills+s.assists)/s.deaths*100)/100:(s.kills+s.assists),

function statDuos(min=2){

function statRivals(min=2){

function statChamps(){
  const map=new Map(); let totalPicks=0;
  const ensure=c=>{if(!map.has(c))map.set(c,{champion:c,picks:0,wins:0,bans:0,recent:0,recentW:0});return map.get(c)};
  state.matches.forEach(m=>m.participants.forEach(p=>{
    const c=canonChamp(p.championId); if(!c)return;
    const s=ensure(c); s.picks++; totalPicks++; if(p.team===m.winnerTeam)s.wins++;
  }));
  state.matches.forEach(m=>(m.bans||[]).forEach(b=>{const c=canonChamp(b.championId||b);if(c)ensure(c).bans++}));
  const recent=[...state.matches].sort((a,b)=>sortKey(a).localeCompare(sortKey(b))).slice(-10);
  recent.forEach(m=>m.participants.forEach(p=>{
    const s=map.get(canonChamp(p.championId)); if(!s)return;
    s.recent++; if(p.team===m.winnerTeam)s.recentW++;
  }));
  return [...map.values()].map(s=>{
    const wr=pct(s.wins,s.picks), pickRate=pct(s.picks,totalPicks||1);
    const bayes=(s.wins+2)/(s.picks+4); // 표본 보정(사전확률 50%)
    const recWr=s.recent?pct(s.recentW,s.recent):50;
    const score=Math.round(((bayes-.5)*100 + pickRate*.55 + pct(s.bans,Math.max(1,state.matches.length))*.06 + (recWr-50)*.08 - (s.picks<2?8:0))*10)/10;
    let tier='C';
    if(s.picks<2)tier='표본 부족';
    else if(s.picks>=3&&wr<=33)tier='봉인 검토';
    else if(score>=16)tier='OP'; else if(score>=11)tier='S';
    else if(score>=6)tier='A'; else if(score>=1)tier='B';
    return{...s,winRate:wr,pickRate,score,tier};
  }).sort((a,b)=>b.score-a.score||b.picks-a.picks);
}

function playerHex(id,laneSel){
  const myLane=laneSel||playerMainLane(id);

  const mine=rates.get(id);
  if(!mine)return null;
  const axes=LANE_AXES[myLane]||GENERIC_AXES;
  let poolIds=[...rates.keys()];
  let laneScoped=!!myLane&&poolIds.length>=3;
  if(myLane&&!laneScoped){ // 그 라인 표본이 너무 적으면 전체 기준으로 폴백
    const all=ratesMap();poolIds=[...all.keys()];

function hexFrom(rates,id,axes,poolIds,lane,laneScoped,mine){
  const vals=[];

    const mn=Math.min(...arr),mx=Math.max(...arr);

  }

}
function radarSvg(vals,labels,size=290){
  const cx=size/2,cy=size/2,R=size*0.34,n=vals.length;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/n;return[+(cx+Math.cos(a)*r).toFixed(1),+(cy+Math.sin(a)*r).toFixed(1)]};
  let grid='';
  for(const f of[0.25,0.5,0.75,1])grid+=`<polygon points="${Array.from({length:n},(_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  let axes='',lbl='';
  for(let i=0;i<n;i++){
    const[ax,ay]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="var(--line)" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+20);lbl+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--mut)" font-size="11.5" font-weight="700">${esc(labels[i])}</text>`;
  }
  const poly=Array.from({length:n},(_,i)=>pt(i,R*Math.max(0.05,vals[i])).join(',')).join(' ');
  const dots=Array.from({length:n},(_,i)=>{const[dx,dy]=pt(i,R*Math.max(0.05,vals[i]));return`<circle cx="${dx}" cy="${dy}" r="3" fill="var(--gold)"/>`}).join('');
  return`<svg viewBox="0 0 ${size} ${size}" style="max-width:${size}px;width:100%" role="img" aria-label="플레이어 지표 육각형">${grid}${axes}<polygon points="${poly}" fill="rgba(242,184,75,.2)" stroke="var(--gold)" stroke-width="2.2" stroke-linejoin="round"/>${dots}${lbl}</svg>`;
}

  const pt=(i,r)=>{const ag=-Math.PI/2+i*2*Math.PI/n;return[+(cx+Math.cos(ag)*r).toFixed(1),+(cy+Math.sin(ag)*r).toFixed(1)]};
  let grid='';for(const f of[0.25,0.5,0.75,1])grid+=`<polygon points="${Array.from({length:n},(_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  let axes='',lbl='';
  for(let i=0;i<n;i++){const[ax,ay]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="var(--line)" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+20);lbl+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--mut)" font-size="11.5" font-weight="700">${esc(labels[i])}</text>`}
  const poly=v=>Array.from({length:n},(_,i)=>pt(i,R*Math.max(0.05,v[i])).join(',')).join(' ');

}

function playerMainLane(id){
  const cnt={};
  state.matches.forEach(m=>m.participants.forEach(p=>{if(p.playerId===id&&p.lane)cnt[p.lane]=(cnt[p.lane]||0)+1}));
  const best=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];

}

function matchPro(hex,laneKo){
  if(!hex)return null;
  const me=hex.me;
  if(me.games<3)return{name:'스카우트 진행 중',desc:`표본 ${me.games}판 — 3판 이상 쌓이면 닮은꼴 프로 판정이 나옵니다.`,pro:false};
  const avg=hex.vals.reduce((a,b)=>a+b,0)/hex.vals.length;
  if(avg<0.32){
    const pool=['각성 전 주인공형','잠재력 매장량 전국 1위','대기만성 스토브리그 유망주','폼은 일시적, 클래스는 오는 중'];
    return{name:pickSeeded(pool,me.games*13+Math.round(avg*100)),desc:'아직 지표가 만개하지 않았을 뿐. 서사는 지금부터 쓰입니다.',pro:false};
  }
  if(!laneKo)return{name:'포지션 탐색 중',desc:'라인 기록이 쌓이면 그 포지션 16타입 중에서 닮은꼴을 찾아드려요.',pro:false};
  const pool=PRO_TYPES.filter(t=>t.lane===laneKo);
  const n=hex.vals.length;
  const ranked=pool.map(t=>{
    let d=0;for(let i=0;i<n;i++)d+=(hex.vals[i]-(t.v[i]??.5))**2;
    return{t,d:Math.sqrt(d)};
  }).sort((a,b)=>a.d-b.d);
  const sim=d=>Math.max(5,Math.min(99,Math.round(100-(d/Math.sqrt(n))*90))); // 축 수에 무관한 정규화 거리
  const best=ranked[0],second=ranked[1];
  return{name:best.t.name+'형',lane:best.t.lane,desc:best.t.desc,sim:sim(best.d),
    second:second.t.name+'형',secondSim:sim(second.d),mainLane:laneKo||null,pro:true};
}
function sparkSvg(arr,w=170,h=42){
  if(arr.length<2)return'<span class="dim mini">데이터 부족</span>';
  const min=Math.min(...arr,100),max=Math.max(...arr,100),rg=max-min||1;
  const X=i=>(i/(arr.length-1)*(w-8)+4),Y=v=>(h-((v-min)/rg)*(h*.74)-h*.13);
  const pts=arr.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const up=arr[arr.length-1]>=arr[0];
  const col=up?'var(--win)':'var(--lose)';
  const fill=up?'rgba(63,217,197,.14)':'rgba(255,92,122,.12)';
  const area=`${X(0).toFixed(1)},${(h-2).toFixed(1)} ${pts} ${X(arr.length-1).toFixed(1)},${(h-2).toFixed(1)}`;
  const base=Y(100).toFixed(1); // 기준가 100 점선
  const lx=X(arr.length-1).toFixed(1),ly=Y(arr[arr.length-1]).toFixed(1);
  return`<svg class="spark" style="width:${w}px;height:${h}px" viewBox="0 0 ${w} ${h}">
    <line x1="4" y1="${base}" x2="${w-4}" y2="${base}" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3 4" opacity=".6"/>
    <polygon points="${area}" fill="${fill}"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lx}" cy="${ly}" r="3.4" fill="${col}"/>
  </svg>`;
}

function streaksOf(id){
  let cw=0,cl=0,mw=0,ml=0;
  playerHistory(id).forEach(m=>{
    const p=m.participants.find(x=>x.playerId===id);
    if(p.team===m.winnerTeam){cw++;cl=0}else{cl++;cw=0}
    mw=Math.max(mw,cw);ml=Math.max(ml,cl);
  });
  return{mw,ml};
}
function makeAwards(){
  const P=statPlayers(),D=statDuos(3),R=statRivals(3),C=statChamps(),PC=statPlayerChamps(2),SDp=statPlayerSides(1),out=[];
  const push=(title,target,desc)=>out.push({title,target,desc});
  const top=(arr,key,minGames=1)=>arr.filter(p=>p.games>=minGames&&p[key]>0).sort((x,y)=>y[key]-x[key])[0];
  const per=(p,key)=>p.games?p[key]/p.games:0;

  if(P.length){
    const best=P[0];
    if(best.games>=2)push('승리요정',best.name,`승률 ${best.winRate}% · 같은 팀이면 반은 먹고 들어감`);
    P.forEach(p=>{
      if(p.games>=5&&p.winRate>=80)push('내전 재앙',p.name,`${p.games}판 ${p.winRate}% · 팀 배정 공정성 논란의 중심`);
      if(p.games>=5&&p.winRate<=25)push('서킷브레이커',p.name,`승률 ${p.winRate}% · 매매(출전) 일시 정지 권고`);
      if(p.games>=3&&p.kda>=4&&p.winRate<50)push('억까 피해자',p.name,`KDA ${p.kda}에 승률 ${p.winRate}% · 팀운 환불 요청`);
      if(p.games>=4&&p.winRate>=60&&p.kda<2)push('버스 승객',p.name,`승률 ${p.winRate}%인데 KDA ${p.kda} · 뒷좌석 정기권 보유`);
      if(p.mvp>=2)push('여론의 왕',p.name,`MVP ${p.mvp}회 · 민심을 다스리는 자`);
    });
    // 경기당 지표
    const kpg=top(P.map(p=>({...p,v:per(p,'kills')})),'v',3);
    if(kpg)push('광기의 돌격대장',kpg.name,`경기당 ${kpg.v.toFixed(1)}킬 · 브레이크 없음`);
    const apg=top(P.map(p=>({...p,v:per(p,'assists')})),'v',3);
    if(apg)push('어시스트 자판기',apg.name,`경기당 ${apg.v.toFixed(1)}어시 · 퍼주기 장인`);
    const dpg=top(P.map(p=>({...p,v:per(p,'deaths')})),'v',3);
    if(dpg&&dpg.v>=5)push('데스 아티스트',dpg.name,`경기당 ${dpg.v.toFixed(1)}데스 · 죽음도 콘텐츠`);
    const gandhi=P.filter(p=>p.games>=3).sort((a,b)=>per(a,'deaths')-per(b,'deaths'))[0];
    if(gandhi&&per(gandhi,'deaths')<=2.5)push('협곡의 간디',gandhi.name,`경기당 ${per(gandhi,'deaths').toFixed(1)}데스 · 비폭력 생존주의`);
    const kdaTop=P.filter(p=>p.games>=3&&p.kda>=4).sort((a,b)=>b.kda-a.kda)[0];
    if(kdaTop)push('KDA 명품관',kdaTop.name,`KDA ${kdaTop.kda} · 전사자 명단에 이름이 없음`);
    const att=top(P,'games',5);
    if(att)push('출석왕',att.name,`${att.games}판 출석 · 내전이 본업, 회사가 부업`);
    const driver=top(P,'wins',4);
    if(driver)push('버스 기사',driver.name,`누적 ${driver.wins}승 · 오늘도 정시 운행`);
    // 숟가락: 킬은 많은데 딜은 평균 이하
    const dmgs=P.filter(p=>p.games>=3).map(p=>p.avgDmg).sort((a,b)=>a-b);
    if(dmgs.length>=3){
      const median=dmgs[Math.floor(dmgs.length/2)];
      const spoon=P.filter(p=>p.games>=3&&p.avgDmg>0&&p.avgDmg<median).sort((a,b)=>per(b,'kills')-per(a,'kills'))[0];
      if(spoon&&per(spoon,'kills')>=3)push('숟가락 장인',spoon.name,`경기당 ${per(spoon,'kills').toFixed(1)}킬, 평균 딜 ${fmt(spoon.avgDmg)} · 막타 강탈 전문`);
    }
    // 연승/연패 + 폼 주가
    let bw=null,bl=null;
    P.forEach(p=>{
      const s=streaksOf(p.id);
      if(s.mw>=3&&(!bw||s.mw>bw.n))bw={name:p.name,n:s.mw};
      if(s.ml>=3&&(!bl||s.ml>bl.n))bl={name:p.name,n:s.ml};
      if(p.games>=3){
        const f=formSeries(p.id),pr=f.arr[f.arr.length-1];
        if(pr>=140)push('지금이 고점 아님',p.name,`폼 주가 ${pr} · 신고가 행진 중`);
        if(pr<=60)push('상장폐지 위기',p.name,`폼 주가 ${pr} · 거래정지 직전, 반등 기도 중`);
      }
    });
    if(bw)push('연승 제조기',bw.name,`최다 ${bw.n}연승 · 불장의 주역`);
    if(bl)push('멘탈 클리닉 VIP',bl.name,`최다 ${bl.n}연패 · 그래도 출석은 한다`);
    // 퍼펙트 게임
    outer:for(const m of [...state.matches].sort((a,b)=>sortKey(b).localeCompare(sortKey(a)))){
      for(const p of m.participants){
        if(p.playerId&&p.deaths===0&&p.kills>=5&&p.team===m.winnerTeam){
          push('퍼펙트 게임',nameOf(p.playerId),`${p.kills}/0/${p.assists} (${m.playedAt}) · 무결점 경기`);break outer;
        }
      }
    }
    // 누적 1위 시리즈
    [['딜량왕','damageToChampions',v=>`누적 딜 ${fmt(v)} · 화력에는 세금이 없다`],
     ['인간 가고일','damageTaken',v=>`받은 피해 ${fmt(v)} · 맞는 게 일상`],
     ['시야 대통령','visionScore',v=>`시야 점수 ${fmt(v)} · 핑와에 월급 쓰는 사람`],
     ['매의 눈','wardsKilled',v=>`와드 파괴 ${fmt(v)} · 상대 시야 청소업체`],
     ['오브젝트 깎는 노인','damageToObjectives',v=>`오브젝트 피해 ${fmt(v)} · 용은 내 가족`],
     ['철거반장','damageToTurrets',v=>`포탑 피해 ${fmt(v)} · 재개발 전문`],
     ['힐링캠프 원장','healing',v=>`회복량 ${fmt(v)} · 사실상 보건소`],
     ['피해감소 방화벽','selfMitigatedDamage',v=>`피해 감소 ${fmt(v)} · 물리·마법 모두 차단`],
     ['CS 공장장','cs',v=>`누적 CS ${fmt(v)} · 미니언계의 재앙`],
     ['골드 광산','goldEarned',v=>`누적 골드 ${fmt(v)} · 협곡의 자산가`],
     ['CC 제조기','crowdControlScore',v=>`군중 제어 ${fmt(v)} · 상대 키보드 압수`],
     ['솔로킬 머신','soloKills',v=>`솔로킬 ${fmt(v)}회 · 1:1은 거절하지 않는다`]
    ].forEach(([t,k,d])=>{const w=top(P,k);if(w)push(t,w.name,d(w[k]))});
    // 진영 특화
    const sided=SDp.filter(x=>x.bG>=2&&x.rG>=2);
    const blueSon=sided.filter(x=>x.bRate-x.rRate>=25).sort((a,b)=>(b.bRate-b.rRate)-(a.bRate-a.rRate))[0];
    if(blueSon)push('블루의 아들',blueSon.name,`블루 ${blueSon.bRate}% vs 레드 ${blueSon.rRate}% · 진영을 가리는 남자`);
    const redSon=sided.filter(x=>x.rRate-x.bRate>=25).sort((a,b)=>(b.rRate-b.bRate)-(a.rRate-a.bRate))[0];
    if(redSon)push('레드의 후예',redSon.name,`레드 ${redSon.rRate}% vs 블루 ${redSon.bRate}% · 빨간 맛을 아는 자`);
  }
  // 듀오 / 상대
  D.forEach(d=>{
    if(d.winRate>=75)push('국밥 듀오',d.names,`같이 하면 ${d.winRate}% (${d.games}판) · 든든하다`);
    if(d.winRate<=30)push('서사가 필요한 듀오',d.names,`같이 하면 ${d.winRate}% · 아직 세계관 구축 중`);
  });
  const together=statDuos(4)[0]?[...statDuos(4)].sort((a,b)=>b.games-a.games)[0]:null;
  if(together)push('쌍둥이 텔레파시',together.names,`함께 ${together.games}판 · 사실상 한 몸`);
  R.forEach(r=>{
    if(Math.max(...r.w)/r.games>=.75)push('천적 관계',r.names.join(' vs '),`${r.leader} 우세 ${r.w[0]}:${r.w[1]} · 만나면 결과 정해져 있음`);
    else if(r.games>=4&&r.gap<=1)push('영혼의 라이벌',r.names.join(' vs '),`${r.w[0]}:${r.w[1]} · 다음 판이 진짜 결승`);
  });
  // 챔피언
  C.forEach(c=>{
    if(c.picks>=3&&c.winRate>=75)push('승리 부적',c.champion,`픽하면 ${c.winRate}% · 가보로 물려줄 픽`);
    if(c.picks>=3&&c.winRate<=33)push('봉인픽',c.champion,`${c.picks}판 ${c.winRate}% · 협곡 출입 금지 검토`);
    if(c.bans>=2&&c.winRate<50)push('밴카드 도둑',c.champion,`밴은 ${c.bans}번 당했는데 승률은 ${c.winRate}% · 명성 거품`);
  });
  const onetrick=[...PC].filter(x=>x.games>=4).sort((a,b)=>b.games-a.games)[0];
  if(onetrick)push('원챔 장인',onetrick.name,`${onetrick.champion}만 ${onetrick.games}판 · 장인 정신 그 자체`);
  return out.slice(0,100);
}

async function getWorker(onProg){
  if(_worker)return _worker;
  await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js');
  try{
    _worker=await Tesseract.createWorker(['kor','eng'],1,{logger:m=>{
      if(m.status==='recognizing text'&&onProg)onProg(m.progress);
    }});
    return _worker;
  }catch(e){
    if(/Worker|Security|blob/i.test(String(e))){_workerBlocked=true;}
    throw e;
  }
}
function fileToImage(file){return new Promise((ok,no)=>{
  const img=new Image();
  img.onload=()=>ok(img); img.onerror=()=>no(new Error('이미지 로드 실패'));
  img.src=URL.createObjectURL(file);
})}
async function preprocess(file){ // 확대 + 흑백 + 대비 → 인식률 향상
  const img=await fileToImage(file);
  const scale=Math.min(3,Math.max(1,2200/img.naturalWidth));
  const cv=document.createElement('canvas');
  cv.width=Math.round(img.naturalWidth*scale); cv.height=Math.round(img.naturalHeight*scale);
  const cx=cv.getContext('2d');
  cx.imageSmoothingEnabled=true; cx.imageSmoothingQuality='high';
  cx.filter='grayscale(1) contrast(1.55) brightness(1.12)';
  cx.drawImage(img,0,0,cv.width,cv.height);
  URL.revokeObjectURL(img.src);
  return cv;
}
async function analyzeShots(){
  if(ocrBusy)return;
  if(!shots.length)return toast('스크린샷을 먼저 추가해주세요.',true);
  ocrBusy=true;
  const bar=$('ocrBar'),lbl=$('ocrLbl'),btn=$('ocrGo');
  btn.disabled=true;btn.textContent='분석 중...';
  try{
    lbl.textContent='OCR 엔진 준비 중... (최초 1회 5~15초)';
    const total=shots.length;let done=0;
    const worker=await getWorker(p=>{bar.style.width=((done+p)/total*100)+'%'});
    let textAll='';
    for(const s of shots){
      lbl.textContent=`이미지 ${done+1}/${total} 판독 중...`;
      const cv=await preprocess(s.file);
      const {data}=await worker.recognize(cv);
      textAll+='\n'+(data.text||'');
      done++; bar.style.width=(done/total*100)+'%';
    }
    $('ocrText').value=textAll.trim();

      $('ocrNote').style.display='block';
      lbl.textContent='이 환경에서는 OCR이 차단됩니다.';
    }else{
      toast('분석 실패: '+(e.message||'이미지/인터넷 연결을 확인해주세요.'),true);
      lbl.textContent='분석 실패. 다시 시도하거나 직접 입력을 이용하세요.';

/* OCR 텍스트 → 참가자 후보 (닉네임·챔피언 퍼지 매칭 + KDA 패턴) */
function parseScoreText(text){
  const rows=[];
  const lines=String(text||'').split('\n').map(l=>l.trim()).filter(l=>l.length>=3);
  for(const line of lines){
    const kda=line.match(/(\d{1,2})\s*[\/|]\s*(\d{1,2})\s*[\/|]\s*(\d{1,2})/);
    const clean=kda?line.replace(kda[0],' '):line;
    const words=clean.split(/\s{1,}/).filter(w=>w&&!/^[\d,\.%]+$/.test(w));
    // 닉네임 후보: 단어 조합 중 가장 잘 맞는 것
    let pBest=null,pScore=99,pRaw='';
    const cands=[];
    for(let i=0;i<words.length;i++){
      cands.push(words[i]);
      if(i+1<words.length)cands.push(words[i]+' '+words[i+1]);
      if(i+2<words.length)cands.push(words[i]+' '+words[i+1]+' '+words[i+2]);
    }
    cands.push(clean);
    for(const c of cands){
      const{player,score}=fuzzyPlayer(c);
      if(player&&score<pScore){pBest=player;pScore=score;pRaw=c}
    }
    // 챔피언 후보 — 닉네임으로 매칭된 부분(pRaw)은 제외하고 탐색
    let champ='';
    {
      const champClean=pRaw?clean.replace(pRaw,' '):clean;
      const cw=champClean.split(/\s{1,}/).filter(w=>w&&!/^[\d,\.%]+$/.test(w));
      const cc2=[];
      for(let i=0;i<cw.length;i++){
        cc2.push(cw[i]);
        if(i+1<cw.length)cc2.push(cw[i]+' '+cw[i+1]);
        if(i+2<cw.length)cc2.push(cw[i]+' '+cw[i+1]+' '+cw[i+2]);
      }
      for(const c of cc2){
        if(norm(c).length<2)continue;
        const cv=canonChamp(c);
        if(CHAMPIONS.includes(cv)){champ=cv;break}
      }
    }
    // 큰 숫자들: 1000 이상 → 딜량/골드 후보, 0~400 → CS 후보
    const nums=(line.match(/\d[\d,]{2,}/g)||[]).map(num).filter(n=>n>=1000).sort((a,b)=>b-a);
    const small=(line.match(/(?<![\d\/,])\d{1,3}(?![\d\/,])/g)||[]).map(Number).filter(n=>n>=30&&n<=420);
    if(!kda&&!pBest)continue;
    const stats={};
    if(nums[0])stats.damageToChampions=nums[0];
    if(nums[1])stats.goldEarned=nums[1];
    if(small.length)stats.cs=small[small.length-1];
    rows.push({
      rawName:pRaw||clean.slice(0,18), playerId:pBest?.id||'',
      championId:champ, kills:kda?+kda[1]:0,deaths:kda?+kda[2]:0,assists:kda?+kda[3]:0,
      stats
    });
    if(rows.length>=10)break;
  }
  return rows;
}
function buildDraftFromText(){
  const rows=parseScoreText($('ocrText').value);
  if(!rows.length)return toast('텍스트에서 선수/KDA를 찾지 못했어요. 텍스트를 정리하거나 직접 입력해주세요.',true);
  while(rows.length<10)rows.push({rawName:'',playerId:'',championId:'',kills:0,deaths:0,assists:0,stats:{}});
  draft={
    playedAt:$('shotDate').value||todayStr(),
    setNumber:num($('shotSet').value)||1,
    winnerTeam:$('shotWin').value,
    memo:'스크린샷 분석 입력', mvpId:'',
    participants:rows.slice(0,10).map((r,i)=>({team:i<5?'BLUE':'RED',lane:LANES[i%5],...r})),
    bans:[]
  };
  draftEditId=null;
  renderReview('reviewBox');
  $('reviewBox').scrollIntoView({behavior:'smooth',block:'start'});
  toast(`${rows.filter(r=>r.playerId).length}명 자동 매칭. 검수표에서 확인 후 저장하세요.`);
}

/* ───── JSON 가져오기 (채팅 AI 판독 결과 붙여넣기) ───── */
const STAT_ALIAS={cs:['cs','minionsKilled','미니언','씨에스'],goldEarned:['goldEarned','gold','골드','골드획득'],
 damageToChampions:['damageToChampions','damage','championDamage','딜량','챔피언딜량'],
 damageTaken:['damageTaken','taken','받은피해','받은피해량'],visionScore:['visionScore','vision','시야','시야점수'],
 wardsPlaced:['wardsPlaced','와드설치'],wardsKilled:['wardsKilled','와드파괴'],controlWardsBought:['controlWardsBought','제어와드'],
 crowdControlScore:['crowdControlScore','cc','군중제어'],damageToObjectives:['damageToObjectives','오브젝트피해','목표물피해량'],
 damageToTurrets:['damageToTurrets','포탑피해','포탑피해량'],healing:['healing','heal','회복량'],
 selfMitigatedDamage:['selfMitigatedDamage','mitigated','피해감소','피해감소량'],soloKills:['soloKills','solokill','솔로킬','솔킬']};
function pickStats(src){
  const flat={...(src||{}),...(src?.stats||{})},out={};
  for(const[key,names]of Object.entries(STAT_ALIAS))
    for(const n of names){const hit=Object.keys(flat).find(k=>norm(k)===norm(n));if(hit&&flat[hit]!==''&&flat[hit]!=null){out[key]=num(flat[hit]);break}}
  return out;
}
function jsonToMatch(obj){ // 외부 JSON 1건 → 경기 데이터 (단건/일괄 공용)
  const list=obj.participants||obj.players||obj.rows||[];
  if(!Array.isArray(list)||!list.length)return null;
  const parts=list.slice(0,10).map((p,i)=>{
    const rawName=p.player||p.name||p.nickname||p.ign||p.rawName||'';
    const fp=findPlayer(rawName)||fuzzyPlayer(rawName).player;
    const champ=canonChamp(p.champion||p.champ||p.championName||'');
    return{team:String(p.team||p.side||(i<5?'BLUE':'RED')).toUpperCase().includes('RED')?'RED':'BLUE',
      lane:LANES.includes(String(p.lane||'').toUpperCase())?String(p.lane).toUpperCase():LANES[i%5],
      rawName, playerId:fp?.id||'', championId:champ,
      kills:num(p.kills??p.k),deaths:num(p.deaths??p.d),assists:num(p.assists??p.a),
      stats:pickStats(p)};
  });
  const bans=[];
  if(obj.bans)TEAMS.forEach(t=>(Array.isArray(obj.bans[t])?obj.bans[t]:[]).forEach(c=>bans.push({team:t,championId:canonChamp(c)})));
  return{playedAt:obj.playedAt||obj.date||todayStr(),setNumber:num(obj.setNumber||obj.set)||1,
    winnerTeam:String(obj.winnerTeam||obj.winner||'BLUE').toUpperCase().includes('RED')?'RED':'BLUE',
    gameId:obj.gameId!=null?String(obj.gameId):null,
    durationMin:obj.durationMin!=null?num(obj.durationMin):null,
    memo:obj.memo||'JSON 판독 입력',mvpId:findPlayer(obj.mvpName||obj.mvp||'')?.id||'',participants:parts,bans};
}
const matchSig=m=>String(m.playedAt)+'|'+String(m.winnerTeam)+'|'+(m.participants||[]).map(p=>p.kills+'/'+p.deaths+'/'+p.assists).sort().join(',');
function importJson(){
  if(needAdmin())return;
  let obj;
  try{obj=JSON.parse($('jsonIn').value)}catch(e){return toast('JSON 형식이 잘못됐어요. 중괄호/따옴표를 확인해주세요.',true)}
  let bulk=null;
  if(Array.isArray(obj))bulk=obj;
  else if(obj&&obj.matches)bulk=Array.isArray(obj.matches)?obj.matches:[obj.matches]; // PS가 1판 묶음의 배열 괄호를 벗기는 경우 대응
  if(bulk)return importBulk(bulk);
  const data=jsonToMatch(obj);
  if(!data)return toast('participants 배열이 필요해요.',true);
  draft=data; draftEditId=null;
  renderReview('reviewBox');
  $('reviewBox').scrollIntoView({behavior:'smooth',block:'start'});
  toast('JSON을 검수 화면으로 불러왔어요.');
}
function importBulk(arr){ // 내전 추출기 "전부 변환" 묶음: 중복 제외 + 일괄 저장
  let datas=arr.map(jsonToMatch).filter(Boolean);
  if(!datas.length)return toast('가져올 경기가 없어요.',true);
  const isGhost=d=>(d.durationMin!=null&&d.durationMin<5)||(d.participants||[]).every(p=>num(p.kills)+num(p.deaths)+num(p.assists)===0);
  const ghosts=datas.filter(isGhost).length;
  if(ghosts)datas=datas.filter(d=>!isGhost(d));
  if(!datas.length)return toast(`전부 5분 미만 무효 게임(다시하기 등)이라 건너뛰었어요.`);
  const seenSig=new Set(state.matches.map(matchSig));
  const seenGid=new Set(state.matches.map(m=>m.gameId).filter(Boolean));
  const fresh=[];
  for(const d of datas){
    if((d.gameId&&seenGid.has(d.gameId))||seenSig.has(matchSig(d)))continue;
    if(d.gameId)seenGid.add(d.gameId);
    seenSig.add(matchSig(d));
    fresh.push(d);
  }
  const dup=datas.length-fresh.length;
  if(!fresh.length)return toast('전부 이미 저장된 경기예요. (중복 '+dup+'건 건너뜀)');
  const unmatched=fresh.reduce((n,d)=>n+d.participants.filter(p=>!p.playerId&&p.rawName).length,0);
  let msg=`${fresh.length}경기를 한 번에 저장할까요?`;
  if(dup)msg+=` (이미 있는 ${dup}건은 제외)`;
  if(unmatched)msg+=`\n\n명단과 안 맞는 닉네임 ${unmatched}명은 '미확인'으로 저장돼요. 저장 후 경기 탭에서 수정하거나, 플레이어 탭에서 롤닉을 등록하고 다시 가져오면 자동 매칭됩니다.`;
  if(!confirm(msg))return;
  fresh.sort((a,b)=>String(a.playedAt).localeCompare(String(b.playedAt)));
  fresh.forEach(d=>{
    d.setNumber=state.matches.filter(m=>m.playedAt===d.playedAt).length+1; // 날짜별 세트 자동
    state.matches.push({id:uid('m'),createdAt:new Date().toISOString(),...d});
  });
  save();
  toast(`내전 ${fresh.length}판을 저장했어요.`+(dup?` (중복 ${dup}건 제외)`:'')+(typeof ghosts!=='undefined'&&ghosts?` (무효 게임 ${ghosts}건 제외)`:''));
  go('matches');
}

function readDraft(){

    const champ=canonChamp($(`rC${i}`).value.trim());

    if(!playerId){toast(`${i+1}번째 줄의 플레이어를 선택해주세요. (빈 줄이면 원본·챔피언도 비워주세요)`,true);return null}
    const stats={};
    STAT_FIELDS.forEach(([k])=>{const el=$(`rv_${i}_${k}`);const v=el?num(el.value):num(draft.participants[i].stats?.[k]);if(v)stats[k]=v});
    parts.push({team:$(`rT${i}`).value,lane:$(`rL${i}`).value,playerId,rawName,
      championId:champ,kills:num($(`rK${i}`).value),deaths:num($(`rD${i}`).value),assists:num($(`rA${i}`).value),stats});
  }
  if(parts.length<2){toast('최소 양 팀 1명씩은 있어야 해요.',true);return null}
  const ids=parts.map(p=>p.playerId);
  if(new Set(ids).size!==ids.length){toast('같은 플레이어가 두 번 들어가 있어요.',true);return null}
  return{playedAt:$('rvDate').value||todayStr(),setNumber:num($('rvSet').value)||1,
    winnerTeam:$('rvWin').value,memo:$('rvMemo').value.trim(),mvpId:$('rvMvp').value||null,
    gameId:draft&&draft.gameId?draft.gameId:null,
    durationMin:draft&&draft.durationMin!=null?draft.durationMin:null,
    participants:parts,bans:readBans()};
}

/* ============================================================
   라이엇 API 자동 불러오기 (Vercel 중계 서버 경유)
   브라우저는 라이엇을 직접 못 부르므로(키 보안·CORS),
   중계 함수 주소를 설정 후 사용합니다. 정확도 100%.
   ============================================================ */
async function riotApi(params){
  const base=(state.settings.proxyUrl||'').trim().replace(/\/+$/,'');
  if(!base)throw new Error('중계 서버 주소를 먼저 입력해주세요.');
  const r=await fetch(`${base}/api/riot?${new URLSearchParams(params)}`);
  const j=await r.json().catch(()=>({}));
  if(!r.ok||j.error)throw new Error(j.error||('서버 응답 오류 '+r.status));
  return j;
}
let ddMapKo=null; // 영문 챔피언 ID·숫자 키 → 한국어 이름
async function ddragonMap(){
  if(ddMapKo)return ddMapKo;
  const vers=await fetch('https://ddragon.leagueoflegends.com/api/versions.json').then(r=>r.json());
  const data=await fetch(`https://ddragon.leagueoflegends.com/cdn/${vers[0]}/data/ko_KR/champion.json`).then(r=>r.json());
  ddMapKo={};
  Object.values(data.data).forEach(v=>{ddMapKo[norm(v.id)]=v.name;ddMapKo[String(v.key)]=v.name;ddMapKo[norm(v.name)]=v.name});
  return ddMapKo;
}
function champKo(x){
  if(x==null||x==='')return'';
  const k=String(x);
  if(ddMapKo&&(ddMapKo[norm(k)]||ddMapKo[k]))return ddMapKo[norm(k)]||ddMapKo[k];
  return canonChamp(k);
}
function saveProxyUrl(){const el=$('proxyUrl');if(el){state.settings.proxyUrl=el.value.trim();save()}}

async function riotFetchList(){

  const box=$('riotList');
  box.innerHTML='<div class="empty">라이엇에서 불러오는 중... (몇 초 걸려요)</div>';
  try{
    const acc=await riotApi({action:'resolve',name:p.riotName,tag:p.riotTag||'KR1'});
    let ids=(await riotApi({action:'ids',puuid:acc.puuid,queue:0,count:10})).ids||[];
    let onlyCustom=true;
    if(!ids.length){ids=(await riotApi({action:'ids',puuid:acc.puuid,count:15})).ids||[];onlyCustom=false}
    if(!ids.length){box.innerHTML='<div class="empty">이 계정의 최근 경기를 찾지 못했어요.</div>';return}
    window._riotCache={};

      window._riotCache[id]=m;
      rows.push({id,info:m.info||{},isCustom});
      if(rows.filter(r=>r.isCustom).length>=6)break;
    }

    box.innerHTML=(customs.length||onlyCustom?'':'<p class="mini" style="margin:0 0 8px">최근 목록에서 사용자 설정 게임을 못 찾아 전체 경기를 보여드려요.</p>')+
      show.map(r=>{
        const d=new Date(r.info.gameStartTimestamp||r.info.gameCreation||Date.now());
        const min=Math.round((r.info.gameDuration||0)/60);
        const my=(r.info.participants||[]).find(x=>x.puuid===acc.puuid);
        return`<div class="row" style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px">
          <span class="pill ${r.isCustom?'gold':''}">${r.isCustom?'내전 (사용자 설정)':'일반 매칭'}</span>
          <b>${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</b>
          <span class="dim mini">${min}분${my?' · '+esc(champKo(my.championName)||my.championName||'')+(my.win?' 승':' 패'):''}</span>
          <button class="btn sm gold right" onclick="riotImport('${r.id}')">이 경기 불러오기</button>
        </div>`;
      }).join('');
  }catch(e){
    box.innerHTML=`<div class="empty">불러오기 실패: ${esc(e.message)}<br><span class="mini">중계 서버 주소가 맞는지, 라이엇 키가 만료되지 않았는지 확인해주세요.</span></div>`;
  }
}
const RIOT_LANE={TOP:'TOP',JUNGLE:'JUNGLE',MIDDLE:'MID',BOTTOM:'ADC',UTILITY:'SUPPORT'};
async function riotImport(id){
  try{
    const m=window._riotCache?.[id]||await riotApi({action:'match',id});
    const info=m.info||{};
    try{await ddragonMap()}catch(e){/* 매핑 실패 시 영문명 그대로, 검수에서 수정 */}
    const parts=(info.participants||[]).slice(0,10).map((x,i)=>{
      const rn=(x.riotIdGameName||x.summonerName||'')+(x.riotIdTagline?'#'+x.riotIdTagline:'');
      const fp=findPlayer(x.riotIdGameName||x.summonerName||'')||fuzzyPlayer(rn).player;
      return{team:x.teamId===200?'RED':'BLUE',lane:RIOT_LANE[x.teamPosition]||LANES[i%5],
        rawName:rn,playerId:fp?.id||'',championId:champKo(x.championName??x.championId),
        kills:num(x.kills),deaths:num(x.deaths),assists:num(x.assists),
        stats:{cs:num(x.totalMinionsKilled)+num(x.neutralMinionsKilled),goldEarned:num(x.goldEarned),
          damageToChampions:num(x.totalDamageDealtToChampions),damageTaken:num(x.totalDamageTaken),
          visionScore:num(x.visionScore),wardsPlaced:num(x.wardsPlaced),wardsKilled:num(x.wardsKilled),
          controlWardsBought:num(x.visionWardsBoughtInGame),crowdControlScore:num(x.timeCCingOthers),
          damageToObjectives:num(x.damageDealtToObjectives),damageToTurrets:num(x.damageDealtToTurrets),
          healing:num(x.totalHeal),selfMitigatedDamage:num(x.damageSelfMitigated)}};
    });
    const winTeam=(info.teams||[]).find(t=>t.win);
    const bans=[];
    (info.teams||[]).forEach(t=>(t.bans||[]).forEach(b=>{if(b&&b.championId>0)bans.push({team:t.teamId===200?'RED':'BLUE',championId:champKo(b.championId)})}));
    const d=new Date(info.gameStartTimestamp||info.gameCreation||Date.now());
    draft={playedAt:isFinite(d)?d.toISOString().slice(0,10):todayStr(),setNumber:1,
      winnerTeam:winTeam?(winTeam.teamId===200?'RED':'BLUE'):'BLUE',
      memo:'라이엇 API 자동 입력',mvpId:'',participants:parts,bans};
    draftEditId=null;
    renderReview('reviewBox');
    $('reviewBox').scrollIntoView({behavior:'smooth'});
    toast(`라이엇에서 ${parts.filter(q=>q.playerId).length}/${parts.length}명 자동 매칭. 검수 후 저장하세요.`);
  }catch(e){toast('경기 불러오기 실패: '+e.message,true)}
}

function dedupeMatches(){
  if(needAdmin())return; // 이미 저장된 중복 경기 정리 (게임ID 또는 날짜·승팀·KDA 구성이 동일)
  const seen=new Set();const keep=[];let removed=0;
  [...state.matches].sort((a,b)=>String(a.createdAt).localeCompare(String(b.createdAt))).forEach(m=>{
    const keys=[m.gameId?'g:'+m.gameId:null,matchSig(m)].filter(Boolean);
    if(keys.some(k=>seen.has(k))){removed++;return}
    keys.forEach(k=>seen.add(k));keep.push(m);
  });
  if(!removed)return toast('중복 경기가 없어요.');
  if(!confirm(`중복으로 보이는 경기 ${removed}판을 삭제할까요?\n(같은 게임ID, 또는 날짜·승리팀·10명 KDA 구성이 완전히 같은 경기)`))return;
  state.matches=keep;save();render();toast(`중복 ${removed}판을 정리했어요.`);
}


function cleanGhosts(){
  if(needAdmin())return; // 이미 저장된 무효 경기(다시하기 등) 정리
  const isGhost=m=>(m.durationMin!=null&&m.durationMin<5)||(m.participants||[]).every(p=>num(p.kills)+num(p.deaths)+num(p.assists)===0);
  const ghosts=state.matches.filter(isGhost);
  if(!ghosts.length)return toast('무효로 보이는 경기가 없어요.');
  if(!confirm(`무효 게임으로 보이는 ${ghosts.length}판을 삭제할까요?\n(5분 미만이거나, 10명 전원 KDA가 0/0/0인 경기 — 다시하기·접속실패 흔적)`))return;
  state.matches=state.matches.filter(m=>!isGhost(m));
  state.voteRooms=state.voteRooms.filter(v=>state.matches.some(m=>m.id===v.matchId));
  save();render();toast(`무효 게임 ${ghosts.length}판을 정리했어요.`);
}


function swapSides(id){
  if(needAdmin())return; // 블루↔레드 통째 미러 (선수·밴·승리팀) — 누가 이겼는지는 유지
  const m=state.matches.find(x=>x.id===id); if(!m)return;
  if(!confirm('블루팀과 레드팀을 통째로 맞바꿀까요?\n선수 배치·밴·승리팀이 함께 거울처럼 뒤집혀서, "누가 이겼는지"는 그대로 유지되고 진영 기록만 바로잡힙니다.'))return;
  m.participants.forEach(p=>p.team=p.team==='BLUE'?'RED':'BLUE');
  (m.bans||[]).forEach(b=>{if(b&&b.team)b.team=b.team==='BLUE'?'RED':'BLUE'});
  m.winnerTeam=m.winnerTeam==='BLUE'?'RED':'BLUE';
  save();render();toast('진영을 반전했어요. 승자(사람)는 동일하게 유지됩니다.');
}

function afterRecord(){
  const drop=$('drop'),input=$('shotFile');
  input.onchange=e=>addShots([...e.target.files]);
  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over')}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over')}));
  drop.addEventListener('drop',e=>addShots([...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'))));
  renderThumbs();
}
document.addEventListener('paste',e=>{ // 캡처 후 Ctrl+V
  if(tab!=='record')return;
  const files=[...(e.clipboardData?.files||[])].filter(f=>f.type.startsWith('image/'));
  if(files.length){addShots(files);toast('클립보드 이미지를 추가했어요.')}
});
function addShots(files){
  files.forEach(f=>shots.push({file:f,url:URL.createObjectURL(f)}));
  renderThumbs();
}
function delShot(i){URL.revokeObjectURL(shots[i].url);shots.splice(i,1);renderThumbs()}
function renderThumbs(){
  const el=$('thumbs'); if(!el)return;
  el.innerHTML=shots.map((s,i)=>`<div class="thumb"><img src="${s.url}" alt=""><button onclick="delShot(${i})" title="제거">✕</button></div>`).join('');
}
function manualDraft(){
  if(needAdmin())return;
  draft={playedAt:todayStr(),setNumber:1,winnerTeam:'BLUE',memo:'',mvpId:'',
    participants:Array.from({length:10},(_,i)=>({team:i<5?'BLUE':'RED',lane:LANES[i%5],rawName:'',playerId:'',championId:'',kills:0,deaths:0,assists:0,stats:{}})),bans:[]};
  draftEditId=null;
  renderReview('reviewBox');
  $('reviewBox').scrollIntoView({behavior:'smooth'});
}

/* ───── 경기 목록 ───── */
function teamRows(m,t){
  return`<table class="tbl"><thead><tr><th class="${t==='BLUE'?'tBlue':'tRed'}">${t==='BLUE'?'블루팀':'레드팀'}</th><th>챔피언</th><th>KDA</th><th class="num">딜량</th></tr></thead><tbody>
  ${m.participants.filter(p=>p.team===t).map(p=>`<tr>
    <td><b>${esc(nameOf(p.playerId))}</b> <span class="dim mini">${LANE_KO[p.lane]||''}</span></td>
    <td>${esc(p.championId||'-')}</td>
    <td>${p.kills}/${p.deaths}/${p.assists}</td>
    <td class="num dim">${p.stats?.damageToChampions?fmt(p.stats.damageToChampions):'-'}</td>
  </tr>`).join('')}</tbody></table>`;
}
function matchInner(m,compact){
  return`<div class="row" style="margin-bottom:10px">
    <span class="pill ${m.winnerTeam==='BLUE'?'blue':'lose'}">${m.winnerTeam==='BLUE'?'블루 승리':'레드 승리'}</span>
    <b>${esc(m.playedAt)} · ${m.setNumber}세트</b>
    ${m.durationMin?`<span class="dim mini">${m.durationMin}분</span>`:''}
    ${m.mvpId?`<span class="pill gold">👑 MVP ${esc(nameOf(m.mvpId))}</span>`:''}
    <span class="mini dim">${esc(m.memo||'')}</span>
    ${compact||!isAdmin()?'':`<span class="right row"><button class="btn sm" title="승리팀 표기만 뒤집기" onclick="flipWinner('${m.id}')">승패 반전</button><button class="btn sm" title="블루↔레드 선수·밴·승자를 통째로 미러 (진영 승률 보존)" onclick="swapSides('${m.id}')">진영 반전</button><button class="btn sm" onclick="editMatch('${m.id}')">수정</button><button class="btn sm" onclick="go('mvp')">MVP 투표</button><button class="btn sm lose" onclick="delMatch('${m.id}')">삭제</button></span>`}
  </div>
  <div class="grid c2">${teamRows(m,'BLUE')}${teamRows(m,'RED')}</div>
  ${(()=>{const bb=(m.bans||[]).filter(b=>b.team==='BLUE').map(b=>esc(b.championId||b)).filter(Boolean);
          const br=(m.bans||[]).filter(b=>b.team==='RED').map(b=>esc(b.championId||b)).filter(Boolean);
          return(bb.length||br.length)?`<p class="mini" style="margin:10px 0 0">🚫 밴 — <span class="tBlue">블루:</span> ${bb.join(', ')||'-'} &nbsp;·&nbsp; <span class="tRed">레드:</span> ${br.join(', ')||'-'}</p>`:''})()}`;
}
function pgMatches(){
  const ms=[...state.matches].sort((a,b)=>sortKey(b).localeCompare(sortKey(a)));
  return head('경기 기록','저장된 모든 경기. 수정·삭제할 수 있어요.')+
    (ms.length?ms.map(m=>`<div class="card" style="margin-bottom:14px">${matchInner(m)}</div>`).join('')
    :'<div class="empty">아직 저장된 경기가 없어요. 기록하기 탭에서 첫 경기를 등록해보세요.</div>');
}
function flipWinner(id){
  if(needAdmin())return;
  const m=state.matches.find(x=>x.id===id); if(!m)return;
  m.winnerTeam=m.winnerTeam==='BLUE'?'RED':'BLUE';
  save();render();
  toast(`이 경기의 승리팀을 ${m.winnerTeam==='BLUE'?'블루':'레드'}로 바꿨어요.`);
}
function delMatch(id){
  if(needAdmin())return;
  if(!confirm('이 경기를 삭제할까요?'))return;
  state.matches=state.matches.filter(m=>m.id!==id);
  state.voteRooms=state.voteRooms.filter(v=>v.matchId!==id);
  save();render();toast('경기를 삭제했어요.');
}
function editMatch(id){
  if(needAdmin())return;
  const m=state.matches.find(x=>x.id===id); if(!m)return;
  draft=JSON.parse(JSON.stringify(m)); draftEditId=id;
  $('modal').classList.add('open');
  $('modalBox').innerHTML='<div id="modalReview"></div>';
  renderReview('modalReview');
}
$('modal').addEventListener('click',e=>{if(e.target.id==='modal'){$('modal').classList.remove('open');draft=null;draftEditId=null}});

let selPlayer=null;
function playerListItems(){
  const q=norm(window._pq||'');
  return [...state.players].sort((a,b)=>(b.active-a.active)||a.displayName.localeCompare(b.displayName,'ko'))
    .filter(p=>!q||labelsOf(p).some(x=>norm(x).includes(q)));
}
function playerListHtml(list){
  return list.map(x=>`
        <div class="pItem ${x.id===selPlayer?'on':''} ${x.active?'':'off'}" onclick="selPlayer='${x.id}';window._pLane=null;render()">
          <div><b>${esc(x.displayName)}</b>${x.riotName?`<div class="ign">${esc(x.riotName)}${x.riotTag?'#'+esc(x.riotTag):''}</div>`:''}</div>

function savePlayerForm(){
  if(needAdmin())return;
  const name=$('fpName').value.trim();
  if(!name)return toast('표시 이름은 필수예요.',true);
  const{riotName,riotTag}=parseRiot($('fpRiot').value.trim());
  const aliases=$('fpAlias').value.split(',').map(x=>x.trim()).filter(Boolean);
  const memo=$('fpMemo').value.trim();
  if(editingPlayer==='__new__'){
    if(findPlayer(name))return toast('이미 비슷한 이름이 있어요. 필요하면 병합 기능을 쓰세요.',true);
    const p=makePlayer(name);
    Object.assign(p,{riotName,riotTag,memo,aliases:aliases.length?aliases:p.aliases});
    state.players.push(p);selPlayer=p.id;toast('플레이어를 등록했어요.');
  }else{
    const p=byId(editingPlayer); if(!p)return;
    Object.assign(p,{displayName:name,kakaoName:name,riotName,riotTag,memo,aliases:aliases.length?aliases:aliasGuess(name)});
    toast('플레이어를 수정했어요.');
  }
  editingPlayer=null;save();render();
}
function togglePlayer(id){
  if(needAdmin())return;const p=byId(id);p.active=!p.active;save();render()}
function delPlayer(id){
  if(needAdmin())return;
  const used=state.matches.some(m=>m.participants.some(p=>p.playerId===id));
  if(used)return toast('경기 기록이 있는 사람은 삭제 대신 휴면 처리하거나 병합해주세요.',true);
  if(!confirm('완전히 삭제할까요?'))return;
  state.players=state.players.filter(p=>p.id!==id);
  if(selPlayer===id)selPlayer=null;
  save();render();
}
function mergePlayers(){
  if(needAdmin())return;
  const from=$('mgFrom').value,to=$('mgTo').value;
  if(!from||!to||from===to)return toast('서로 다른 두 명을 선택해주세요.',true);
  const f=byId(from),t=byId(to);
  t.aliases=[...new Set([...(t.aliases||[]),f.displayName,f.kakaoName,f.riotName,...(f.aliases||[])].filter(Boolean))];
  if(!t.riotName&&f.riotName){t.riotName=f.riotName;t.riotTag=f.riotTag}
  state.matches.forEach(m=>{
    m.participants.forEach(p=>{if(p.playerId===from)p.playerId=to});
    if(m.mvpId===from)m.mvpId=to;
  });
  state.voteRooms.forEach(v=>(v.votes||[]).forEach(x=>{if(x.playerId===from)x.playerId=to}));
  state.players=state.players.filter(p=>p.id!==from);
  save();render();toast(`${f.displayName} 기록을 ${t.displayName}(으)로 합쳤어요.`);
}
function syncRoster(){
  if(needAdmin())return;
  let added=0,filled=0;
  ROSTER.forEach(e=>{
    const hit=findPlayer(e.n)||(e.r?findPlayer(e.r):null);
    if(!hit){state.players.push(rosterToPlayer(e));added++}
    else if(!hit.riotName&&e.r){const{riotName,riotTag}=parseRiot(e.r);hit.riotName=riotName;hit.riotTag=riotTag;filled++}
  });
  save();render();toast(`누락 ${added}명 추가, 롤 닉네임 ${filled}건 보강했어요.`);
}

function pgCompare(){
  const rates=ratesMap();
  const P=statPlayers().filter(s=>rates.get(s.id)?.games>=1);
  if(P.length<2)return head('1:1 비교','두 명 이상 경기 기록이 있어야 비교할 수 있어요.')+'<div class="empty">경기를 더 기록해주세요.</div>';
  if(!window._cmpA||!P.some(s=>s.id===window._cmpA))window._cmpA=P[0].id;
  if(!window._cmpB||!P.some(s=>s.id===window._cmpB)||window._cmpB===window._cmpA)window._cmpB=(P.find(s=>s.id!==window._cmpA)||P[1]).id;
  const A=P.find(s=>s.id===window._cmpA),B=P.find(s=>s.id===window._cmpB);
  const rA=rates.get(A.id),rB=rates.get(B.id);
  const hA=playerHex(A.id),hB=playerHex(B.id);
  const sel=(id,val)=>`<select onchange="window._cmp${id}=this.value;render()" style="background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:9px;min-width:0;width:100%">${P.map(s=>`<option value="${s.id}"${s.id===val?' selected':''}>${esc(s.name)}</option>`).join('')}</select>`;
  const f1=v=>Math.round(v*10)/10;
  const rows=[
    ['승률',A.winRate,B.winRate,'%','높을수록'],
    ['전적',null,null,'',''],
    ['KDA',A.kda,B.kda,'','높을수록'],
    ['분당 딜 (DPM)',Math.round(rA.dpm),Math.round(rB.dpm),'','높을수록'],
    ['분당 CS (CSPM)',f1(rA.cspm),f1(rB.cspm),'','높을수록'],
    ['분당 시야',f1(rA.vspm),f1(rB.vspm),'','높을수록'],
    ['킬관여율',rA.kp,rB.kp,'%','높을수록'],
    ['골드 효율 (1천골드당 딜)',Math.round(rA.dpg),Math.round(rB.dpg),'','높을수록'],
    ['경기당 데스',f1(rA.deathsPg),f1(rB.deathsPg),'','낮을수록'],
    ['평균 딜량',rA.avgDmg,rB.avgDmg,'','높을수록'],
    ['솔로킬 누적',rA.solo,rB.solo,'','높을수록'],
    ['MVP',A.mvp,B.mvp,'','높을수록']
  ];
  const tr=rows.map(([l,a,b,unit,dir])=>{
    if(l==='전적')return`<tr><td>전적</td><td class="num">${A.wins}승 ${A.losses}패</td><td class="num">${B.wins}승 ${B.losses}패</td></tr>`;
    if(l==='솔로킬 누적'&&!a&&!b)return'';
    const aw=dir==='낮을수록'?a<b:a>b, bw=dir==='낮을수록'?b<a:b>a;
    return`<tr><td>${l}</td>
      <td class="num ${aw?'up':''}" style="${aw?'font-weight:800':''}">${fmt(a)}${unit}</td>
      <td class="num ${bw?'up':''}" style="${bw?'font-weight:800':''}">${fmt(b)}${unit}</td></tr>`;
  }).join('');
  const laneNote=x=>x.laneScoped?`${x.lane} 포지션 내 상대평가`:'전체 멤버 기준 상대평가';
  return head('1:1 비교','LCK 맞대결 그래픽처럼. 육각형은 각자 "자기 포지션 안에서의 위치", 표는 실제 수치예요.')+`
  <div class="card">
    <div class="grid c2" style="margin-bottom:14px">
      <div class="f"><label style="color:var(--gold)">🟡 선수 A</label>${sel('A',A.id)}</div>
      <div class="f"><label style="color:var(--win)">🟢 선수 B</label>${sel('B',B.id)}</div>
    </div>
    <div class="grid c2" style="align-items:center">
      <div style="text-align:center">${hA.labels.join()===hB.labels.join()
        ?radarSvg2(hA.vals,hB.vals,hA.labels)
        :`<div class="grid c2">
            <div>${radarSvg(hA.vals,hA.labels,250)}<p class="mini" style="margin:2px 0 0;color:var(--gold)">${esc(A.name)}</p></div>
            <div>${radarSvg(hB.vals,hB.labels,250)}<p class="mini" style="margin:2px 0 0;color:var(--win)">${esc(B.name)}</p></div>
          </div><p class="mini dim" style="margin:8px 0 0">두 선수의 포지션이 달라 측정 축이 달라요. 각자 자기 라인 기준 차트입니다.</p>`}
        <p class="mini" style="margin:6px 0 0"><b style="color:var(--gold)">${esc(A.name)}</b> (${laneNote(hA)}) vs <b style="color:var(--win)">${esc(B.name)}</b> (${laneNote(hB)})</p></div>
      <div class="scrollx"><table class="tbl"><thead><tr><th>지표</th><th class="num" style="color:var(--gold)">${esc(A.name)}</th><th class="num" style="color:var(--win)">${esc(B.name)}</th></tr></thead><tbody>${tr}</tbody></table>
      <p class="mini dim" style="margin-top:8px">굵은 초록 = 우세. 분당 지표는 경기 시간이 기록된 판 기준이고, 시간이 없는 옛 기록은 28분으로 가정해 계산해요.</p></div>
    </div>
  </div>`;
}

function awardCard(a){return`<div class="award"><b>${esc(a.title)}</b><div class="who">${esc(a.target)}</div><p class="mini" style="margin:0">${esc(a.desc)}</p></div>`}
function pgAwards(){
  const A=makeAwards();
  const DUO=new Set(['국밥 듀오','서사가 필요한 듀오','쌍둥이 텔레파시']);

  const CHAMP=new Set(['승리 부적','봉인픽','밴카드 도둑']);
  const duo=A.filter(a=>DUO.has(a.title)),riv=A.filter(a=>RIV.has(a.title)),champ=A.filter(a=>CHAMP.has(a.title));
  const personal=A.filter(a=>!DUO.has(a.title)&&!RIV.has(a.title)&&!CHAMP.has(a.title));
  const byPlayer=new Map();
  personal.forEach(a=>{if(!byPlayer.has(a.target))byPlayer.set(a.target,[]);byPlayer.get(a.target).push(a)});
  const owners=[...byPlayer.entries()].sort((a,b)=>b[1].length-a[1].length);

    <div class="ownerCard">

      ${list.map(a=>`<div class="arow"><b>${esc(a.title)}</b><span class="mini">${esc(a.desc)}</span></div>`).join('')}
    </div>`).join('');
  const pairCard=(title,emoji,list)=>`
    <div class="card"><h3>${emoji} ${title}</h3>
    ${list.length?list.map(a=>`<div class="arow" style="padding:9px 0;border-top:1px dashed var(--line)"><b style="color:var(--gold)">${esc(a.title)}</b> — <b>${esc(a.target)}</b><span class="mini" style="display:block;margin-top:1px">${esc(a.desc)}</span></div>`).join(''):'<p class="mini dim">아직 없어요. 판이 더 쌓이면 생깁니다.</p>'}
    </div>`;
  return head('칭호','사람 기준으로 정리했어요. 각 멤버가 지금 무슨 칭호를 들고 있는지 한눈에.')+`
  <div class="card"><h3>🏆 명예의 전당 — 플레이어별 보유 칭호</h3>
    ${owners.length?`<div class="owners">${ownerCards}</div>`:'<div class="empty">경기를 기록하면 칭호가 자동으로 생겨요.</div>'}
  </div>
  <div class="grid c3" style="margin-top:14px">
    ${pairCard('듀오 칭호','🤝',duo)}
    ${pairCard('천적 · 라이벌','⚔️',riv)}
    ${pairCard('챔피언 칭호','🐲',champ)}
  </div>
  <div class="card" style="margin-top:14px"><h3>칭호 규칙 한눈에</h3>
    <div class="grid c3">
      <div><b class="mini" style="color:var(--gold)">전적·폼</b><p class="mini">승리요정 · 내전 재앙 · 서킷브레이커 · 억까 피해자 · 버스 기사 · 버스 승객 · 출석왕 · 연승 제조기 · 멘탈 클리닉 VIP · 지금이 고점 아님 · 상장폐지 위기 · 블루의 아들 · 레드의 후예 · 여론의 왕 · 퍼펙트 게임</p></div>
      <div><b class="mini" style="color:var(--gold)">플레이 스타일</b><p class="mini">KDA 명품관 · 광기의 돌격대장 · 어시스트 자판기 · 협곡의 간디 · 데스 아티스트 · 숟가락 장인 · 딜량왕 · 인간 가고일 · 시야 대통령 · 매의 눈 · 오브젝트 깎는 노인 · 철거반장 · 힐링캠프 원장 · 피해감소 방화벽 · CS 공장장 · 골드 광산 · CC 제조기</p></div>

function pgMvp(){
  const ms=[...state.matches].sort((a,b)=>sortKey(b).localeCompare(sortKey(a)));
  return head('MVP 투표','로컬 베타: 같은 브라우저에서 모여서 투표할 때 사용. 카톡 링크 공유형 투표는 온라인화 후 완성됩니다.')+`
  <div class="grid c2">
    <div class="card"><h3>투표 열기</h3>
      ${ms.length?`<div class="f"><label>경기 선택</label><select id="vmMatch">${ms.map(m=>`<option value="${m.id}">${esc(m.playedAt)} ${m.setNumber}세트 · ${m.winnerTeam==='BLUE'?'블루':'레드'} 승</option>`).join('')}</select></div>
      <div class="f" style="margin-top:10px"><label>제한 시간 (분)</label><input id="vmMin" type="number" min="1" value="${state.settings.mvpMinutes||10}"></div>
      <button class="btn gold" style="margin-top:12px" onclick="openVote()">투표 열기</button>`:'<div class="empty">먼저 경기를 기록해주세요.</div>'}
    </div>
    <div class="card"><h3>진행 중인 투표</h3>${voteList()}</div>
  </div>`;
}
function voteList(){
  if(!state.voteRooms.length)return'<div class="empty">열린 투표가 없어요.</div>';
  return state.voteRooms.map(v=>{
    const m=state.matches.find(x=>x.id===v.matchId); if(!m)return'';
    const left=Math.max(0,v.endsAt-Date.now()),closed=left<=0;
    const cnt={};(v.votes||[]).forEach(x=>cnt[x.playerId]=(cnt[x.playerId]||0)+1);
    return`<div style="border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px;background:var(--panel2)">
      <div class="row"><b>${esc(m.playedAt)} ${m.setNumber}세트</b><span class="pill ${closed?'lose':'win'}">${closed?'마감':'진행 중 · '+Math.ceil(left/60000)+'분'}</span></div>
      <div class="f" style="margin:10px 0"><label>투표자 이름 (중복 방지)</label><input id="voter_${v.id}" placeholder="예: 잭슨"></div>
      <div class="row">${m.participants.filter(p=>p.playerId).map(p=>`<button class="btn sm" onclick="castVote('${v.id}','${p.playerId}')">${esc(nameOf(p.playerId))} (${cnt[p.playerId]||0})</button>`).join('')}</div>
      <div class="row" style="margin-top:10px"><button class="btn sm win" onclick="closeVote('${v.id}')">마감하고 MVP 반영</button><button class="btn sm lose" onclick="delVote('${v.id}')">삭제</button></div>
    </div>`;
  }).join('');
}
function openVote(){
  if(needAdmin())return;
  const matchId=$('vmMatch').value; if(!matchId)return;
  const min=num($('vmMin').value)||10;
  state.settings.mvpMinutes=min;
  state.voteRooms=state.voteRooms.filter(v=>v.matchId!==matchId);
  state.voteRooms.push({id:uid('v'),matchId,endsAt:Date.now()+min*60000,votes:[]});
  save();render();toast('투표를 열었어요.');
}
function castVote(vid,pid){
  if(needAdmin())return;
  const v=state.voteRooms.find(x=>x.id===vid); if(!v)return;
  if(Date.now()>v.endsAt)return toast('투표 시간이 끝났어요.',true);
  const voter=$(`voter_${vid}`).value.trim();
  if(!voter)return toast('투표자 이름을 먼저 입력해주세요.',true);
  const key=norm(voter);
  v.votes=v.votes.filter(x=>x.voterKey!==key);
  v.votes.push({voter,voterKey:key,playerId:pid,at:Date.now()});
  save();render();toast('투표 완료. 같은 이름은 마지막 표로 갱신돼요.');
}
function closeVote(vid){
  if(needAdmin())return;
  const v=state.voteRooms.find(x=>x.id===vid);
  const m=state.matches.find(x=>x.id===v?.matchId); if(!v||!m)return;
  const cnt={};(v.votes||[]).forEach(x=>cnt[x.playerId]=(cnt[x.playerId]||0)+1);
  const win=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
  if(!win)return toast('아직 표가 없어요.',true);
  m.mvpId=win[0];
  state.voteRooms=state.voteRooms.filter(x=>x.id!==vid);
  save();render();toast(`MVP를 ${nameOf(win[0])}(으)로 반영했어요.`);
}
function delVote(vid){
  if(needAdmin())return;state.voteRooms=state.voteRooms.filter(v=>v.id!==vid);save();render()}

      <button class="btn win" onclick="cleanGhosts()">무효 게임 정리 (다시하기 등)</button>
      <button class="btn" onclick="if(needAdmin())return;if(confirm('경기 기록만 모두 삭제할까요?')){state.matches=[];state.voteRooms=[];save();render()}">경기 기록만 삭제</button>
      <button class="btn" onclick="if(needAdmin())return;if(confirm('확정 명단만 남기고 전부 초기화할까요?')){state=freshState();save();render()}">확정 명단으로 초기화</button>
      <button class="btn lose" onclick="if(needAdmin())return;if(confirm('명단과 경기를 전부 삭제할까요?')){state=fixState({});save();render()}">완전 초기화</button>
    </div></div>
  <div class="card" style="margin-top:14px"><h3>온라인화 로드맵</h3>
    <p class="mini">토너먼트 API 승인 대기 중 (Pending Review). 승인되면: 사이트에서 내전 방 코드 발급 → 멤버는 코드 입력으로 입장 → 경기 결과 자동 기록. 그다음 단계는 Supabase 실시간 DB + 카톡 링크 MVP 투표 + 디스코드 연동입니다.</p></div>`;
}
function backup(){
  state.settings.lastBackupAt=new Date().toISOString();save();render();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`apodan-backup-${todayStr()}.json`;a.click();
}
function restore(){
  if(needAdmin())return;
  const f=$('restoreFile').files[0];
  if(!f)return toast('백업 파일을 선택해주세요.',true);
  const r=new FileReader();
  r.onload=()=>{try{state=fixState(JSON.parse(r.result));save();render();toast('복원 완료!')}catch(e){toast('복원 실패: JSON 파일을 확인해주세요.',true)}};
  r.readAsText(f);
}
function copySummary(){
  const P=statPlayers(),D=statDuos(),C=statChamps();
  const lines=['🏆 아포단 내전실록 요약',`누적 내전 ${state.matches.length}판 · 명단 ${state.players.filter(p=>p.active).length}명`];
  if(P[0])lines.push(`승률 1위: ${P[0].name} ${P[0].winRate}% (${P[0].wins}승 ${P[0].losses}패)`);
  if(D[0])lines.push(`국밥 듀오: ${D[0].names} ${D[0].winRate}%`);
  if(C[0])lines.push(`메타픽: ${C[0].champion} [${C[0].tier}]`);
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('요약을 복사했어요.'));
  else toast('이 환경에서는 복사가 안 돼요.',true);
}

/* ───── 부트 ───── */
render();
loadShared(false); // 호스팅된 링크에서 열렸으면 공유 data.json 자동 확인
setInterval(()=>{ // 투표 남은 시간 갱신 (입력 중엔 건너뜀)
  const ae=document.activeElement;
  const typing=ae&&['INPUT','TEXTAREA','SELECT'].includes(ae.tagName);
  if(tab==='mvp'&&!typing)render();
},30000);

</script>
