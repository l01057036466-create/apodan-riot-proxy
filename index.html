<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아포단 내전실록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
/* ─────────────────────────────────────────────
   아포단 내전실록 · 디자인 토큰
   먹지 같은 잉크 블랙 + 우승 트로피 골드 + 승/패 틸·로즈
────────────────────────────────────────────── */
:root{
  --bg:#101319; --bg2:#0B0E13;
  --panel:#171C26; --panel2:#121722; --inset:#0E1320;
  --line:#27303F; --line2:#323D50;
  --text:#EAEFF7; --mut:#9AA6B9; --dim:#6B7689;
  --gold:#F2B84B; --gold-dim:rgba(242,184,75,.14);
  --win:#3FD9C5;  --win-dim:rgba(63,217,197,.12);
  --lose:#FF5C7A; --lose-dim:rgba(255,92,122,.12);
  --blue:#6AA6FF; --blue-dim:rgba(106,166,255,.13);
  --violet:#B58CFF;
  --r:14px; --r-sm:10px;
  --shadow:0 14px 44px rgba(0,0,0,.38);
}
*{box-sizing:border-box}
html{font-size:15px}
body{
  margin:0; background:var(--bg) radial-gradient(1100px 480px at 80% -10%, rgba(242,184,75,.05), transparent 60%);
  color:var(--text); line-height:1.55;
  font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--blue)} button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
::selection{background:rgba(242,184,75,.3)}

/* ── 헤더 + 결과 티커 ── */
.top{position:sticky;top:0;z-index:30;background:rgba(11,14,19,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topIn{max-width:1480px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.mark{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:21px;
  background:linear-gradient(150deg,#3a2e12,#16120a);border:1px solid rgba(242,184,75,.45);box-shadow:0 0 24px rgba(242,184,75,.12)}
.brand h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
.brand p{margin:1px 0 0;font-size:11.5px;color:var(--mut);letter-spacing:.14em;font-weight:600}
.brand p b{color:var(--gold);font-weight:700}
nav.tabs{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
nav.tabs button{border:1px solid transparent;background:transparent;color:var(--mut);padding:8px 13px;border-radius:999px;font-weight:600;font-size:13.5px;transition:.15s}
nav.tabs button:hover{color:var(--text);background:var(--panel)}
nav.tabs button.on{color:#1a1408;background:var(--gold);border-color:var(--gold);font-weight:800}
/* 시그니처: 최근 경기 주식 티커 */
.ticker{border-top:1px solid var(--line);overflow:hidden;height:32px;display:flex;align-items:center;background:var(--bg2)}
.ticker .lbl{flex:none;padding:0 14px;font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--gold);border-right:1px solid var(--line);height:100%;display:flex;align-items:center;background:var(--gold-dim)}
.subnav{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
.subnav button{font-size:12.5px;padding:6px 12px}
.tickerView{flex:1;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent 0,#000 26px,#000 calc(100% - 26px),transparent);mask-image:linear-gradient(90deg,transparent 0,#000 26px,#000 calc(100% - 26px),transparent)}
.tickerTrack{display:flex;gap:34px;white-space:nowrap;animation:tick 38s linear infinite;padding-left:26px;font-size:12.5px;color:var(--mut);width:max-content}
.derby{background:linear-gradient(135deg,rgba(242,184,75,.12),rgba(63,217,197,.08) 60%,rgba(255,92,122,.1));border:1px solid rgba(242,184,75,.35);border-radius:var(--r);padding:16px;text-align:center}
.tickerTrack b{color:var(--text);font-weight:700}
.tk-up{color:var(--win);font-weight:700}.tk-dn{color:var(--lose);font-weight:700}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media (prefers-reduced-motion:reduce){.tickerTrack{animation:none}}

/* ── 레이아웃 ── */
.wrap{max-width:1480px;margin:0 auto;padding:26px 20px 70px}
.pageHead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.pageHead h2{margin:0;font-size:26px;font-weight:800;letter-spacing:-.02em}
.pageHead .sub{margin:5px 0 0;color:var(--mut);font-size:13.5px;max-width:760px}
.meta{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:var(--panel);border:1px solid var(--line);font-size:12px;color:var(--mut);font-weight:600}
.grid{display:grid;gap:14px}
.c2{grid-template-columns:repeat(2,minmax(0,1fr))}
.c3{grid-template-columns:repeat(3,minmax(0,1fr))}
.c4{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.card>h3{margin:0 0 12px;font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.card>h3 .tag{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(242,184,75,.3);padding:2px 8px;border-radius:999px}
.mini{font-size:12.5px;color:var(--mut)} .dim{color:var(--dim)} .hide{display:none!important}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap} .grow{flex:1} .right{margin-left:auto}
.hr{height:1px;background:var(--line);margin:14px 0}

/* ── 통계 숫자 카드 ── */
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.kpi .n{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.kpi .l{font-size:12px;color:var(--mut);margin-top:3px;font-weight:600}
.kpi.gold .n{color:var(--gold)}

/* ── 폼 요소 ── */
.f{display:grid;gap:6px}
.f label{font-size:12px;color:var(--mut);font-weight:700}
.f input,.f select,.f textarea,
table input,table select{
  width:100%;background:var(--inset);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:9px 11px;color:var(--text);outline:none;min-width:0}
.f textarea{min-height:96px;resize:vertical}
.f input:focus,.f select:focus,.f textarea:focus,table input:focus,table select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(242,184,75,.13)}
.btn{border:1px solid var(--line2);border-radius:var(--r-sm);padding:9px 14px;background:var(--panel2);color:var(--text);font-weight:700;font-size:13.5px;transition:.13s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#1a1408}
.btn.gold:hover{filter:brightness(1.08);color:#1a1408}
.btn.gold:disabled{opacity:.55;cursor:wait}
.btn.win{background:rgba(63,217,197,.12);border-color:rgba(63,217,197,.45);color:var(--win)}
.btn.lose{background:rgba(255,92,122,.1);border-color:rgba(255,92,122,.4);color:var(--lose)}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn.ghost{background:transparent}

/* ── 테이블 ── */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{font-size:11.5px;text-align:left;color:var(--dim);font-weight:700;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--line2);white-space:nowrap}
.tbl td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.022)}
.scrollx{overflow-x:auto} .scrolly{overflow-y:auto}
.num{text-align:right}
.tbl th.num{text-align:right}
.tbl td.num{text-align:right}

/* ── 색 의미 ── */
.tBlue{color:var(--blue)} .tRed{color:var(--lose)}
.up{color:var(--win);font-weight:700} .dn{color:var(--lose);font-weight:700} .even{color:var(--mut)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;border:1px solid var(--line);background:var(--inset);color:var(--mut)}
.pill.win{border-color:rgba(63,217,197,.45);color:var(--win);background:var(--win-dim)}
.pill.lose{border-color:rgba(255,92,122,.45);color:var(--lose);background:var(--lose-dim)}
.pill.blue{border-color:rgba(106,166,255,.45);color:var(--blue);background:var(--blue-dim)}
.pill.gold{border-color:rgba(242,184,75,.5);color:var(--gold);background:var(--gold-dim)}
.pill.violet{border-color:rgba(181,140,255,.45);color:var(--violet);background:rgba(181,140,255,.1)}
.bar{height:7px;border-radius:99px;background:var(--inset);overflow:hidden;min-width:70px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--win),var(--blue));border-radius:99px}

/* ── 빈 상태 / 토스트 / 모달 ── */
.empty{padding:30px;border:1px dashed var(--line2);border-radius:var(--r);color:var(--dim);text-align:center;background:var(--panel2);font-size:13.5px}
#toast{position:fixed;right:22px;bottom:22px;z-index:60;display:grid;gap:8px}
.toastMsg{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--gold);border-radius:12px;padding:11px 15px;box-shadow:var(--shadow);max-width:380px;font-size:13.5px;animation:pop .18s ease-out}
.toastMsg.bad{border-left-color:var(--lose)}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.modal{position:fixed;inset:0;z-index:50;background:rgba(5,7,10,.66);display:none;align-items:flex-start;justify-content:center;padding:34px 16px;overflow:auto}
.modal.open{display:flex}
.modalBox{width:min(1060px,100%);background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:20px;box-shadow:var(--shadow)}

/* ── 스크린샷 분석기 ── */
.drop{border:2px dashed var(--line2);border-radius:var(--r);background:var(--panel2);padding:26px;text-align:center;transition:.15s;cursor:pointer}
.drop:hover,.drop.over{border-color:var(--gold);background:rgba(242,184,75,.05)}
.drop b{font-size:15px} .drop .mini{margin-top:5px}
.thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.thumb{position:relative;width:120px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--line2);background:#000}
.thumb img{width:100%;height:100%;object-fit:cover;opacity:.9}
.thumb button{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:6px;border:none;background:rgba(0,0,0,.65);color:#fff;font-size:11px;line-height:1;display:grid;place-items:center}
.prog{height:8px;border-radius:99px;background:var(--inset);overflow:hidden;margin-top:10px}
.prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--win));transition:width .25s}
.ocrNote{margin-top:12px;padding:12px 14px;border-radius:var(--r-sm);background:var(--lose-dim);border:1px solid rgba(255,92,122,.35);font-size:13px;display:none}

/* ── 검수 화면 ── */
.review .tbl td{padding:6px}
.review input,.review select{padding:7px 9px;font-size:13px}
.conf{font-size:11px;font-weight:800;white-space:nowrap}
.conf.ok{color:var(--win)} .conf.mid{color:var(--gold)} .conf.bad{color:var(--lose)}
details.fold{border:1px solid var(--line);border-radius:var(--r);background:var(--panel2);padding:0 14px;margin:14px 0}
details.fold summary{cursor:pointer;font-weight:800;padding:12px 0;font-size:14px}
details.fold[open]{padding-bottom:14px}

/* ── 챔피언 티어 보드 ── */
.tierBoard{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
.tierCol{background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tierHead{text-align:center;font-weight:900;padding:8px 4px;font-size:12.5px;letter-spacing:.06em;border-bottom:1px solid var(--line);background:var(--inset)}
.tOP{color:#FF8AD4}.tS{color:var(--gold)}.tA{color:var(--blue)}.tB{color:var(--win)}.tC{color:#C7CFDC}.tSEAL{color:var(--lose)}.tNA{color:var(--dim)}
.tierItem{display:flex;justify-content:space-between;gap:6px;padding:7px 10px;font-size:12.5px;border-bottom:1px solid rgba(39,48,63,.5)}
.tierItem:last-child{border-bottom:none}

/* ── 폼 주식 ── */
.spark{width:170px;height:42px;display:block}
.priceUp{color:var(--win)} .priceDn{color:var(--lose)}

/* ── 칭호 ── */
.awards{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:12px}
.award{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.award::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--gold)}
.award b{display:block;font-size:14px;color:var(--gold)}
.award .who{font-weight:800;margin:3px 0 1px;font-size:15px}
.award .mini{line-height:1.45}

/* ── 칭호 명예의 전당 ── */
.owners{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.ownerCard{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
.ownerCard .oname{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:17px;font-weight:800;margin-bottom:6px}
.ownerCard .arow{padding:8px 0;border-top:1px dashed var(--line)}
.ownerCard .arow b{color:var(--gold);font-size:13.5px;display:block}
.ownerCard .arow .mini{display:block;margin-top:2px;line-height:1.4}

/* ── 플레이어 리스트 ── */
.pList{max-height:560px;overflow:auto;display:grid;gap:6px;padding-right:4px}
.pItem{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--r-sm);border:1px solid transparent;cursor:pointer;color:var(--mut)}
.pItem:hover{background:var(--panel2);color:var(--text)}
.pItem.on{background:var(--panel2);border-color:var(--line2);color:var(--text)}
.pItem .ign{font-size:11px;color:var(--dim);margin-top:1px}
.pItem.off{opacity:.45}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

@media (max-width:1080px){.c4{grid-template-columns:repeat(2,minmax(0,1fr))}.c3{grid-template-columns:repeat(2,minmax(0,1fr))}.tierBoard{grid-template-columns:repeat(4,minmax(0,1fr))}}
@media (max-width:720px){
  html{font-size:14px}
  .c2,.c3,.c4{grid-template-columns:1fr}
  .tierBoard{grid-template-columns:repeat(2,minmax(0,1fr))}
  .pageHead h2{font-size:22px}
  nav.tabs{width:100%;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px}
  nav.tabs button{flex:none}
}

/* ═══ 📱 모바일 보강 — 글자 깨짐·넘침 방지 ═══ */
*{word-break:keep-all;overflow-wrap:anywhere}
.scrollx{-webkit-overflow-scrolling:touch}
@media (max-width:720px){
  .card{padding:14px 12px}
  .card input,.card select{max-width:100%!important;min-width:0!important;font-size:16px}/* iOS 확대 방지 */
  .row{flex-wrap:wrap}
  .btn{padding:10px 14px;min-height:40px}/* 손가락 터치 크기 */
  .btn.sm{padding:8px 11px;min-height:36px}
  table.tbl{font-size:12.5px}
  table.tbl th,table.tbl td{padding:7px 6px;white-space:nowrap}
  .pill{white-space:nowrap}
  .f label{font-size:12px}
  .pageHead p{font-size:12.5px}
  .tickerWrap{font-size:12px}
  .subnav{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .subnav button{flex:none}
}
@media (max-width:480px){
  html{font-size:13.5px}
  .brand h1{font-size:16px}
  .tierBoard{grid-template-columns:repeat(2,minmax(0,1fr))}
  .card h3{font-size:15px}
  table.tbl{font-size:11.5px}
  .pageHead h2{font-size:19px}
}

/* ═══ 🎨 그림 뱃지 + 🪪 프로필 ═══ */
.artBadge{height:16px;vertical-align:-3px;border-radius:4px;margin-right:3px}
.champFace{border-radius:6px;object-fit:cover;vertical-align:middle;flex:none;background:var(--inset)}
.counterFaces{display:inline-flex;align-items:center}
.counterFaces img{border-radius:50%;border:2px solid var(--panel)}
.counterFaces span+span img{margin-left:-8px}
.meBanner{height:74px}
.meAvatar{width:72px;height:72px;border-radius:50%;margin-top:-36px;background:var(--panel2);border:3px solid var(--panel);display:grid;place-items:center;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.35)}
.meAvatar img{width:100%;height:100%;object-fit:cover}
.meShelf{display:inline-grid;place-items:center;min-width:26px;height:26px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);font-size:15px;padding:0 4px}

/* ═══ ✨ 프로선수·레전드 이펙트 + 💸 돈다발 ═══ */
.tierPro{background:linear-gradient(120deg,#ffd86b,#fff3c4 30%,#ffb84b 60%,#ffd86b)!important;background-size:220% 100%!important;color:#3a2a05!important;border:1px solid #ffd86b!important;box-shadow:0 0 12px rgba(255,216,107,.55);animation:proShine 2.4s linear infinite;font-weight:900!important}
@keyframes proShine{from{background-position:0% 0}to{background-position:220% 0}}
.lgx1{background:linear-gradient(120deg,#f2b84b,#fff3c4 35%,#f2b84b 70%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:900;animation:proShine 3s linear infinite;text-shadow:none;filter:drop-shadow(0 0 6px rgba(242,184,75,.5))}
.lgx2{background:linear-gradient(120deg,#7fd1ff,#d24dff 30%,#ff7fb0 55%,#ffd24a 80%,#7fd1ff);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:900;animation:proShine 3.6s linear infinite;filter:drop-shadow(0 0 7px rgba(176,107,255,.6))}
.clrRainbow{background:linear-gradient(110deg,#ff5b5b,#ffb347 18%,#ffe14d 35%,#7dff8a 52%,#5ad1ff 70%,#b58cff 86%,#ff5b5b);background-size:280% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:900;animation:proShine 3s linear infinite;filter:drop-shadow(0 0 6px rgba(255,255,255,.35))}
@keyframes moneyDrop{to{transform:translateY(115vh) rotate(300deg)}}

/* ═══ 🟢 온라인 박스 + 🎰 잭팟 티커 ═══ */
#onlineBox{position:fixed;right:14px;top:150px;width:180px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 12px;z-index:25;box-shadow:0 10px 30px rgba(0,0,0,.35)}
@media (max-width:1819px){#onlineBox{display:none!important}}
.tk-jack{color:var(--gold);font-weight:900;text-shadow:0 0 10px rgba(242,184,75,.7);animation:jkBlink .9s infinite alternate}
@keyframes jkBlink{from{opacity:1}to{opacity:.55}}

/* ═══ 📱 상단 메뉴 모바일 다듬기 — 한 줄 가로 스크롤 + 글자 축소 ═══ */
nav.tabs>.row::-webkit-scrollbar,.subnav::-webkit-scrollbar{display:none}
@media (max-width:720px){
  .topIn{padding:10px 12px;gap:8px}
  .mark{width:34px;height:34px;font-size:17px;border-radius:10px}
  .brand h1{font-size:15.5px}
  .brand p{font-size:9.5px;letter-spacing:.08em}
  nav.tabs{margin-left:0;flex-direction:column;align-items:stretch;gap:0}
  nav.tabs>.row{flex-wrap:nowrap!important;overflow-x:auto;width:100%;padding-bottom:2px;scrollbar-width:none}
  nav.tabs>.row button{flex:none;font-size:12px;padding:7px 10px;white-space:nowrap}
  .subnav{margin-top:5px;padding-top:5px;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none}
  .subnav button{flex:none;font-size:11.5px;padding:5px 9px;white-space:nowrap}
  .ticker{height:28px}
  .ticker .lbl{padding:0 10px;font-size:10px}

function lev(a,b){ // 편집 거리 (퍼지 매칭용)
  a=norm(a);b=norm(b);
  if(!a.length)return b.length; if(!b.length)return a.length;
  let prev=Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){
    const cur=[i];
    for(let j=1;j<=b.length;j++)
      cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev=cur;
  }
  return prev[b.length];
}

  return [...out].filter(Boolean);
}

  }));

const byId=id=>state.players.find(p=>p.id===id);
const nameOf=id=>byId(id)?.displayName||'미확인';
function labelsOf(p){return[p.displayName,p.kakaoName,p.riotName,p.riotName&&p.riotTag?p.riotName+'#'+p.riotTag:'',...(p.aliases||[])].filter(Boolean)}
function findPlayer(text){
  const k=norm(text); if(!k)return null;
  let hit=state.players.find(p=>labelsOf(p).some(x=>norm(x)===k));
  if(hit)return hit;
  if(k.length<3)return null; // 부분 포함 매칭은 3글자 이상끼리만 (짧은 닉 오인 방지)
  return state.players.find(p=>labelsOf(p).some(x=>{const n=norm(x);return n.length>=3&&(n.includes(k)||k.includes(n))}))||null;
}
function fuzzyPlayer(text){ // OCR 결과용: 오타 허용 매칭
  const exact=findPlayer(text); if(exact)return{player:exact,score:0};
  const k=norm(text); if(k.length<2)return{player:null,score:99};
  let best=null,bestD=99;
  for(const p of state.players){
    for(const lb of labelsOf(p)){
      const n=norm(lb); if(n.length<2)continue;
      const d=lev(k,n);
      const tol=Math.max(1,Math.floor(Math.max(k.length,n.length)*0.34));
      if(d<=tol&&d<bestD){best=p;bestD=d}
    }
  }
  return{player:best,score:bestD};

function canonChamp(text){
  if(!text)return'';
  const raw=String(text).trim(),k=norm(raw);
  if(CHAMP_ALIAS[k])return CHAMP_ALIAS[k];
  const exact=CHAMPIONS.find(c=>norm(c)===k); if(exact)return exact;
  const part=k.length>=2?CHAMPIONS.find(c=>{const n=norm(c);return n.length>=2&&(n.includes(k)||k.includes(n))}):null; if(part)return part;
  if(k.length>=2){ // 퍼지
    let best='',bd=99;
    for(const c of CHAMPIONS){const d=lev(k,norm(c));const tol=Math.max(1,Math.floor(norm(c).length*0.3));if(d<=tol&&d<bd){best=c;bd=d}}
    if(best)return best;
  }
  return raw;
}

function statChamps(days){

const LANE_AXES={

 '미드': [['dpm','화력'],['kda','교전'],['surv','생존'],['cspm','성장'],['kp','킬관여'],['dpg','골드 효율']],
 '원딜': [['dpm','화력'],['kda','교전'],['surv','생존'],['cspm','성장'],['dpg','골드 효율'],['demolpm','철거']],
 '서폿': [['vspm','시야'],['kp','킬관여'],['kda','교전'],['surv','생존'],['ccpm','변수(CC)'],['utilpm','케어']]

const GENERIC_AXES=[['dpm','화력'],['kda','교전'],['surv','생존'],['cspm','성장'],['objpm','오브젝트'],['vspm','시야']];
function playerLanes(id){ // 이 선수가 뛴 라인과 판수 (많은 순)
  const cnt={};
  state.matches.forEach(m=>m.participants.forEach(p=>{
    if(p.playerId===id&&p.lane&&LANE_KO[p.lane])cnt[LANE_KO[p.lane]]=(cnt[LANE_KO[p.lane]]||0)+1;
  }));
  return Object.entries(cnt).map(([lane,games])=>({lane,games})).sort((a,b)=>b.games-a.games);
}
function ratesMap(laneKo){ // 분당·효율 지표 일괄 계산 (laneKo 주면 그 라인 출전 기록만)
  const agg=new Map();
  state.matches.forEach(m=>{
    const mins=(m.durationMin&&m.durationMin>=5)?m.durationMin:28; // 시간 없으면 평균 28분 가정
    const tk={BLUE:0,RED:0};
    m.participants.forEach(p=>{if(p.playerId)tk[p.team]+=num(p.kills)});
    m.participants.forEach(p=>{
      if(!p.playerId)return;
      if(laneKo&&LANE_KO[p.lane]!==laneKo)return;
      if(!agg.has(p.playerId))agg.set(p.playerId,{g:0,min:0,dmg:0,cs:0,vis:0,obj:0,tur:0,gold:0,cc:0,heal:0,taken:0,mitig:0,d:0,k:0,a:0,kpSum:0,kpG:0,solo:0});
      const s=agg.get(p.playerId),st=p.stats||{};
      s.g++;s.min+=mins;
      s.dmg+=num(st.damageToChampions);s.cs+=num(st.cs);s.vis+=num(st.visionScore);
      s.obj+=num(st.damageToObjectives);s.tur+=num(st.damageToTurrets);s.gold+=num(st.goldEarned);
      s.cc+=num(st.crowdControlScore);s.heal+=num(st.healing);
      s.taken+=num(st.damageTaken);s.mitig+=num(st.selfMitigatedDamage);
      s.solo+=num(st.soloKills);
      s.d+=num(p.deaths);s.k+=num(p.kills);s.a+=num(p.assists);
      const t=tk[p.team];if(t>0){s.kpSum+=Math.min(1,(num(p.kills)+num(p.assists))/t);s.kpG++}
    });
  });
  const out=new Map();
  agg.forEach((s,id)=>out.set(id,{
    games:s.g,minutes:s.min,
    dpm:s.min?s.dmg/s.min:0, cspm:s.min?s.cs/s.min:0, vspm:s.min?s.vis/s.min:0,
    objpm:s.min?s.obj/s.min:0, demolpm:s.min?s.tur/s.min:0, ccpm:s.min?s.cc/s.min:0,
    utilpm:s.min?(s.heal+s.mitig)/s.min:0, tankpm:s.min?(s.taken+s.mitig)/s.min:0,
    dpg:s.gold>0?s.dmg/(s.gold/1000):0, gpm:s.min?s.gold/s.min:0,
    deathsPg:s.g?s.d/s.g:0, kda:s.d?(s.k+s.a)/s.d:(s.k+s.a),
    kp:s.kpG?Math.round(s.kpSum/s.kpG*1000)/10:0, solo:s.solo,
    avgDmg:s.g?Math.round(s.dmg/s.g):0
  }));
  return out;
}
const RATE_GET={dpm:r=>r.dpm,kda:r=>r.kda,surv:r=>-r.deathsPg,cspm:r=>r.cspm,objpm:r=>r.objpm,
 vspm:r=>r.vspm,kp:r=>r.kp,dpg:r=>r.dpg,demolpm:r=>r.demolpm,ccpm:r=>r.ccpm,utilpm:r=>r.utilpm,tankpm:r=>r.tankpm};
function playerHex(id,laneSel){
  const myLane=laneSel||playerMainLane(id);
  const rates=ratesMap(myLane||undefined); // 그 라인에서 뛴 기록끼리만 비교
  const mine=rates.get(id);
  if(!mine)return null;
  const axes=LANE_AXES[myLane]||GENERIC_AXES;
  let poolIds=[...rates.keys()];
  let laneScoped=!!myLane&&poolIds.length>=3;
  if(myLane&&!laneScoped){ // 그 라인 표본이 너무 적으면 전체 기준으로 폴백
    const all=ratesMap();poolIds=[...all.keys()];
    return hexFrom(all.get(id)?all:new Map([[id,mine]]),id,axes,poolIds,myLane,false,mine);
  }
  return hexFrom(rates,id,axes,poolIds,myLane,laneScoped,mine);
}
function hexFrom(rates,id,axes,poolIds,lane,laneScoped,mine){
  // 백분위(등수) 기반 평가: 아웃라이어 한 명이 바닥/천장을 깔아 전원이 한쪽으로 몰리는 착시 방지
  const vals=[];
  for(const[k]of axes){
    const myV=RATE_GET[k](mine);
    const arr=poolIds.map(pid=>RATE_GET[k](rates.get(pid)));
    if(arr.length<=1){vals.push(0.5);continue}
    let below=0,equal=0;
    arr.forEach(x=>{if(x<myV)below++;else if(x===myV)equal++});
    let v=(below+Math.max(0,equal-1)*0.5)/(arr.length-1); // 동률은 중간 등수
    // 표본 보정: 적을수록 0.5(평균)로 수축 — 4판이면 8점/100점 같은 극단 방지
    const conf=Math.min(1,(mine.games||0)/8);
    v=0.5+(v-0.5)*conf;
    // 점수 압축: 15~92 범위로 — 만점/빵점 대신 "강점/약점 정도"로 차별화
    v=0.15+v*0.77;
    vals.push(Math.max(0.05,Math.min(0.97,v)));
  }
  return{vals,labels:axes.map(x=>x[1]),me:{games:mine.games},rates:mine,lane,laneScoped};
}
function radarSvg(vals,labels,size=290){
  const cx=size/2,cy=size/2,R=size*0.34,n=vals.length;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/n;return[+(cx+Math.cos(a)*r).toFixed(1),+(cy+Math.sin(a)*r).toFixed(1)]};
  let grid='';
  for(const f of[0.25,0.5,0.75,1])grid+=`<polygon points="${Array.from({length:n},(_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  let axes='',lbl='';
  for(let i=0;i<n;i++){
    const[ax,ay]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="var(--line)" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+20);lbl+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--mut)" font-size="11.5" font-weight="700">${esc(labels[i])}</text>`;
  }
  const poly=Array.from({length:n},(_,i)=>pt(i,R*Math.max(0.05,vals[i])).join(',')).join(' ');
  const dots=Array.from({length:n},(_,i)=>{const[dx,dy]=pt(i,R*Math.max(0.05,vals[i]));return`<circle cx="${dx}" cy="${dy}" r="3" fill="var(--gold)"/>`}).join('');
  return`<svg viewBox="0 0 ${size} ${size}" style="max-width:${size}px;width:100%" role="img" aria-label="플레이어 지표 육각형">${grid}${axes}<polygon points="${poly}" fill="rgba(242,184,75,.2)" stroke="var(--gold)" stroke-width="2.2" stroke-linejoin="round"/>${dots}${lbl}</svg>`;
}

function radarSvg2(a,b,labels,size=320){ // 두 선수 겹쳐 보기 (금색 vs 청록)

  const pt=(i,r)=>{const ag=-Math.PI/2+i*2*Math.PI/n;return[+(cx+Math.cos(ag)*r).toFixed(1),+(cy+Math.sin(ag)*r).toFixed(1)]};
  let grid='';for(const f of[0.25,0.5,0.75,1])grid+=`<polygon points="${Array.from({length:n},(_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  let axes='',lbl='';
  for(let i=0;i<n;i++){const[ax,ay]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="var(--line)" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+20);lbl+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--mut)" font-size="11.5" font-weight="700">${esc(labels[i])}</text>`}
  const poly=v=>Array.from({length:n},(_,i)=>pt(i,R*Math.max(0.05,v[i])).join(',')).join(' ');

function playerMainLane(id){
  const cnt={};
  state.matches.forEach(m=>m.participants.forEach(p=>{if(p.playerId===id&&p.lane)cnt[p.lane]=(cnt[p.lane]||0)+1}));
  const best=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
  return best?({TOP:'탑',JUNGLE:'정글',MID:'미드',ADC:'원딜',SUPPORT:'서폿'}[best[0]]||null):null;
}

function styleReport(hex){
  const pair=hex.labels.map((l,i)=>({l,v:hex.vals[i]})).sort((a,b)=>b.v-a.v);
  return{str:pair.slice(0,2),weak:pair.slice(-2).reverse()};

function proAssignMap(laneKo){ // 라인별 멤버↔프로 1:1 그리디 매칭 (가까운 쌍부터 확정)
  const key=laneKo+'|'+state.matches.length+'|'+state.players.length;
  if(window.__proAsg&&window.__proAsg.key===key)return window.__proAsg.map;
  const pool=PRO_TYPES.filter(t=>t.lane===laneKo);
  const members=[];
  state.players.forEach(p=>{
    const hx=playerHex(p.id,laneKo);
    if(hx&&hx.me&&hx.me.games>=3)members.push({pid:p.id,vals:hx.vals});
  });
  const pairs=[];
  members.forEach(m=>pool.forEach(t=>{
    let d=0;for(let i=0;i<m.vals.length;i++)d+=(m.vals[i]-(t.v[i]??.5))**2;
    pairs.push({pid:m.pid,t,d:Math.sqrt(d)});
  }));
  pairs.sort((a,b)=>a.d-b.d);
  const map=new Map(),usedPro=new Set();
  pairs.forEach(pr=>{
    if(map.has(pr.pid)||usedPro.has(pr.t.name))return;
    map.set(pr.pid,{t:pr.t,d:pr.d});usedPro.add(pr.t.name);
  });
  window.__proAsg={key,map};
  return map;
}
function matchPro(hex,laneKo,pid){
  if(!hex)return null;
  const me=hex.me;
  if(me.games<3)return{name:'스카우트 진행 중',desc:`표본 ${me.games}판 — 3판 이상 쌓이면 닮은꼴 프로 판정이 나옵니다.`,pro:false};
  const avg=hex.vals.reduce((a,b)=>a+b,0)/hex.vals.length;
  if(avg<0.32){
    const pool=['각성 전 주인공형','잠재력 매장량 전국 1위','대기만성 스토브리그 유망주','폼은 일시적, 클래스는 오는 중'];
    return{name:pickSeeded(pool,me.games*13+Math.round(avg*100)),desc:'아직 지표가 만개하지 않았을 뿐. 서사는 지금부터 쓰입니다.',pro:false};
  }
  if(!laneKo)return{name:'포지션 탐색 중',desc:'라인 기록이 쌓이면 닮은꼴 프로를 찾아드려요.',pro:false};
  const n=hex.vals.length;
  const sim=d=>Math.max(5,Math.min(99,Math.round(100-(d/Math.sqrt(n))*90)));
  let best=null;
  if(pid){ // 유니크 배정: 같은 라인 멤버끼리 프로가 겹치지 않게 전역 매칭
    const asg=proAssignMap(laneKo);
    const got=asg.get(pid);
    if(got)best={t:got.t,d:got.d};
  }
  if(!best){
    const pool=PRO_TYPES.filter(t=>t.lane===laneKo);
    best=pool.map(t=>{
      let d=0;for(let i=0;i<n;i++)d+=(hex.vals[i]-(t.v[i]??.5))**2;
      return{t,d:Math.sqrt(d)};
    }).sort((a,b)=>a.d-b.d)[0];
  }
  // 닮은 포인트: 프로의 시그니처 축(0.62↑) 중 나와 가장 가까운 축 2개
  const labels=hex.labels||hex.vals.map((_,i)=>'지표'+(i+1));
  const cand=labels.map((lb,i)=>({lb,diff:Math.abs(hex.vals[i]-(best.t.v[i]??.5)),sig:(best.t.v[i]??.5)>=.62}));
  const picks=[...cand].sort((a,b)=>(b.sig-a.sig)||(a.diff-b.diff)).slice(0,2).map(c=>c.lb);
  const why=`${picks.join('·')} 스타일이 ${best.t.name}와 겹치는 포인트예요`;
  return{name:best.t.name+'형',lane:best.t.lane,desc:best.t.desc,sim:sim(best.d),why,mainLane:laneKo||null,pro:true};
}

function sparkSvg(arr,w=170,h=42,proj){
  if(arr.length<2)return'<span class="dim mini">데이터 부족</span>';
  if(proj&&proj.length){ // 예측 점선 모드: 스케일 공유를 위해 합쳐 계산 후 분리 렌더
    const all=[...arr,...proj];
    const mn=Math.min(...all)-3,mx=Math.max(...all)+3,sp=mx-mn||1;
    const N=all.length-1;
    const X=i=>(i/(N))*(w-8)+4, Y=v=>h-4-((v-mn)/sp)*(h-8);
    const seg=(a,off)=>a.map((v,i)=>`${X(i+off)},${Y(v)}`).join(' ');
    const base=Y(100);
    return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <line x1="4" y1="${base}" x2="${w-4}" y2="${base}" stroke="var(--line)" stroke-dasharray="3 3"/>
      <polyline points="${seg(arr,0)}" fill="none" stroke="${arr[arr.length-1]>=100?'var(--gold)':'var(--lose)'}" stroke-width="2"/>
      <polyline points="${seg([arr[arr.length-1],...proj],arr.length-1)}" fill="none" stroke="var(--win)" stroke-width="2" stroke-dasharray="4 3" opacity=".85"/>
      <circle cx="${X(N)}" cy="${Y(proj[proj.length-1])}" r="2.5" fill="var(--win)"/>
    </svg>`;
  }
  const min=Math.min(...arr,100),max=Math.max(...arr,100),rg=max-min||1;
  const X=i=>(i/(arr.length-1)*(w-8)+4),Y=v=>(h-((v-min)/rg)*(h*.74)-h*.13);
  const pts=arr.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const up=arr[arr.length-1]>=arr[0];
  const col=up?'var(--win)':'var(--lose)';
  const fill=up?'rgba(63,217,197,.14)':'rgba(255,92,122,.12)';
  const area=`${X(0).toFixed(1)},${(h-2).toFixed(1)} ${pts} ${X(arr.length-1).toFixed(1)},${(h-2).toFixed(1)}`;
  const base=Y(100).toFixed(1); // 기준가 100 점선
  const lx=X(arr.length-1).toFixed(1),ly=Y(arr[arr.length-1]).toFixed(1);
  return`<svg class="spark" style="width:${w}px;height:${h}px" viewBox="0 0 ${w} ${h}">
    <line x1="4" y1="${base}" x2="${w-4}" y2="${base}" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3 4" opacity=".6"/>
    <polygon points="${area}" fill="${fill}"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lx}" cy="${ly}" r="3.4" fill="${col}"/>
  </svg>`;
}

function streaksOf(id){
  let cw=0,cl=0,mw=0,ml=0;
  playerHistory(id).forEach(m=>{
    const p=m.participants.find(x=>x.playerId===id);
    if(p.team===m.winnerTeam){cw++;cl=0}else{cl++;cw=0}
    mw=Math.max(mw,cw);ml=Math.max(ml,cl);
  });
  return{mw,ml,cw,cl}; // cw/cl = 현재 진행 중 연승/연패
}

  const P=statPlayers(),D=statDuos(3),R=statRivals(3),C=statChamps(),PC=statPlayerChamps(2),SDp=statPlayerSides(1),out=[];

let _worker=null,_workerBlocked=false;
function loadScript(src){return new Promise((ok,no)=>{

async function getWorker(onProg){
  if(_worker)return _worker;

  try{
    _worker=await Tesseract.createWorker(['kor','eng'],1,{logger:m=>{

  }
}
function fileToImage(file){return new Promise((ok,no)=>{
  const img=new Image();

  img.src=URL.createObjectURL(file);
})}
async function preprocess(file){ // 확대 + 흑백 + 대비 → 인식률 향상
  const img=await fileToImage(file);
  const scale=Math.min(3,Math.max(1,2200/img.naturalWidth));
  const cv=document.createElement('canvas');
  cv.width=Math.round(img.naturalWidth*scale); cv.height=Math.round(img.naturalHeight*scale);
  const cx=cv.getContext('2d');

  cx.filter='grayscale(1) contrast(1.55) brightness(1.12)';
  cx.drawImage(img,0,0,cv.width,cv.height);

  return cv;
}

  btn.disabled=true;btn.textContent='분석 중...';
  try{
    lbl.textContent='OCR 엔진 준비 중... (최초 1회 5~15초)';
    const total=shots.length;let done=0;
    const worker=await getWorker(p=>{bar.style.width=((done+p)/total*100)+'%'});
    let textAll='';
    for(const s of shots){
      lbl.textContent=`이미지 ${done+1}/${total} 판독 중...`;
      const cv=await preprocess(s.file);
      const {data}=await worker.recognize(cv);
      textAll+='\n'+(data.text||'');
      done++; bar.style.width=(done/total*100)+'%';
    }
    $('ocrText').value=textAll.trim();
    lbl.textContent='판독 완료. 아래 텍스트를 보고 후보 생성을 눌러주세요.';
    buildDraftFromText();
  }catch(e){
    console.error(e);
    if(_workerBlocked){
      $('ocrNote').style.display='block';
      lbl.textContent='이 환경에서는 OCR이 차단됩니다.';
    }else{
      toast('분석 실패: '+(e.message||'이미지/인터넷 연결을 확인해주세요.'),true);
      lbl.textContent='분석 실패. 다시 시도하거나 직접 입력을 이용하세요.';
    }
  }finally{
    ocrBusy=false;btn.disabled=false;btn.textContent='스크린샷 분석 시작';
  }
}
/* OCR 텍스트 → 참가자 후보 (닉네임·챔피언 퍼지 매칭 + KDA 패턴) */
function parseScoreText(text){
  const rows=[];
  const lines=String(text||'').split('\n').map(l=>l.trim()).filter(l=>l.length>=3);
  for(const line of lines){
    const kda=line.match(/(\d{1,2})\s*[\/|]\s*(\d{1,2})\s*[\/|]\s*(\d{1,2})/);
    const clean=kda?line.replace(kda[0],' '):line;
    const words=clean.split(/\s{1,}/).filter(w=>w&&!/^[\d,\.%]+$/.test(w));
    // 닉네임 후보: 단어 조합 중 가장 잘 맞는 것
    let pBest=null,pScore=99,pRaw='';
    const cands=[];
    for(let i=0;i<words.length;i++){
      cands.push(words[i]);
      if(i+1<words.length)cands.push(words[i]+' '+words[i+1]);
      if(i+2<words.length)cands.push(words[i]+' '+words[i+1]+' '+words[i+2]);
    }
    cands.push(clean);
    for(const c of cands){
      const{player,score}=fuzzyPlayer(c);
      if(player&&score<pScore){pBest=player;pScore=score;pRaw=c}
    }
    // 챔피언 후보 — 닉네임으로 매칭된 부분(pRaw)은 제외하고 탐색
    let champ='';
    {
      const champClean=pRaw?clean.replace(pRaw,' '):clean;
      const cw=champClean.split(/\s{1,}/).filter(w=>w&&!/^[\d,\.%]+$/.test(w));
      const cc2=[];
      for(let i=0;i<cw.length;i++){
        cc2.push(cw[i]);
        if(i+1<cw.length)cc2.push(cw[i]+' '+cw[i+1]);
        if(i+2<cw.length)cc2.push(cw[i]+' '+cw[i+1]+' '+cw[i+2]);
      }
      for(const c of cc2){
        if(norm(c).length<2)continue;
        const cv=canonChamp(c);
        if(CHAMPIONS.includes(cv)){champ=cv;break}
      }
    }
    // 큰 숫자들: 1000 이상 → 딜량/골드 후보, 0~400 → CS 후보
    const nums=(line.match(/\d[\d,]{2,}/g)||[]).map(num).filter(n=>n>=1000).sort((a,b)=>b-a);
    const small=(line.match(/(?<![\d\/,])\d{1,3}(?![\d\/,])/g)||[]).map(Number).filter(n=>n>=30&&n<=420);
    if(!kda&&!pBest)continue;
    const stats={};
    if(nums[0])stats.damageToChampions=nums[0];
    if(nums[1])stats.goldEarned=nums[1];
    if(small.length)stats.cs=small[small.length-1];
    rows.push({
      rawName:pRaw||clean.slice(0,18), playerId:pBest?.id||'',
      championId:champ, kills:kda?+kda[1]:0,deaths:kda?+kda[2]:0,assists:kda?+kda[3]:0,
      stats
    });
    if(rows.length>=10)break;
  }
  return rows;
}
function buildDraftFromText(){
  const rows=parseScoreText($('ocrText').value);
  if(!rows.length)return toast('텍스트에서 선수/KDA를 찾지 못했어요. 텍스트를 정리하거나 직접 입력해주세요.',true);
  while(rows.length<10)rows.push({rawName:'',playerId:'',championId:'',kills:0,deaths:0,assists:0,stats:{}});
  draft={
    playedAt:$('shotDate').value||sessionDay(),
    setNumber:num($('shotSet').value)||1,
    winnerTeam:$('shotWin').value,
    memo:'스크린샷 분석 입력', mvpId:'',
    participants:rows.slice(0,10).map((r,i)=>({team:i<5?'BLUE':'RED',lane:LANES[i%5],...r})),
    bans:[]
  };
  draftEditId=null;
  renderReview('reviewBox');
  $('reviewBox').scrollIntoView({behavior:'smooth',block:'start'});
  toast(`${rows.filter(r=>r.playerId).length}명 자동 매칭. 검수표에서 확인 후 저장하세요.`);
}

/* ───── JSON 가져오기 (채팅 AI 판독 결과 붙여넣기) ───── */
const STAT_ALIAS={cs:['cs','minionsKilled','미니언','씨에스'],goldEarned:['goldEarned','gold','골드','골드획득'],
 damageToChampions:['damageToChampions','damage','championDamage','딜량','챔피언딜량'],
 damageTaken:['damageTaken','taken','받은피해','받은피해량'],visionScore:['visionScore','vision','시야','시야점수'],
 wardsPlaced:['wardsPlaced','와드설치'],wardsKilled:['wardsKilled','와드파괴'],controlWardsBought:['controlWardsBought','제어와드'],
 crowdControlScore:['crowdControlScore','cc','군중제어'],damageToObjectives:['damageToObjectives','오브젝트피해','목표물피해량'],
 damageToTurrets:['damageToTurrets','포탑피해','포탑피해량'],healing:['healing','heal','회복량'],
 selfMitigatedDamage:['selfMitigatedDamage','mitigated','피해감소','피해감소량'],soloKills:['soloKills','solokill','솔로킬','솔킬']};
function pickStats(src){
  const flat={...(src||{}),...(src?.stats||{})},out={};
  for(const[key,names]of Object.entries(STAT_ALIAS))
    for(const n of names){const hit=Object.keys(flat).find(k=>norm(k)===norm(n));if(hit&&flat[hit]!==''&&flat[hit]!=null){out[key]=num(flat[hit]);break}}
  return out;
}
function jsonToMatch(obj){ // 외부 JSON 1건 → 경기 데이터 (단건/일괄 공용)
  const list=obj.participants||obj.players||obj.rows||[];
  if(!Array.isArray(list)||!list.length)return null;
  const parts=list.slice(0,10).map((p,i)=>{
    const rawName=p.player||p.name||p.nickname||p.ign||p.rawName||'';
    const fp=findPlayer(rawName)||fuzzyPlayer(rawName).player;
    const champ=canonChamp(p.champion||p.champ||p.championName||'');
    return{team:String(p.team||p.side||(i<5?'BLUE':'RED')).toUpperCase().includes('RED')?'RED':'BLUE',
      lane:LANES.includes(String(p.lane||'').toUpperCase())?String(p.lane).toUpperCase():LANES[i%5],
      rawName, playerId:fp?.id||'', championId:champ,
      kills:num(p.kills??p.k),deaths:num(p.deaths??p.d),assists:num(p.assists??p.a),
      stats:pickStats(p)};
  });
  const bans=[];
  if(obj.bans)TEAMS.forEach(t=>(Array.isArray(obj.bans[t])?obj.bans[t]:[]).forEach(c=>bans.push({team:t,championId:canonChamp(c)})));
  return{playedAt:obj.playedAt||obj.date||todayStr(),setNumber:num(obj.setNumber||obj.set)||1,
    winnerTeam:String(obj.winnerTeam||obj.winner||'BLUE').toUpperCase().includes('RED')?'RED':'BLUE',
    gameId:obj.gameId!=null?String(obj.gameId):null,
    durationMin:obj.durationMin!=null?num(obj.durationMin):null,
    memo:obj.memo||'JSON 판독 입력',mvpId:findPlayer(obj.mvpName||obj.mvp||'')?.id||'',participants:parts,bans};
}
const matchSig=m=>String(m.playedAt)+'|'+String(m.winnerTeam)+'|'+(m.participants||[]).map(p=>p.kills+'/'+p.deaths+'/'+p.assists).sort().join(',');
function importJson(){
  if(needAdmin())return;
  let obj;
  try{obj=JSON.parse($('jsonIn').value)}catch(e){return toast('JSON 형식이 잘못됐어요. 중괄호/따옴표를 확인해주세요.',true)}
  let bulk=null;
  if(Array.isArray(obj))bulk=obj;
  else if(obj&&obj.matches)bulk=Array.isArray(obj.matches)?obj.matches:[obj.matches]; // PS가 1판 묶음의 배열 괄호를 벗기는 경우 대응
  if(bulk)return importBulk(bulk);
  const data=jsonToMatch(obj);
  if(!data)return toast('participants 배열이 필요해요.',true);
  draft=data; draftEditId=null;
  renderReview('reviewBox');
  $('reviewBox').scrollIntoView({behavior:'smooth',block:'start'});
  toast('JSON을 검수 화면으로 불러왔어요.');
}
function importBulk(arr){ // 내전 추출기 "전부 변환" 묶음: 중복 제외 + 일괄 저장
  let datas=arr.map(jsonToMatch).filter(Boolean);
  if(!datas.length)return toast('가져올 경기가 없어요.',true);
  const isGhost=d=>(d.durationMin!=null&&d.durationMin<5)||(d.participants||[]).every(p=>num(p.kills)+num(p.deaths)+num(p.assists)===0);
  const ghosts=datas.filter(isGhost).length;
  if(ghosts)datas=datas.filter(d=>!isGhost(d));
  if(!datas.length)return toast(`전부 5분 미만 무효 게임(다시하기 등)이라 건너뛰었어요.`);
  const seenSig=new Set(state.matches.map(matchSig));
  const seenGid=new Set(state.matches.map(m=>m.gameId).filter(Boolean));
  const fresh=[];
  for(const d of datas){
    if((d.gameId&&seenGid.has(d.gameId))||seenSig.has(matchSig(d)))continue;
    if(d.gameId)seenGid.add(d.gameId);
    seenSig.add(matchSig(d));
    fresh.push(d);
  }
  const dup=datas.length-fresh.length;
  if(!fresh.length)return toast('전부 이미 저장된 경기예요. (중복 '+dup+'건 건너뜀)');
  const unmatched=fresh.reduce((n,d)=>n+d.participants.filter(p=>!p.playerId&&p.rawName).length,0);
  let msg=`${fresh.length}경기를 한 번에 저장할까요?`;
  if(dup)msg+=` (이미 있는 ${dup}건은 제외)`;
  if(unmatched)msg+=`\n\n명단과 안 맞는 닉네임 ${unmatched}명은 '미확인'으로 저장돼요. 저장 후 경기 탭에서 수정하거나, 플레이어 탭에서 롤닉을 등록하고 다시 가져오면 자동 매칭됩니다.`;
  if(!confirm(msg))return;
  fresh.sort((a,b)=>String(a.playedAt).localeCompare(String(b.playedAt)));
  fresh.forEach(d=>{
    d.setNumber=state.matches.filter(m=>m.playedAt===d.playedAt).length+1; // 날짜별 세트 자동
    state.matches.push({id:uid('m'),createdAt:new Date().toISOString(),...d});
    pricesAfterMatch(); // 차트 실시간
  });
  save();
  toast(`내전 ${fresh.length}판을 저장했어요.`+(dup?` (중복 ${dup}건 제외)`:'')+(typeof ghosts!=='undefined'&&ghosts?` (무효 게임 ${ghosts}건 제외)`:''));
  go('matches');
}

  if(p.playerId||p.championId)return['확인 필요','mid'];
  return['미매칭','bad'];

  if(!r.ok||j.error)throw new Error(j.error||('서버 응답 오류 '+r.status));

}

/* ───── 공유 데이터 (호스팅된 사이트의 data.json) ───── */
function decideShared(shared){ // 동기화 판단 (rev 기반)
  const sR=Number(shared.rev)||0, lR=Number(state.rev)||0;
  const dirty=lsGet('apodan_dirty')==='1'&&lsGet(ADMIN_FLAG)==='1';
  if(state.matches.length===0&&state.players.length===0)return'adopt'; // 빈 브라우저 = 무조건 수용
  if(dirty&&lR>sR)return'keep'; // 게시 안 된 내 수정이 더 최신 — 절대 덮어쓰지 않음
  if(sR>lR)return'adopt'; // 서버가 더 최신 (라인업·설정만 바뀌어도 rev로 감지)
  if(sR===0&&lR===0&&shared.matches.length>state.matches.length)return'adopt'; // 구버전 데이터 호환
  return'keep';
}
async function loadShared(manual){
  try{

    if(!r.ok)throw 0;
    const shared=fixState(await r.json());

      state=shared;lsSet(DB_KEY,JSON.stringify(state));lsSet('apodan_dirty','0');render();toast('공유 데이터로 교체했어요.');return;
    }
    const act=decideShared(shared);

function matchFingerprint(m){ // 내용 지문: 날짜 + 10명의 챔피언·KDA (승패 표기 제외 — 한쪽만 반전된 사본도 잡기 위해)
  const parts=(m.participants||[]).map(p=>`${canonChamp(p.championId)||p.championId}|${num(p.kills)}/${num(p.deaths)}/${num(p.assists)}`).sort().join(',');
  return'x:'+m.playedAt+'|'+parts;
}
function dedupeMatches(){
  if(needAdmin())return;
  // 유니온 그룹핑: ①내용 지문이 같으면 한 그룹 ②게임ID가 같으면 무조건 한 그룹
  const N=state.matches.length;
  const parent=Array.from({length:N},(_,i)=>i);
  const find=a=>{while(parent[a]!==a){parent[a]=parent[parent[a]];a=parent[a]}return a};
  const uni=(a,b)=>{a=find(a);b=find(b);if(a!==b)parent[b]=a};
  const byKey=new Map();
  state.matches.forEach((m,i)=>{
    const fp=matchFingerprint(m);
    if(!byKey.has(fp))byKey.set(fp,[]);
    byKey.get(fp).push(i);
    if(m.gameId){const gk='g:'+m.gameId;if(byKey.has(gk))uni(byKey.get(gk)[0],i);else byKey.set(gk,[i])}
  });
  byKey.forEach((idxs,k)=>{ // 🐛fix: 게임ID가 서로 다르면 지문이 같아도 별개의 판 (병합 금지)
    if(k.startsWith('g:'))return;
    for(let x=0;x<idxs.length;x++)for(let y=x+1;y<idxs.length;y++){
      const ga=state.matches[idxs[x]].gameId,gb=state.matches[idxs[y]].gameId;
      if(ga&&gb&&ga!==gb)continue;
      uni(idxs[x],idxs[y]);
    }
  });
  const groups=new Map();
  state.matches.forEach((m,i)=>{const r=find(i);if(!groups.has(r))groups.set(r,[]);groups.get(r).push(m)});
  const dupGroups=[...groups.values()].filter(g=>g.length>1);
  if(!dupGroups.length)return toast('중복 경기가 없어요. (기준: 같은 게임ID, 또는 날짜·챔피언·KDA 완전 일치)');
  let byGid=0,byExact=0;
  const removeIds=new Set();
  const quality=m=>(m.gameId?8:0)+(m.durationMin?4:0)+((m.bans||[]).length?2:0)+((m.participants||[]).some(p=>p.stats&&Object.keys(p.stats).length>3)?1:0);
  dupGroups.forEach(g=>{
    const keep=[...g].sort((a,b)=>quality(b)-quality(a)||String(a.createdAt).localeCompare(String(b.createdAt)))[0];
    g.forEach(m=>{
      if(m===keep)return;
      removeIds.add(m.id);
      if(m.gameId&&keep.gameId&&m.gameId===keep.gameId)byGid++;else byExact++;
    });
  });
  if(!confirm(`중복 ${removeIds.size}판 발견!\n· 게임ID 동일: ${byGid}건\n· 내용 완전 일치(날짜·챔피언·KDA): ${byExact}건\n\n각 그룹에서 데이터가 가장 충실한 1판만 남기고 나머지를 삭제할까요?\n(승패 표기만 다른 사본도 같은 판으로 묶어요 — 남는 판의 승패가 맞는지 정리 후 확인!)`))return;
  state.matches=state.matches.filter(m=>!removeIds.has(m.id));
  state.voteRooms=(state.voteRooms||[]).filter(v=>state.matches.some(m=>m.id===v.matchId));
  save();render();toast(`딸깍! 중복 ${removeIds.size}판 정리 완료 — 각 경기는 1판씩 안전하게 남았어요.`);
}
function cleanGhosts(){
  if(needAdmin())return; // 이미 저장된 무효 경기(다시하기 등) 정리
  const isGhost=m=>(m.durationMin!=null&&m.durationMin<5)||(m.participants||[]).every(p=>num(p.kills)+num(p.deaths)+num(p.assists)===0);
  const ghosts=state.matches.filter(isGhost);
  if(!ghosts.length)return toast('무효로 보이는 경기가 없어요.');
  if(!confirm(`무효 게임으로 보이는 ${ghosts.length}판을 삭제할까요?\n(5분 미만이거나, 10명 전원 KDA가 0/0/0인 경기 — 다시하기·접속실패 흔적)`))return;
  state.matches=state.matches.filter(m=>!isGhost(m));
  state.voteRooms=state.voteRooms.filter(v=>state.matches.some(m=>m.id===v.matchId));
  save();render();toast(`무효 게임 ${ghosts.length}판을 정리했어요.`);
}


function swapSides(id){
  if(needAdmin())return; // 블루↔레드 통째 미러 (선수·밴·승리팀) — 누가 이겼는지는 유지
  const m=state.matches.find(x=>x.id===id); if(!m)return;
  if(!confirm('블루팀과 레드팀을 통째로 맞바꿀까요?\n선수 배치·밴·승리팀이 함께 거울처럼 뒤집혀서, "누가 이겼는지"는 그대로 유지되고 진영 기록만 바로잡힙니다.'))return;
  m.participants.forEach(p=>p.team=p.team==='BLUE'?'RED':'BLUE');
  (m.bans||[]).forEach(b=>{if(b&&b.team)b.team=b.team==='BLUE'?'RED':'BLUE'});
  m.winnerTeam=m.winnerTeam==='BLUE'?'RED':'BLUE';
  save();render();toast('진영을 반전했어요. 승자(사람)는 동일하게 유지됩니다.');
}


/* ───── 멤버끼리 결 비교 (공통축) ───── */
function genericHexAll(){
  const rates=ratesMap(); const out=new Map();
  const ids=[...rates.keys()].filter(id=>rates.get(id).games>=2);
  if(ids.length<2)return out;
  // 백분위(등수) 기반: 축마다 전체 멤버 중 몇 등인지로 환산 — 극단값 한 명이 전체를 짓누르거나 모두가 후해지는 왜곡 제거
  const pct=GENERIC_AXES.map(([k])=>{
    const vals=ids.map(id=>RATE_GET[k](rates.get(id)));
    const sorted=[...vals].sort((a,b)=>a-b);
    return id=>{
      const v=RATE_GET[k](rates.get(id));
      let lo=sorted.findIndex(x=>x>=v),hi=sorted.length-1-[...sorted].reverse().findIndex(x=>x<=v);
      if(lo<0)lo=sorted.length-1;
      const rank=(lo+hi)/2;
      return sorted.length<=1?0.5:Math.max(0.04,Math.min(0.96,rank/(sorted.length-1)));
    };
  });
  ids.forEach(id=>out.set(id,GENERIC_AXES.map((_,i)=>pct[i](id))));
  return out;
}
function memberMatch(id){
  const all=genericHexAll(); const me=all.get(id); if(!me)return null;
  const labels=GENERIC_AXES.map(x=>x[1]);
  let best=null,worst=null;
  all.forEach((v,pid)=>{
    if(pid===id)return;
    let d=0;for(let i=0;i<v.length;i++)d+=(v[i]-me[i])**2;
    const sim=Math.max(1,Math.min(99,Math.round(100-(Math.sqrt(d)/Math.sqrt(v.length))*100)));
    if(!best||sim>best.sim)best={id:pid,sim,v};
    if(!worst||sim<worst.sim)worst={id:pid,sim,v};
  });
  if(!best)return null;
  const tone=x=>x>=0.62?'강':x<=0.38?'약':null; // 백분위 기준 상/하위권
  // 닮은 이유: 차이가 작으면서 둘 다 뚜렷한(높거나 낮은) 축 2개
  const simWhy=(()=>{
    const ranked=labels.map((l,i)=>({l,diff:Math.abs(best.v[i]-me[i]),avg:(best.v[i]+me[i])/2}))
      .sort((a,b)=>a.diff-b.diff);
    const hi=ranked.filter(x=>x.avg>=0.6).slice(0,2).map(x=>x.l);
    const lo=ranked.filter(x=>x.avg<=0.4).slice(0,2).map(x=>x.l);
    if(hi.length>=2)return`둘 다 ${hi.join('·')}이(가) 강한 같은 과예요`;
    if(hi.length===1&&lo.length>=1)return`${hi[0]}은(는) 강하고 ${lo[0]}은(는) 아끼는, 힘 배분이 닮은 스타일`;
    if(lo.length>=2)return`${lo.join('·')}보다 다른 데 힘을 쓰는, 비슷한 운영 결`;
    return'여섯 축 전반의 분포가 비슷한 플레이 결이에요';
  })();
  // 정반대 이유: 차이 최대 축 + 방향 명시
  const oppWhy=(()=>{
    const ranked=labels.map((l,i)=>({l,diff:me[i]-worst.v[i],abs:Math.abs(me[i]-worst.v[i])}))
      .sort((a,b)=>b.abs-a.abs);
    const t=ranked[0];
    const meHigh=t.diff>0;
    const myTone=tone(meHigh?1:0)||'';
    const oppName=nameOf(worst.id);
    const dir=meHigh
      ?`이 선수는 ${t.l} 상위권의 공격적 운용, ${oppName}${josa(oppName,'은','는')} ${t.l}${josa(t.l,'을','를')} 아끼는 안정형`
      :`${oppName}${josa(oppName,'이','가')} ${t.l} 상위권으로 밀어붙일 때, 이 선수는 다른 축으로 승부하는 타입`;
    const second=ranked[1]&&ranked[1].abs>=0.3?` ${ranked[1].l}도 정반대 방향이에요.`:'';
    return`${t.l}에서 극과 극 — ${dir}.${second}`;
  })();
  return{similar:{name:nameOf(best.id),sim:best.sim,why:simWhy},
         opposite:{name:nameOf(worst.id),sim:worst.sim,why:oppWhy}};
}

function teamPower(ids){ // 폼 주가 60% + 통산 승률 40%
  const P=statPlayers();
  const vals=ids.map(id=>{
    const s=P.find(x=>x.id===id);
    const price=formSeries(id).arr.at(-1)||100;
    const wr=(s&&s.games?s.winRate:50)*2;
    return price*.6+wr*.4;
  });
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:100;
}
function lineupOdds(L){
  L=L||allLineups()[0]; if(!L||!L.blue.length||!L.red.length)return null;
  const pb=teamPower(L.blue),pr=teamPower(L.red);
  let prob=1/(1+Math.pow(10,(pr-pb)/70)); // 엘로식 (감도 완화)
  prob=Math.max(.15,Math.min(.85,prob)); // 내전은 변수가 많다 — 극단 예측 금지
  const margin=.97;
  return{probBlue:Math.round(prob*100),
    oddsBlue:Math.max(1.05,Math.round(1/(prob*margin)*100)/100),
    oddsRed:Math.max(1.05,Math.round(1/((1-prob)*margin)*100)/100),
    powBlue:Math.round(pb),powRed:Math.round(pr)};
}
function playerPace(pid){ // 경기 템포별 성적 (시간 기록 있는 판만)
  const fast={g:0,w:0},slow={g:0,w:0};
  state.matches.forEach(m=>{
    if(!m.durationMin)return;
    const p=m.participants.find(x=>x.playerId===pid); if(!p)return;
    const win=p.team===m.winnerTeam;
    if(m.durationMin<=26){fast.g++;if(win)fast.w++}
    else if(m.durationMin>=32){slow.g++;if(win)slow.w++}
  });
  return{fast,slow};
}
function josa(w,a,b){ // 받침 유무로 조사 선택: josa('잭슨','이','가') → '이'
  const ch=String(w||'').trim().slice(-1);const c=ch.charCodeAt(0);
  if(c>=0xAC00&&c<=0xD7A3)return(c-0xAC00)%28>0?a:b;
  return a+'('+b+')';
}
function cleanName(id){return nameOf(id).replace(/^[0-9]+\s*/,'')}
function derbyName(a,b,r){ // 닉 앞글자 조합 더비 작명
  const ca=cleanName(a).slice(0,1)||'?',cb=cleanName(b).slice(0,1)||'?';

  if(!r)return base;

  if(r.games>=4&&gap<=1)return`아포단 엘 클라시코 · ${base}`;
  if(gap>=3||(r.games>=3&&Math.max(...r.w)/r.games>=.75))return`${base} (먹이사슬편)`;
  return base;
}
function condCarry(pid){ // "뭘 했을 때 캐리하는가" 조건부 지표 분석

    {f:r=>r.solo,e:'🗡',h:(nm,wr,g)=>`솔로킬 = ${nm}의 승리 신호탄`,b:(nm,wr,g)=>`솔로킬을 따낸 판 승률 ${wr}% (${g}판). 라인전에서 체급 차이가 나는 순간 게임이 기웁니다`},

  }
  // ⑧ 이별 더비
  statDuos(3).filter(d=>d.winRate>=70).forEach(d=>{
    const[x,y]=d.ids;
    if((L.blue.includes(x)&&L.red.includes(y))||(L.blue.includes(y)&&L.red.includes(x)))
      push('💔',`국밥 듀오 해체 매치: ${d.names}`,
        `함께하면 승률 ${d.winRate}%였던 두 사람이 오늘은 적입니다. 서로의 습관을 제일 잘 아는 자들의 심리전`,d.ids);
  });
  // ⑨ 채우기: 출전자 중 MVP 머신 / KDA 1위 / 와드 머신
  if(pts.length<6){
    const S=statPlayers().filter(s=>all.includes(s.id));
    const mvp=[...S].sort((a,b)=>b.mvp-a.mvp)[0];
    if(mvp&&mvp.mvp>=2)push('👑',`MVP 수집가 ${mvp.name} 출전 (통산 ${mvp.mvp}회)`,
      `투표함이 이 선수를 기억합니다. 오늘도 하이라이트 장면을 만들 확률이 가장 높은 사람`,[mvp.id]);
  }
  if(pts.length<6){
    const S=statPlayers().filter(s=>all.includes(s.id)&&s.games>=3);
    const kda=[...S].sort((a,b)=>b.kda-a.kda)[0];
    if(kda&&kda.kda>=3.5)push('💎',`출전자 중 KDA 1위: ${kda.name} (${kda.kda})`,
      `죽지 않는 자가 이깁니다. 이 선수를 잡는 횟수가 곧 상대팀의 승리 지표`,[kda.id]);
  }
  if(pts.length<6){
    const rates=ratesMap();
    const ward=[...all].map(id=>({id,v:rates.get(id)?.vspm||0,g:rates.get(id)?.games||0})).filter(x=>x.g>=3).sort((a,b)=>b.v-a.v)[0];
    if(ward&&ward.v>=1.2)push('🕯',`와드 머신 ${N(ward.id)} — 맵이 밝다`,
      `분당 시야 점수 ${Math.round(ward.v*10)/10}. 이 선수가 있는 쪽 정글은 CCTV 설치 완료입니다`,[ward.id]);
  }
  if(!pts.length&&window._lpUsed&&allLineups().length>1){ // 리매치: 멘트 소진 시 회차 전용 멘트
    const prev=allLineups().find(x=>x.date===L.date&&x.id!==L.id);

      b:prev?`직전 회차의 승부가 그대로 이어질지, 통째로 뒤집힐지. 한 번 진 팀의 수정 밴픽이 최대 변수입니다`:`연속 매치업 — 서로의 패를 다 본 상태에서의 진검승부입니다`,ids:[]});
  }
  return pts.slice(0,7);
}

/* ───── 중복 의심 검사 (같은 날짜·같은 멤버 구성) ───── */
function suspectDups(){ // 같은 날·같은 멤버라도 게임ID가 서로 다르면 정상 (여러 세트). 의심 = ID 없는 판이 섞였거나 ID가 겹칠 때만
  const g=new Map();
  state.matches.forEach(m=>{
    const who=m.participants.map(p=>p.playerId||norm(p.rawName||'')).sort().join(',');
    const key=m.playedAt+'|'+who;
    if(!g.has(key))g.set(key,[]);
    g.get(key).push(m);
  });
  return[...g.values()].filter(a=>{
    if(a.length<2)return false;
    const ids=a.map(m=>m.gameId).filter(Boolean);
    const allHaveId=ids.length===a.length;
    const allUnique=new Set(ids).size===ids.length;
    return!(allHaveId&&allUnique); // 전부 고유 게임ID면 그냥 여러 판 한 것
  });
}

function liveBoardOf(date){
  state.liveBoards=state.liveBoards&&typeof state.liveBoards==='object'?state.liveBoards:{};
  if(!Array.isArray(state.liveBoards[date]))state.liveBoards[date]=[];
  return state.liveBoards[date];
}
function fearlessState(date,round){ // 하드 피어리스 + 중복 밴 금지 계산
  const ri=ROUNDS.indexOf(round);
  const pickBanned=[]; // 이전 세트 픽 전부 — 이후 영구 금지
  let banBlocked=[];   // 직전 세트 밴 — 이번 세트만 밴 금지
  for(let i=0;i<ri;i++){
    const slug=ROUND_SLUG[ROUNDS[i]]||'';
    const b=(state.liveBoards&&state.liveBoards[date+(slug?'#'+slug:'')])||[];
    b.filter(x=>x.type==='pick').forEach(x=>pickBanned.push({champ:x.champ,round:ROUNDS[i]}));
    if(i===ri-1)banBlocked=b.filter(x=>x.type==='ban').map(x=>x.champ);
  }
  return{pickBanned,banBlocked};
}

/* ───── 전문가 전망: 최근 흐름으로 다음 3판 주가 예측 ───── */
function formForecast(arr){
  if(!arr||arr.length<4)return null;
  const last=arr[arr.length-1];
  const d=(last-arr[Math.max(0,arr.length-4)])/3; // 최근 3판 평균 변화량
  const proj=[1,2,3].map(i=>Math.max(60,Math.min(160,Math.round(last+d*i))));
  const dir=d>1.5?'up':d<-1.5?'down':'flat';
  return{proj,dir,slope:Math.round(d*10)/10};
}

/* ───── 라인 티어표: 라인별 점수·티어·변동 ───── */
const LANE_LIST=['탑','정글','미드','원딜','서폿'];
const LANE_TIERS=['챌린저','그랜드마스터','마스터','다이아몬드','플래티넘'];
function laneScoreRows(excludeDate){ // 점수 = 보정승률 70% + KDA 30% (같은 공식으로 과거 시점도 계산 → 변동 산출)
  const acc=new Map();LANE_LIST.forEach(l=>acc.set(l,new Map()));
  state.matches.forEach(m=>{
    if(excludeDate&&m.playedAt===excludeDate)return;
    m.participants.forEach(p=>{
      const lk=LANE_KO[p.lane];if(!lk||!p.playerId)return;
      const mm=acc.get(lk);
      if(!mm.has(p.playerId))mm.set(p.playerId,{games:0,wins:0,k:0,d:0,a:0});
      const e=mm.get(p.playerId);
      e.games++;if(p.team===m.winnerTeam)e.wins++;
      e.k+=num(p.kills);e.d+=num(p.deaths);e.a+=num(p.assists);
    });
  });
  const out={};
  LANE_LIST.forEach(lane=>{
    out[lane]=[...acc.get(lane).entries()].map(([pid,e])=>{
      const bayes=(e.wins+4)/(e.games+8); // 표본 보정: 판수 적은 100% 승률 과대평가 방지
      const kda=(e.k+e.a)/Math.max(1,e.d);
      return{pid,games:e.games,wins:e.wins,winRate:pct(e.wins,e.games),kda:Math.round(kda*10)/10,
        score:Math.round((bayes*.7+Math.min(1,kda/5)*.3)*1000)/10};
    }).sort((a,b)=>b.score-a.score||b.games-a.games);
  });
  return out;
}
function laneTierBoard(excludeDate){
  const rows=laneScoreRows(excludeDate); const out={};
  LANE_LIST.forEach(lane=>{
    const eligible=rows[lane].filter(r=>r.games>=3);   // 3판부터 티어 부여
    const placing=rows[lane].filter(r=>r.games<3);     // 미만은 배치고사
    eligible.forEach((r,i)=>{
      const p=(i+0.5)/eligible.length;
      r.tier=p<.12?0:p<.32?1:p<.55?2:p<.8?3:4;
      if(r.tier===0&&i>0)r.tier=1; // 챌린저는 1위 단 1명
    });
    if(eligible[0])eligible[0].tier=eligible[0].games>=5?0:Math.max(1,eligible[0].tier); // 최강자 자격은 5판 이상
    placing.forEach(r=>r.tier=null);
    out[lane]={list:[...eligible,...placing],king:eligible[0]&&eligible[0].games>=5?eligible[0]:null};
  });
  return out;
}
function laneTierDelta(){ // 가장 최근 내전일 경기들로 인한 티어 변동 (그 날을 뺀 보드와 비교)
  const dates=[...new Set(state.matches.map(m=>m.playedAt))].sort();
  const lastDate=dates[dates.length-1];
  const board=laneTierBoard(null);
  if(!lastDate)return{board,delta:{},lastDate:null};
  const prev=laneTierBoard(lastDate);
  const delta={};
  const rankDelta={};
  LANE_LIST.forEach(lane=>{
    const pv=new Map(prev[lane].list.map((r,i)=>[r.pid,{tier:r.tier,rank:i}]));
    board[lane].list.forEach((r,i)=>{
      const before=pv.get(r.pid);
      delta[lane+'|'+r.pid]=
        r.tier==null?0
        :(!before||before.tier===null||before.tier===undefined)?'NEW'
        :before.tier-r.tier; // 양수 = 티어 상승
      rankDelta[lane+'|'+r.pid]=before?before.rank-i:null; // 양수 = 순위 상승
    });
  });
  return{board,delta,rankDelta,lastDate};
}
function laneTip(lane,pid,tier,games){ // 비하 금지: 위에는 칭찬, 아래에는 보완점과 방향
  if(tier==null)return`배치고사 진행 중 (${games}/3판) — 3판부터 티어가 떠요`;
  const hex=playerHex(pid,lane);
  if(!hex)return'';
  let hi=0,lo=0;
  hex.vals.forEach((v,i)=>{if(v>hex.vals[hi])hi=i;if(v<hex.vals[lo])lo=i});
  const S=hex.labels[hi],W=hex.labels[lo];
  if(tier===0)return`${lane}의 살아있는 교과서. 특히 ${S}은(는) 따라올 사람이 없어요 👑`;
  if(tier===1)return`${S} 하나는 이 라인 최정상급 — 왕좌까지 정말 한 끗 차이예요`;
  if(tier===2)return`${S}이(가) 확실한 무기. ${W}만 다듬으면 윗 티어가 바로 보입니다`;
  if(tier===3)return`${S}은(는) 이미 충분히 좋아요. 다음 내전에서 ${W}에 집중하면 점프 각`;
  return`기본기는 갖춰져 있어요. ${W}을(를) 의식하며 플레이하면 분명히 올라갑니다 — 티어는 움직이라고 있는 거니까요`;
}


/* ───── 플레이어 모스트 챔피언 ───── */
function playerChamps(pid){
  const map=new Map();
  state.matches.forEach(m=>m.participants.forEach(p=>{
    if(p.playerId!==pid)return;
    const c=canonChamp(p.championId)||p.championId; if(!c)return;
    if(!map.has(c))map.set(c,{champ:c,games:0,wins:0,k:0,d:0,a:0});
    const e=map.get(c);e.games++;if(p.team===m.winnerTeam)e.wins++;
    e.k+=num(p.kills);e.d+=num(p.deaths);e.a+=num(p.assists);
  }));
  return[...map.values()]
    .map(e=>({...e,winRate:pct(e.wins,e.games),kda:Math.round((e.k+e.a)/Math.max(1,e.d)*10)/10}))
    .sort((a,b)=>b.games-a.games||b.winRate-a.winRate);
}


/* ───── 라인업 라인별 맞대결 프리뷰 ───── */
function headToHead(a,b){ // a 기준 상대전적
  let meet=0,aw=0;
  state.matches.forEach(m=>{
    const pa=m.participants.find(p=>p.playerId===a),pb=m.participants.find(p=>p.playerId===b);
    if(!pa||!pb||pa.team===pb.team)return;
    meet++;if(pa.team===m.winnerTeam)aw++;
  });
  return{meet,aw,bw:meet-aw};
}
function lineupMatchups(L){
  L=L||allLineups()[0];
  if(!L||L.blue.length!==5||L.red.length!==5)return null;
  const lanes=['탑','정글','미드','원딜','서폿'];
  const tiers=laneTierBoard(null);
  const tierShort=['챌린저','그마','마스터','다이아','플래티넘'];
  const info=(pid,lane)=>{
    const r=(tiers[lane]?.list||[]).find(x=>x.pid===pid);
    return{tier:r&&r.tier!=null?tierShort[r.tier]:null,king:tiers[lane]?.king?.pid===pid,
      price:formSeries(pid).arr.at(-1)||100};
  };
  const rows=lanes.map((lane,i)=>{
    const a=L.blue[i],b=L.red[i];
    const h=headToHead(a,b);
    return{lane,a,b,ai:info(a,lane),bi:info(b,lane),...h,
      heat:h.meet*2+(h.meet>=2&&Math.abs(h.aw-h.bw)<=1?3:0)};
  });
  const big=[...rows].sort((x,y)=>y.heat-x.heat)[0];
  return{rows,big:big&&big.heat>=4?big:null};
}


/* ───── 서브 포인트: 출전자 전원 최소 1회 언급 보장 ───── */
function subMentList(pid,lane){ // 우선순위 후보 목록 — 다회차 카드에서 차순위 멘트 폴백용
  const nm=nameOf(pid);
  const out=[];
  const S=statPlayers().find(s=>s.id===pid);
  const g=S?S.games:0;
  if(!g)return[`데뷔전 — 아포단 전적 첫 페이지를 오늘 씁니다`,`기록 0판의 완전한 변수 — 스카우터들도 노트만 들고 있습니다`];
  if(g<3)out.push(`표본 ${g}판의 미지수 카드 — 오늘 베일을 벗습니다`);
  const tiers=laneTierBoard(null);
  if(lane){
    const row=(tiers[lane]?.list||[]).find(x=>x.pid===pid);
    if(tiers[lane]?.king?.pid===pid)out.push(`${lane} 왕좌 보유자의 방어전 — 도전자를 받습니다`);
    else if(row&&row.tier!=null&&row.tier<=1)out.push(`${lane} 상위 티어(${['챌린저','그랜드마스터'][row.tier]}) — 라인전부터 체급을 증명할 차례`);
  }
  const mcs=playerChamps(pid).filter(c=>c.games>=2&&c.winRate>=60);
  mcs.slice(0,2).forEach(mc=>out.push(`${mc.champ} ${mc.games}판 ${mc.winRate}% — 시그니처 카드 장전 완료`));
  const{wl}=formSeries(pid);const r3=wl.slice(-3);
  if(r3.length>=2&&r3.every(Boolean))out.push(`최근 ${r3.length}연승 — 조용히 뜨거운 손`);
  if(S){
    if(S.winRate>=55)out.push(`통산 승률 ${S.winRate}% (${g}판) — 팀의 안정 자산`);
    if(S.winRate<=45)out.push(`통산 ${S.wins}승 ${S.losses}패 — 오늘부터 반등 시작이라는 각오`);
    if(S.mvp>=1)out.push(`MVP ${S.mvp}회 보유 — 하이라이트 제조 가능성 보유자`);
    if(S.kda>=3)out.push(`통산 KDA ${S.kda} — 쉽게 죽어주지 않는 타입`);
    out.push(`통산 ${S.wins}승 ${S.losses}패의 균형추 — 오늘이 커리어 분기점`);
  }
  out.push(`${nm}, 오늘의 변수 후보 — 조용한 날이 없는 멤버`);
  return out;
}
function subMent(pid,lane){return subMentList(pid,lane)[0]}
function lineupSubPoints(L){
  L=L||allLineups()[0];if(!L)return[];
  const mentioned=new Set();
  lineupPoints(L).forEach(p=>(p.ids||[]).forEach(id=>mentioned.add(id)));
  const lanes=['탑','정글','미드','원딜','서폿'];
  const subs=[];
  [['blue','🅰'],['red','🅱']].forEach(([k,tag])=>{
    (L[k]||[]).forEach((pid,i)=>{
      if(mentioned.has(pid))return;
      const lane=L[k].length===5?lanes[i]:null;
      const cands=subMentList(pid,lane);
      let txt=cands[0];
      if(window._lpUsed){
        txt=cands.find(c=>!window._lpUsed.has('sub|'+pid+'|'+c))||cands[cands.length-1];
        window._lpUsed.add('sub|'+pid+'|'+txt);
      }
      subs.push({pid,tag,lane,name:nameOf(pid),txt});
    });
  });
  return subs;
}

  }else{
    toast(`🗳 ${team==='alpha'?'알파':'베타'}팀에 투표 완료! (집계 서버 미연결 — 내 픽만 기록돼요)`);
  }

}
async function fetchFanTally(force){
  const api=voteApiBase();if(!api)return;
  const Ls=allLineups();if(!Ls.length)return;
  const now=Date.now();
  if(window._fanBusy)return; // 동시 호출 차단
  if(!force&&window._fanLast&&now-window._fanLast<15000)return; // 렌더→fetch→렌더 폭주(깜빡임) 방지: 15초 쿨다운
  window._fanBusy=true;window._fanLast=now;
  window._fanTallies=window._fanTallies||{};
  for(const L of Ls){
    const key=voteKey(L);
    if(!force&&window._fanTallies[key])continue;
    try{
      const r=await fetch(api+'/api/vote?date='+encodeURIComponent(key));
      const t=await r.json().catch(()=>({}));
      if(!r.ok){window._fanErr=t.error||('HTTP '+r.status);continue}
      window._fanErr=null;
      window._fanTallies[key]={alpha:num(t.alpha),beta:num(t.beta)};
    }catch(e){window._fanErr='연결 실패'}
  }
  window._fanBusy=false;
  // 화면은 "내용이 실제로 바뀌었을 때만" 다시 그림 — 입력 중 끊김 방지
  const snap=JSON.stringify([window._fanTallies,window._fanErr||'']);
  if(snap!==window._fanSnap){window._fanSnap=snap;try{render()}catch(e){}}
  if(window.__noFanPoll)return;
  clearTimeout(window._fanPoll);
  window._fanPoll=setTimeout(()=>fetchFanTally(true),30000);
}
function fanOdds(luId){
  const L=lineupOf(luId);if(!L)return null;
  const t=(window._fanTallies||{})[voteKey(L)]||window._fanTally;
  if(!t)return null;
  const total=num(t.alpha)+num(t.beta);
  if(!total)return{total:0};
  const pa=Math.round(t.alpha/total*100);
  const margin=.97;
  return{total,alpha:t.alpha,beta:t.beta,probAlpha:pa,
    oddsAlpha:Math.max(1.05,Math.round(1/Math.max(.05,t.alpha/total)/margin*100)/100),
    oddsBeta:Math.max(1.05,Math.round(1/Math.max(.05,t.beta/total)/margin*100)/100)};
}
function cleanVoteApi(v){ // 테스트 URL 전체를 붙여넣어도 베이스 주소만 추출
  v=String(v||'').trim().replace(/^["']+|["']+$/g,'');
  if(!v)return'';
  if(!/^https?:\/\//.test(v))v='https://'+v;
  const m=v.match(/^https?:\/\/[^\/\s?#]+/);
  return m?m[0]:'';
}
function voteApiBase(){return cleanVoteApi(state.settings.voteApiUrl)}
function saveVoteApi(){
  if(needAdmin())return;
  const raw=($('voteApiUrl')?.value||'').trim();
  const v=cleanVoteApi(raw);
  state.settings.voteApiUrl=v;save();render();
  if(raw&&v&&raw!==v)toast('주소를 정리해서 저장했어요: '+v);
  else toast(v?'투표 서버를 연결했어요. 매치데이 카드에 유저 배당이 떠요!':'투표 서버 연결을 해제했어요.');
}

async function bankCall(action,body,method){
  if(state.settings&&state.settings.maintenance&&lsGet(ADMIN_FLAG)!=='1')throw new Error('🛠 서버 업데이트 중 — 잠시 후 다시 시도해주세요!');

async function bankRefresh(force){
  if(!bankToken()||!voteApiBase())return;
  if(window._bankBusy&&!force)return;
  if(!force&&window._bankLast&&Date.now()-window._bankLast<60000)return;
  const tk=bankToken(); // stale 가드: 도중에 로그인/아웃되면 이 결과는 폐기
  window._bankBusy=true;window._bankLast=Date.now();
  try{
    const me=await bankCall('me',null,'GET');
    if(bankToken()!==tk){window._bankBusy=false;return}
    window._bank=me;
    lsSet('apodan_bank_me',JSON.stringify({name:me.name,role:me.role}));
    if(me.role==='admin'||me.role==='dev'){
      try{window._bankPending=(await bankCall('pending',null,'GET')).pending}catch(e){}
      pushPrices(); // 시세 자동 갱신 (10분 쿨다운)
    }
  }catch(e){
    if(bankToken()===tk&&(e.status===401||e.status===403)){ // 진짜 인증 실패만 로그아웃 — 네트워크 끊김은 세션 유지
      window._bank=null;lsSet(BANK_TOKEN_KEY,'');lsSet('apodan_bank_me','');
      if(lsGet('apodan_admin_via_bank')==='1'){lsSet('apodan_admin_via_bank','');lsSet(ADMIN_FLAG,'');}
      toast('세션이 만료됐어요 — 다시 로그인해주세요.',true);
    }
  }
  if(!window._bankRoster||Date.now()-(window._bankSyncAt||0)>120000){try{window._bankRoster=(await bankCall('roster',null,'GET')).roster;window._bankSyncAt=Date.now()}catch(e){}} // roster는 신선하면 재사용
  if(tab==='bank'||tab==='form'){try{const _p=await bankCall('prices',null,'GET');window._srvPx=_p.prices||{};window._srvBase=_p.base||{};window._srvPrem=_p.prem||{}}catch(e){}} // 시세는 거래소·폼 탭에서만
  window._bankBusy=false;
  const snap=JSON.stringify([window._bank,window._bankRoster,window._bankPending]);
  if(snap!==window._bankSnap){
    window._bankSnap=snap;
    try{renderTicker();renderOnlineBox()}catch(e){} // 고정 요소는 스크롤과 무관하게 직접 갱신
    const sy2=(document.scrollingElement&&document.scrollingElement.scrollTop)||0;
    if(sy2<240&&!isTyping()){try{render()}catch(e){}} // 🐛fix: 화면 깊이 읽는 중엔 통째 리렌더 금지 (스크롤 튕김 원천 차단)
  }
}

function myTeamIn(L){ // 본인 출전 경기면 자기 팀만 베팅 가능 (승부조작 차단)
  const B=bankSession(); if(!B||!B.name)return null;
  const p=state.players.find(x=>x.displayName===B.name);
  if(!p)return null;
  if((L.blue||[]).includes(p.id))return'alpha';
  if((L.red||[]).includes(p.id))return'beta';
  return null;
}
function mktOdds(a,b){ // 변동 배당 (수수료 3% 반영)
  const total=(a+b)*0.97;
  return{
    alpha:a>0?Math.max(1.01,Math.round(total/a*100)/100):null,
    beta:b>0?Math.max(1.01,Math.round(total/b*100)/100):null};
}
async function fetchMarkets(force){
  const api=voteApiBase();if(!api)return;
  const Ls=allLineups();if(!Ls.length)return;
  if(window._mktBusy)return;
  if(!force&&window._mktLast&&Date.now()-window._mktLast<15000)return;
  window._mktBusy=true;window._mktLast=Date.now();
  window._mkts=window._mkts||{};
  for(const L of Ls){
    const key=voteKey(L);
    try{
      const r=await fetch(api+'/api/bank?action=market&market='+encodeURIComponent(key)+(bankToken()?'&token='+encodeURIComponent(bankToken()):''));
      const j=await r.json().catch(()=>({}));
      if(r.ok)window._mkts[key]=j;
    }catch(e){}
  }
  window._mktBusy=false;
  const snap=JSON.stringify(window._mkts);
  if(snap!==window._mktSnap){window._mktSnap=snap;try{render()}catch(e){}}
  if(window.__noFanPoll)return;
  clearTimeout(window._mktPoll);
  window._mktPoll=setTimeout(()=>fetchMarkets(true),30000);
}

async function pricesAfterMatch(){ // 🆕 경기 등록 → 거래소·차트 즉각 반영
  if(!voteApiBase())return;
  try{
    await pushPrices(true); // 폼 변동을 기준가에 즉시
    try{const _p3=await bankCall('prices',null,'GET');window._srvPx=_p3.prices||{};window._srvBase=_p3.base||{};window._srvPrem=_p3.prem||{}}catch(e){}
    if(window._stockSel)loadPxHist(window._stockSel);
    render();
  }catch(e){}
}
async function pushPrices(force){ // 폼 주가 → 거래소 시세 송출. force=경기 등록 직후 즉시!
  const B=bankSession();
  if(!B||(B.role!=='admin'&&B.role!=='dev')||!voteApiBase())return;
  if(!force&&window._pxLast&&Date.now()-window._pxLast<120000)return;
  window._pxLast=Date.now();
  const prices={};
  state.players.filter(p=>p.active).forEach(p=>{prices[p.displayName]=marketPrice(p)});
  try{await bankCall('setPrices',{prices})}catch(e){}
}
function stockPx(name){ // 화면 시세 = 체결 시세. 미상장은 폼 주가(=상장될 가격)
  const sv=window._srvPx||{};
  if(sv[name])return sv[name];
  const me=bankSession();
  if(me&&me.prices&&me.prices[name])return me.prices[name];
  return null;
}
function displayPx(name){ // 전광판용: 상장가까지 포함
  const srv=stockPx(name);
  if(srv)return{px:srv,listed:true};
  const p=state.players.find(x=>x.displayName===name);
  return{px:p?marketPrice(p):100,listed:false};
}
function resolveStock(raw){ // 종목 엄격 해석 — 유령 종목("ㅁㄹ" 등) 원천 차단
  raw=String(raw||'').trim();
  if(!raw)return{err:'종목(멤버)을 골라주세요.'};
  const act=state.players.filter(p=>p.active);
  const exact=act.find(p=>p.displayName===raw);
  if(exact)return{p:exact};
  const cands=act.filter(p=>searchHit(p,raw));
  if(cands.length===1)return{p:cands[0]};
  if(cands.length>1)return{err:`"${raw}" 후보가 ${cands.length}명: ${cands.slice(0,4).map(c=>c.displayName).join(', ')} — 시세판에서 클릭해 정확히 골라주세요.`};
  return{err:`"${raw}"는 명단에 없는 이름이에요 — 시세판에서 종목을 클릭해주세요.`};
}
async function stockTrade(side){
  const B=bankSession();
  if(B&&B.role==='dev'&&!B.name)return toast('🛠 개발자 유령 세션은 지갑이 없어요 — 거래는 본인 멤버 계정으로 로그인해서 해주세요!',true);
  if(!B||!B.name)return toast('💰 먼저 로그인해주세요!',true);
  const R=resolveStock($('stTarget')?.value);
  if(R.err)return toast(R.err,true);
  const tgt=R.p.displayName;
  const qty=Math.round(Number($('stQty')?.value)||0);
  if(qty<1||qty>999)return toast('수량은 1~999주로 입력해주세요.',true);
  // 🧾 주문 확인: 누구를, 몇 주, 얼마에, 총액까지 또박또박
  const D=displayPx(tgt);
  const base=D.px*qty;
  const isSelf=tgt===B.name;
  const fee=Math.ceil(base*0.01);
  const roy=side==='buy'&&!isSelf?Math.floor(base*0.02):0;
  const total=side==='buy'?base+fee+roy:Math.floor(base*0.99);
  const held=(B.holdings&&B.holdings[tgt]&&B.holdings[tgt].q)||0;
  if(side==='sell'&&held<qty)return toast(`보유 ${held}주뿐이에요 — 수량을 확인해주세요.`,true);
  const msg=side==='buy'
    ?`🧾 매수 주문 확인\n\n종목: ${tgt}${D.listed?'':' (첫 거래 — 폼 주가로 상장)'}\n수량: ${qty}주 × @${D.px}\n──────────\n주식 대금 ${fmtAPO(base)}\n+ 수수료 1% ${fmtAPO(fee)}\n+ 초상권료 2% ${fmtAPO(roy)}${isSelf?' (본인 — 면제)':''}\n= 총 ${fmtAPO(total)} APO 지불\n\n(체결가는 내 주문의 수급 영향 ±2% 내에서 확정돼요)\n\n이대로 체결할까요?`

/* ───── 초성 검색 + 시장 시세 엔진 ───── */
const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function choseong(s){ // "미르" → "ㅁㄹ"
  return String(s||'').split('').map(ch=>{
    const c=ch.charCodeAt(0);
    return(c>=0xAC00&&c<=0xD7A3)?CHO[Math.floor((c-0xAC00)/588)]:ch;
  }).join('');
}
function matchKo(label,q){ // 한글 만능 매칭: 글자는 글자대로, 자음은 초성으로 ("미ㄹ"→미르, "ㅇㅁ"→유메)
  const L=String(label||'').replace(/\s+/g,'').toLowerCase();
  const Q=String(q||'').replace(/\s+/g,'').toLowerCase();
  if(!Q)return true;
  if(!L)return false;
  const cho=ch=>{const c=ch.charCodeAt(0);return(c>=0xAC00&&c<=0xD7A3)?CHO[Math.floor((c-0xAC00)/588)]:ch};
  for(let s=0;s<=L.length-Q.length;s++){
    let ok=true;
    for(let i=0;i<Q.length;i++){
      const lc=L[s+i],qc=Q[i];
      if(qc!==lc&&qc!==cho(lc)){ok=false;break}
    }
    if(ok)return true;
  }
  return false;
}
function searchHit(p,q){ // 이름·별명 광범위 매칭
  q=String(q||'').trim();if(!q)return true;
  return labelsOf(p).some(l=>matchKo(l,q));
}
function dailyJitter(name){ // 날짜+이름 시드 → -1~1 (모두에게 동일한 "오늘의 시장 분위기")
  const seed=(new Date(Date.now()+9*3600*1000).toISOString().slice(0,10))+'|'+name;
  let h=0;for(let i=0;i<seed.length;i++){h=(h*31+seed.charCodeAt(i))>>>0}
  return((h%2001)/1000)-1;
}
function marketPrice(p){ // 거래소 기준가 = 폼 주식 페이지 가격과 완전히 동일 (1:1 연동)
  const base=formSeries(p.id).arr.at(-1)||100;
  return Math.max(10,Math.min(999,Math.round(base)));
}

/* ───── 🔥 확실한 라이벌 & 💙 최고의 친구 ───── */
function rivalOf(id){ // 많이 만났고 전적이 팽팽한 상대
  const opp={};
  state.matches.forEach(m=>{
    const me=m.participants.find(p=>p.playerId===id);if(!me)return;
    const iWon=me.team===m.winnerTeam;
    m.participants.filter(p=>p.playerId&&p.team!==me.team).forEach(p=>{
      opp[p.playerId]=opp[p.playerId]||{g:0,w:0};
      opp[p.playerId].g++;if(iWon)opp[p.playerId].w++;
    });
  });
  let best=null;
  Object.entries(opp).forEach(([pid,o])=>{
    if(o.g<3)return;
    const score=o.g*2-Math.abs(o.w*2-o.g)*3; // 다전 + 팽팽함
    if(!best||score>best.score)best={pid,g:o.g,w:o.w,l:o.g-o.w,score};
  });
  return best?{id:best.pid,name:nameOf(best.pid),g:best.g,w:best.w,l:best.l}:null;
}
function bestieOf(id){ // 같은 팀일 때 가장 잘 풀리는 단짝
  const tm={};
  state.matches.forEach(m=>{
    const me=m.participants.find(p=>p.playerId===id);if(!me)return;
    const iWon=me.team===m.winnerTeam;
    m.participants.filter(p=>p.playerId&&p.playerId!==id&&p.team===me.team).forEach(p=>{
      tm[p.playerId]=tm[p.playerId]||{g:0,w:0};
      tm[p.playerId].g++;if(iWon)tm[p.playerId].w++;
    });
  });
  let best=null;
  Object.entries(tm).forEach(([pid,o])=>{
    if(o.g<3)return;
    const wr=o.w/o.g;
    const score=wr*100+o.g*2;
    if(!best||score>best.score)best={pid,g:o.g,w:o.w,wr:Math.round(wr*100),score};
  });
  return best?{id:best.pid,name:nameOf(best.pid),g:best.g,w:best.w,wr:best.wr}:null;
}
function rivalPressure(myId,rivalId){ // 라이벌 상승세 감지 → 긴장 멘트
  const d=id=>{const a=formSeries(id).arr;return(a.at(-1)||100)-(a[Math.max(0,a.length-6)]||100)};
  const mine=d(myId),his=d(rivalId);
  if(his-mine>=8)return{level:'danger',txt:`🚨 라이벌이 상승세(${his>=0?'+':''}${his})인데 나는 ${mine>=0?'+':''}${mine} — 격차 벌어지는 중, 긴장하세요!`};
  if(mine-his>=8)return{level:'good',txt:`😎 지금은 내가 우위 — 내 폼 ${mine>=0?'+':''}${mine} vs 라이벌 ${his>=0?'+':''}${his}`};
  return{level:'even',txt:`⚖ 둘 다 비슷한 흐름 (나 ${mine>=0?'+':''}${mine} · 라이벌 ${his>=0?'+':''}${his}) — 다음 맞대결이 분수령`};
}


/* ───── 🚨 부당거래 감시 (운영진) ───── */
function detectSuspects(){ // 체결 테이프에서 왕복 단타·세력 패턴 적발
  const T=window._trades||[];
  const by={};
  T.forEach(e=>{
    const k=e.n+'→'+e.t;
    by[k]=by[k]||{n:e.n,t:e.t,buys:0,sells:0,vol:0,last:e.ts};
    if(e.s==='b')by[k].buys++;else by[k].sells++;
    by[k].vol+=e.q*e.p;
  });
  return Object.values(by)
    .map(x=>({...x,cycles:Math.min(x.buys,x.sells)}))
    .filter(x=>x.cycles>=2||x.vol>=5000)
    .sort((a,b)=>b.cycles-a.cycles||b.vol-a.vol)
    .map(x=>({...x,why:x.cycles>=2?`왕복 단타 ${x.cycles}회 (사고팔기 반복)`:`대량 거래 ${fmtAPO(x.vol)} APO`}));
}

function priceReason(name,w,delta,seed){
  const dir=delta>0?'Up':delta<0?'Dn':'Up';
  const pool=w==='ai'?PRICE_FLAVORS.ai:w==='list'?PRICE_FLAVORS.list:w==='form'?PRICE_FLAVORS['form'+dir]:PRICE_FLAVORS['trade'+dir];
  const tt=titlesOf(name);
  const t=tt.length?tt[Math.abs(seed)%tt.length]:'무관의 제왕';
  const raw=pool[Math.abs(seed)%pool.length];
  return raw.replace(/\{n\}/g,name).replace(/\{t\}/g,t);
}

function casterLines(L0){ // 라인업(회차)별 해설 듀오 — 회차마다 다른 멘트
  const P=statPlayers().filter(p=>p.games>=3);
  const top=[...P].sort((a,b)=>b.winRate-a.winRate)[0];
  const hot=[...P].sort((a,b)=>{const sa=streaksOf(a.id).cw||0,sb=streaksOf(b.id).cw||0;return sb-sa})[0];
  const cold=[...P].sort((a,b)=>{const sa=streaksOf(a.id).cl||0,sb=streaksOf(b.id).cl||0;return sb-sa})[0];
  const Ls=L0?[L0]:allLineups();
  const key=Ls[0]?voteKey(Ls[0]):'';
  const M=(window._mkts||{})[key]||{};
  const tot=(M.alpha||0)+(M.beta||0);
  const a=tot?Math.round(M.alpha/tot*100):50,b=tot?100-Math.round(M.alpha/tot*100):50;
  const rNum=Ls[0]?Number(REWARD_SLUG[Ls[0].round||'1차']||String(Ls[0].round||'1').replace(/[^0-9]/g,'')||'1'):0; // 투배럭A=4·B=5로 시드 분리
  const seed=Number((Ls[0]?Ls[0].date:sessionDay()).replace(/-/g,''))+rNum*97;
  const fill=s=>s
    .replace(/\{hot_i\}/g,hot?josa(hot.name,'을','를'):'를')
    .replace(/\{hot(px)?\}/g,m=>m==='{hotpx}'?String(hot?(stockPx(hot.name)||marketPrice(state.players.find(x=>x.id===hot.id))||100):100):(hot?hot.name:'에이스'))
    .replace(/\{top(wr)?\}/g,m=>m==='{topwr}'?String(top?top.winRate:50):(top?top.name:'1황'))
    .replace(/\{cold\}/g,cold?cold.name:'슬럼퍼')
    .replace(/\{a\}/g,String(a)).replace(/\{b\}/g,String(b));
  // 라이벌 더비 탐지: 라인업 양 팀에 서로 라이벌인 쌍이 있나
  let derbyTxt='';
  if(Ls[0]){
    const blue=(Ls[0].blue||[]),red=(Ls[0].red||[]);
    for(const bid of blue){const rv=rivalOf(bid);if(rv&&red.includes(rv.id)){
      const n1=nameOf(bid).replace(/^\d+\s*/,''),n2=rv.name.replace(/^\d+\s*/,'');
      derbyTxt=(n1.slice(0,1)+n2.slice(0,1))+' 더비 ('+nameOf(bid)+' vs '+rv.name+')';break}}
  }
  // 핫 선수 라인 + 프로 비유
  let hotLane='',hotPro='';
  if(hot){const hm=state.matches.find(m=>m.participants.some(x=>x.playerId===hot.id&&x.lane));
    const hl=hm?(hm.participants.find(x=>x.playerId===hot.id)||{}).lane:'';
    hotLane=({TOP:'탑',JUNGLE:'정글',MID:'미드',ADC:'원딜',SUPPORT:'서폿'})[hl]||'';
    const pool=PRO_COMPARE[hl]||PRO_COMPARE.MID;hotPro=pool[Math.abs(seed)%(pool.length-1)+1];}
  const fill2=s=>fill(s).replace(/\{hotlane\}/g,hotLane||'').replace(/\{hotpro\}/g,hotPro||'에이스').replace(/\{derby\}/g,derbyTxt||'라이벌');
  // 멘트 풀 구성: 기본 + 상황부(프로/더비)를 섞어 더 다양하게
  const ktPool=[...CASTER_KT,...CASTER_PRO];
  if(derbyTxt)ktPool.push(...CASTER_DERBY);
  const skPool=[...CASTER_SK];
  if(derbyTxt)skPool.push(...CASTER_DERBY.map(d=>d+'!!'));
  return{
    kt:fill2(ktPool[Math.abs(seed*7)%ktPool.length]),
    sk:fill2(skPool[Math.abs(seed*13)%skPool.length])
  };
}
